<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESS-MCP Demo Agent</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --pill-bg: #21262d; --pill-hover: #30363d;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .servers { margin-left: auto; display: flex; gap: 8px; }
  header .server-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 12px;
    background: var(--pill-bg); color: var(--green); border: 1px solid var(--green);
  }
  header .server-badge.disconnected { color: var(--muted); border-color: var(--border); }

  .container { max-width: 900px; width: 100%; margin: 0 auto; padding: 24px; flex: 1; }

  /* Skill pills */
  .skills { margin-bottom: 20px; }
  .skills-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .skill-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-pill {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--pill-bg); color: var(--text); cursor: pointer;
    font-size: 13px; transition: all 0.15s;
  }
  .skill-pill:hover { background: var(--pill-hover); border-color: var(--accent); }
  .skill-pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* Prompt box */
  .prompt-area { margin-bottom: 24px; }
  .prompt-box {
    display: flex; gap: 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px; align-items: flex-end;
  }
  .prompt-box textarea {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-family: inherit; font-size: 14px; resize: vertical;
    min-height: 60px; max-height: 200px; padding: 8px; outline: none;
  }
  .prompt-box textarea::placeholder { color: var(--muted); }
  .send-btn {
    padding: 10px 20px; border-radius: var(--radius); border: none;
    background: var(--accent); color: #000; font-weight: 600;
    cursor: pointer; font-size: 14px; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Tool calls */
  .tool-calls { margin-bottom: 24px; }
  .tool-calls-header {
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .tool-calls-header .count { color: var(--accent); }
  .tool-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 16px; font-size: 12px;
    background: var(--pill-bg); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .tool-pill:hover { background: var(--pill-hover); }
  .tool-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange); flex-shrink: 0;
  }
  .tool-pill.done .dot { background: var(--green); }
  .tool-pill.error .dot { background: var(--red); }
  .tool-pill .server-tag { color: var(--muted); }
  .tool-pill .tool-name { color: var(--text); }

  /* Tool detail modal */
  .tool-detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    justify-content: center; align-items: center;
  }
  .tool-detail-overlay.visible { display: flex; }
  .tool-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; max-width: 700px;
    width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .tool-detail h3 { margin-bottom: 12px; font-size: 15px; }
  .tool-detail .section-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin: 12px 0 6px;
  }
  .tool-detail pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; font-size: 12px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 300px; overflow-y: auto; color: var(--text);
  }
  .tool-detail .close-btn {
    float: right; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 18px;
  }

  /* Result */
  .result-section { margin-bottom: 24px; }
  .result-label {
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .result-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap;
  }

  /* Stats */
  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 16px; padding: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
  .stat .value { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Status */
  .status {
    text-align: center; padding: 12px; font-size: 13px;
    color: var(--muted); display: none;
  }
  .status.visible { display: block; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hidden helper */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>🤖 ESS-MCP Demo Agent</h1>
  <div class="servers" id="servers"></div>
</header>

<div class="container">
  <!-- Skill pills -->
  <div class="skills">
    <div class="skills-label">Choose a skill</div>
    <div class="skill-pills" id="skillPills"></div>
  </div>

  <!-- Prompt box -->
  <div class="prompt-area">
    <div class="prompt-box">
      <textarea id="promptInput" placeholder="Select a skill above or type a custom prompt…" rows="3"></textarea>
      <button class="send-btn" id="sendBtn" onclick="runAgent()">▶ Run</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status"><span class="spinner"></span> <span id="statusText"></span></div>

  <!-- Tool calls -->
  <div class="tool-calls hidden" id="toolCallsSection">
    <div class="tool-calls-header">
      Tool Calls <span class="count" id="toolCount">0</span>
    </div>
    <div class="tool-pills" id="toolPills"></div>
  </div>

  <!-- Result -->
  <div class="result-section hidden" id="resultSection">
    <div class="result-label">Result</div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <!-- Stats -->
  <div class="stats-bar hidden" id="statsBar">
    <div class="stat"><span class="value" id="statDuration">—</span><span class="label">Duration</span></div>
    <div class="stat"><span class="value" id="statTurns">—</span><span class="label">Turns</span></div>
    <div class="stat"><span class="value" id="statTools">—</span><span class="label">Tool Calls</span></div>
    <div class="stat"><span class="value" id="statPromptTok">—</span><span class="label">Prompt Tokens</span></div>
    <div class="stat"><span class="value" id="statCompTok">—</span><span class="label">Completion Tokens</span></div>
    <div class="stat"><span class="value" id="statModel">—</span><span class="label">Model</span></div>
  </div>
</div>

<!-- Tool detail overlay -->
<div class="tool-detail-overlay" id="toolOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="tool-detail" id="toolDetail">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <h3 id="detailTitle"></h3>
    <div class="section-label">Input</div>
    <pre id="detailInput"></pre>
    <div class="section-label">Output</div>
    <pre id="detailOutput"></pre>
  </div>
</div>

<script>
const skills = [];
const toolData = {};  // id -> {server, tool, arguments, result}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  // Load skills
  try {
    const res = await fetch('/api/skills');
    const data = await res.json();
    data.forEach(s => skills.push(s));
    renderSkills();
  } catch (e) { console.error('Failed to load skills', e); }

  // Load servers
  try {
    const res = await fetch('/api/servers');
    const data = await res.json();
    renderServers(data);
  } catch (e) { console.error('Failed to load servers', e); }
}

function renderSkills() {
  const el = document.getElementById('skillPills');
  el.innerHTML = skills.map((s, i) =>
    `<button class="skill-pill" data-index="${i}" onclick="selectSkill(${i})">${formatSkillName(s.name)}</button>`
  ).join('');
}

function formatSkillName(name) {
  return name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderServers(servers) {
  const el = document.getElementById('servers');
  if (servers.length === 0) {
    el.innerHTML = '<span class="server-badge disconnected">No servers connected</span>';
    return;
  }
  el.innerHTML = servers.map(s =>
    `<span class="server-badge">${s.name} (${s.tools})</span>`
  ).join('');
}

let activeSkill = -1;
function selectSkill(index) {
  // Toggle off if already selected
  if (activeSkill === index) {
    activeSkill = -1;
    document.getElementById('promptInput').value = '';
    document.querySelectorAll('.skill-pill').forEach(p => p.classList.remove('active'));
    return;
  }
  activeSkill = index;
  document.getElementById('promptInput').value = skills[index].prompt;
  document.querySelectorAll('.skill-pill').forEach((p, i) => {
    p.classList.toggle('active', i === index);
  });
}

// ── Run agent ─────────────────────────────────────────────────────
let running = false;

async function runAgent() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt || running) return;

  running = true;
  document.getElementById('sendBtn').disabled = true;

  // Reset UI
  Object.keys(toolData).forEach(k => delete toolData[k]);
  document.getElementById('toolPills').innerHTML = '';
  document.getElementById('toolCount').textContent = '0';
  document.getElementById('toolCallsSection').classList.add('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('statsBar').classList.add('hidden');
  showStatus('Connecting…');

  try {
    const response = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          try {
            const data = JSON.parse(line.slice(6));
            handleEvent(eventType, data);
          } catch (e) { /* ignore parse errors */ }
          eventType = null;
        }
      }
    }
  } catch (e) {
    showStatus('Error: ' + e.message);
  }

  running = false;
  document.getElementById('sendBtn').disabled = false;
}

function handleEvent(type, data) {
  switch (type) {
    case 'status':
      showStatus(data.message);
      break;

    case 'tool_call':
      document.getElementById('toolCallsSection').classList.remove('hidden');
      toolData[data.id] = { server: data.server, tool: data.tool, arguments: data.arguments, result: null };
      addToolPill(data.id, data.server, data.tool, 'pending');
      document.getElementById('toolCount').textContent = data.index;
      showStatus(`Running ${data.server}/${data.tool}…`);
      break;

    case 'tool_result':
      if (toolData[data.id]) {
        toolData[data.id].result = data.result;
      }
      updateToolPill(data.id, 'done');
      break;

    case 'result':
      hideStatus();
      document.getElementById('resultSection').classList.remove('hidden');
      document.getElementById('resultContent').textContent = data.content;
      break;

    case 'stats':
      document.getElementById('statsBar').classList.remove('hidden');
      document.getElementById('statDuration').textContent = data.duration + 's';
      document.getElementById('statTurns').textContent = data.turns;
      document.getElementById('statTools').textContent = data.tool_calls;
      document.getElementById('statPromptTok').textContent = (data.prompt_tokens || 0).toLocaleString();
      document.getElementById('statCompTok').textContent = (data.completion_tokens || 0).toLocaleString();
      document.getElementById('statModel').textContent = data.model;
      break;

    case 'error':
      showStatus('❌ ' + data.message);
      break;

    case 'done':
      hideStatus();
      break;
  }
}

// ── Tool pill helpers ─────────────────────────────────────────────
function addToolPill(id, server, tool, state) {
  const el = document.createElement('button');
  el.className = 'tool-pill ' + state;
  el.id = 'pill-' + id;
  el.onclick = () => showDetail(id);
  el.innerHTML = `<span class="dot"></span><span class="server-tag">${server}/</span><span class="tool-name">${tool}</span>`;
  document.getElementById('toolPills').appendChild(el);
}

function updateToolPill(id, state) {
  const el = document.getElementById('pill-' + id);
  if (el) { el.className = 'tool-pill ' + state; }
}

// ── Detail modal ──────────────────────────────────────────────────
function showDetail(id) {
  const d = toolData[id];
  if (!d) return;
  document.getElementById('detailTitle').textContent = `${d.server}/${d.tool}`;
  document.getElementById('detailInput').textContent = JSON.stringify(d.arguments, null, 2);
  document.getElementById('detailOutput').textContent = d.result || '(pending…)';
  document.getElementById('toolOverlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('toolOverlay').classList.remove('visible');
}

// Escape key closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── Status helpers ────────────────────────────────────────────────
function showStatus(msg) {
  const el = document.getElementById('status');
  el.classList.add('visible');
  document.getElementById('statusText').textContent = msg;
}
function hideStatus() {
  document.getElementById('status').classList.remove('visible');
}

// ── Boot ──────────────────────────────────────────────────────────
init();
</script>
</body>
</html>

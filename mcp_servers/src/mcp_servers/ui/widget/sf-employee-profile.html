<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(240,171,0,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --sf-accent: #f0ab00; --sf-glow: rgba(240,171,0,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(212,152,0,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --sf-accent: #d49800; --sf-glow: rgba(212,152,0,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 520px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { color: var(--sf-accent); font-size: 20px; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--card-glow); }
      .avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--sf-accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; flex-shrink: 0; }
      .profile-top { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; }
      .profile-name { font-size: 18px; font-weight: 600; }
      .profile-title { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 6px; }
      .status-active { background: rgba(46,160,67,.15); color: #3fb950; }
      .status-inactive { background: rgba(248,81,73,.15); color: #f85149; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
      .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
      .field span { font-size: 14px; }
      .field.full { grid-column: 1 / -1; }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--sf-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        firstName: "Alex", lastName: "Chen", title: "Senior Software Engineer",
        department: "Engineering", division: "Cloud Platform", location: "Seattle, WA",
        email: "alex.chen@example.com", phone: "+1 (425) 555-0142",
        hireDate: "2021-03-15", status: "active", employeeId: "EMP-10042",
        manager: "Jordan Kim"
      };

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const d = data;
          const initials = ((d.firstName || '')[0] || '') + ((d.lastName || '')[0] || '');
          const isActive = (d.status || '').toLowerCase() === 'active';

          root.innerHTML = `
            <div class="header"><span class="icon">◆</span><h1>Employee Profile</h1></div>
            <div class="card">
              <div class="profile-top">
                <div class="avatar">${initials}</div>
                <div>
                  <div class="profile-name">${d.firstName || ''} ${d.lastName || ''}</div>
                  <div class="profile-title">${d.title || ''}</div>
                  <span class="status-pill ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? 'Active' : 'Inactive'}</span>
                </div>
              </div>
              <hr class="divider" />
              <div class="fields">
                <div class="field"><label>Employee ID</label><span>${d.employeeId || '—'}</span></div>
                <div class="field"><label>Department</label><span>${d.department || '—'}</span></div>
                <div class="field"><label>Division</label><span>${d.division || '—'}</span></div>
                <div class="field"><label>Location</label><span>${d.location || '—'}</span></div>
                <div class="field"><label>Email</label><span>${d.email || '—'}</span></div>
                <div class="field"><label>Phone</label><span>${d.phone || '—'}</span></div>
                <div class="field"><label>Hire Date</label><span>${d.hireDate || '—'}</span></div>
                <div class="field"><label>Manager</label><span>${d.manager || '—'}</span></div>
              </div>
            </div>`;
        } catch (e) {
          root.innerHTML = `<div class="header"><span class="icon">◆</span><h1>Employee Profile</h1></div><div class="card"><div class="error">Unable to load employee profile.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

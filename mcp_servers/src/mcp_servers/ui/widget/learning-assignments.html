<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14;
        --card: #151a21;
        --muted: #a9b1bd;
        --text: #e6edf3;
        --accent: #4cc2ff;
        --border: #1f2630;
        --input-bg: #0f131a;
        --btn-bg: #152235;
        --btn-border: #243145;
        --btn-hover: #1a2d44;
        --wd-accent: #f68620;
        --wd-glow: rgba(246,134,32,.12);
        --ok: #2bd48f;
        --warn: #f0b232;
        --danger: #ff6b6b;
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5;
        --card: #ffffff;
        --muted: #65707d;
        --text: #1e1e1e;
        --accent: #0078d4;
        --border: #e0e0e0;
        --input-bg: #ffffff;
        --btn-bg: #f0f0f0;
        --btn-border: #d0d0d0;
        --btn-hover: #e4e4e4;
        --wd-accent: #c2670d;
        --wd-glow: rgba(194,103,13,.08);
        --ok: #107c10;
        --warn: #ca5010;
        --danger: #d13438;
      }
      html, body { height: 100%; background: var(--bg); }
      body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; min-height: 100%; }

      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon {
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--wd-glow); border: 1px solid var(--wd-accent);
        display: flex; align-items: center; justify-content: center;
      }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { font-size: 12px; color: var(--muted); }

      .controls {
        display: grid;
        grid-template-columns: 1.3fr .8fr .8fr auto;
        gap: 8px;
        margin-bottom: 10px;
      }
      .input, .select {
        width: 100%; box-sizing: border-box;
        background: var(--input-bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 8px 10px; font-size: 12px;
      }
      .btn {
        background: var(--btn-bg); color: var(--text);
        border: 1px solid var(--btn-border); border-radius: 8px;
        padding: 8px 10px; font-size: 12px; cursor: pointer;
      }
      .btn:hover { background: var(--btn-hover); }

      .summary { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
      .list { display: grid; gap: 8px; }
      .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px;
      }
      .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
      .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
      .meta { font-size: 12px; color: var(--muted); }
      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .chip { font-size: 11px; border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; color: var(--muted); }
      .chip.overdue { color: var(--danger); border-color: var(--danger); }
      .chip.required { color: var(--warn); border-color: var(--warn); }
      .actions { margin-top: 8px; display: flex; gap: 6px; }

      .loading, .empty, .error { text-align: center; padding: 24px 0; color: var(--muted); font-size: 13px; }
      .error { color: var(--danger); }
      .maximize-btn {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 4px 8px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }

      @media (max-width: 860px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)">
              <path d="M4 5h16v4H4z"/><path d="M4 13h16v6H4z"/><path d="M8 9v4M16 9v4"/>
            </svg>
          </div>
          <div>
            <div class="title">Learning Assignments</div>
            <div class="subtitle">Workday &middot; Filterable assignment list</div>
          </div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>

      <div class="controls">
        <input id="search" class="input" placeholder="Search assignments" />
        <select id="status" class="select"><option value="">All statuses</option></select>
        <select id="sort" class="select">
          <option value="due_asc">Sort: Due Date (Soonest)</option>
          <option value="due_desc">Sort: Due Date (Latest)</option>
          <option value="title_asc">Sort: Title A&rarr;Z</option>
          <option value="title_desc">Sort: Title Z&rarr;A</option>
        </select>
        <button id="refresh" class="btn">Refresh</button>
      </div>

      <div id="summary" class="summary">Loading assignments&hellip;</div>
      <div id="content"><div class="loading">Loading learning assignments&hellip;</div></div>
    </div>

    <script>
      (function() {
        "use strict";

        var toolOutput = (window.openai && window.openai.toolOutput) || {};
        var allAssignments = [];
        var viewAssignments = [];

        var searchEl = document.getElementById("search");
        var statusEl = document.getElementById("status");
        var sortEl = document.getElementById("sort");
        var refreshEl = document.getElementById("refresh");
        var summaryEl = document.getElementById("summary");
        var contentEl = document.getElementById("content");

        function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
        function reportHeight() {
          if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          }
        }
        function dueEpoch(d) {
          if (!d) return Number.MAX_SAFE_INTEGER;
          var t = Date.parse(d);
          return isNaN(t) ? Number.MAX_SAFE_INTEGER : t;
        }

        function populateStatuses() {
          var map = {};
          for (var i = 0; i < allAssignments.length; i++) {
            var s = (allAssignments[i].assignmentStatus || "").trim();
            if (s) map[s] = true;
          }
          var vals = Object.keys(map).sort(function(a, b) { return a.localeCompare(b); });
          var current = statusEl.value;
          statusEl.innerHTML = '<option value="">All statuses</option>';
          for (var j = 0; j < vals.length; j++) {
            var opt = document.createElement("option");
            opt.value = vals[j];
            opt.textContent = vals[j];
            statusEl.appendChild(opt);
          }
          if (current && map[current]) statusEl.value = current;
        }

        function applyFilters() {
          var q = (searchEl.value || "").toLowerCase().trim();
          var status = statusEl.value || "";
          var sort = sortEl.value || "due_asc";

          viewAssignments = allAssignments.filter(function(item) {
            var title = (item.learningContentTitle || "").toLowerCase();
            var provider = (item.contentProvider || "").toLowerCase();
            var comments = (item.comments || "").toLowerCase();
            var okSearch = !q || title.indexOf(q) >= 0 || provider.indexOf(q) >= 0 || comments.indexOf(q) >= 0;
            var okStatus = !status || (item.assignmentStatus || "") === status;
            return okSearch && okStatus;
          });

          viewAssignments.sort(function(a, b) {
            if (sort === "title_asc") return (a.learningContentTitle || "").localeCompare(b.learningContentTitle || "");
            if (sort === "title_desc") return (b.learningContentTitle || "").localeCompare(a.learningContentTitle || "");
            if (sort === "due_desc") return dueEpoch(b.dueDate) - dueEpoch(a.dueDate);
            return dueEpoch(a.dueDate) - dueEpoch(b.dueDate);
          });

          render();
        }

        function card(item) {
          var chips = '' +
            '<span class="chip">' + esc(item.assignmentStatus || 'Unknown') + '</span>' +
            (item.required ? '<span class="chip required">Required</span>' : '') +
            (item.overdue ? '<span class="chip overdue">Overdue</span>' : '');

          var meta = [];
          if (item.dueDate) meta.push('Due: ' + item.dueDate);
          if (item.courseDuration) meta.push('Duration: ' + item.courseDuration);
          if (item.contentProvider) meta.push('Provider: ' + item.contentProvider);

          var openBtn = item.contentURL
            ? '<button class="btn" data-open="' + esc(item.contentURL) + '">Open in Workday</button>'
            : '';

          return '' +
            '<div class="card">' +
              '<div class="top">' +
                '<div>' +
                  '<div class="name">' + esc(item.learningContentTitle || 'Untitled assignment') + '</div>' +
                  '<div class="meta">' + esc(meta.join(' \u00b7 ')) + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="chips">' + chips + '</div>' +
              (item.comments ? '<div class="meta" style="margin-top:8px;">' + esc(item.comments) + '</div>' : '') +
              (openBtn ? '<div class="actions">' + openBtn + '</div>' : '') +
            '</div>';
        }

        function bindActions() {
          var buttons = contentEl.querySelectorAll("[data-open]");
          for (var i = 0; i < buttons.length; i++) {
            buttons[i].addEventListener("click", function() {
              var url = this.getAttribute("data-open");
              if (!url) return;
              window.open(url, "_blank", "noopener,noreferrer");
            });
          }
        }

        function render() {
          summaryEl.textContent = viewAssignments.length + " assignment" + (viewAssignments.length === 1 ? "" : "s") + " shown";
          if (!viewAssignments.length) {
            contentEl.innerHTML = '<div class="empty">No assignments match your filters.</div>';
            reportHeight();
            return;
          }
          var html = '<div class="list">';
          for (var i = 0; i < viewAssignments.length; i++) html += card(viewAssignments[i]);
          html += '</div>';
          contentEl.innerHTML = html;
          bindActions();
          reportHeight();
        }

        async function load() {
          contentEl.innerHTML = '<div class="loading">Loading learning assignments&hellip;</div>';
          try {
            if (!window.openai || typeof window.openai.callTool !== "function") {
              throw new Error("Skybridge not available");
            }
            var out = await window.openai.callTool("get_learning_assignments", {});
            var data = out && out.structuredContent ? out.structuredContent : out;
            allAssignments = (data && data.assignments) ? data.assignments : [];
            if (window.openai) window.openai.toolOutput = data || {};
            populateStatuses();
            applyFilters();
          } catch (e) {
            contentEl.innerHTML = '<div class="error">' + esc(e && e.message ? e.message : 'Failed to load assignments') + '</div>';
            reportHeight();
          }
        }

        searchEl.addEventListener("input", applyFilters);
        statusEl.addEventListener("change", applyFilters);
        sortEl.addEventListener("change", applyFilters);
        refreshEl.addEventListener("click", load);

        var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
        var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
        var _isFullscreen = false;
        var _maxBtn = document.getElementById("maximizeBtn");

        async function toggleFullscreen() {
          if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return;
          var mode = _isFullscreen ? "inline" : "fullscreen";
          try {
            await window.openai.requestDisplayMode({ mode: mode });
            _isFullscreen = !_isFullscreen;
            _maxBtn.innerHTML = _isFullscreen ? _collapseSvg : _expandSvg;
            _maxBtn.title = _isFullscreen ? "Restore" : "Maximize";
            reportHeight();
          } catch (e) {}
        }

        if (_maxBtn) {
          if (window.openai && typeof window.openai.requestDisplayMode === "function") {
            _maxBtn.addEventListener("click", toggleFullscreen);
          } else {
            _maxBtn.style.display = "none";
          }
        }

        if (toolOutput && toolOutput.assignments) {
          allAssignments = toolOutput.assignments || [];
          populateStatuses();
          applyFilters();
        } else {
          setTimeout(function() {
            var fresh = (window.openai && window.openai.toolOutput) || {};
            if (fresh && fresh.assignments) {
              allAssignments = fresh.assignments || [];
              populateStatuses();
              applyFilters();
            } else {
              load();
            }
          }, 0);
        }
      })();
    </script>
  </body>
</html>

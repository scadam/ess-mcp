<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(240,171,0,.16);
        --sf-accent: #f0ab00; --sf-glow: rgba(240,171,0,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(212,152,0,.08);
        --sf-accent: #d49800; --sf-glow: rgba(212,152,0,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 560px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { color: var(--sf-accent); font-size: 20px; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .header .person-id { font-size: 12px; color: var(--muted); margin-left: auto; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px var(--card-shadow); display: flex; align-items: center; gap: 14px; }
      .card .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .dot-pass { background: #3fb950; }
      .dot-pending { background: #d29922; }
      .dot-fail { background: #f85149; }
      .dot-unknown { background: var(--muted); }
      .card-body { flex: 1; min-width: 0; }
      .card-type { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card-status { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .card-dates { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--sf-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .empty { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        personId: "admin",
        backgroundChecks: [
          { type: "Criminal Record", status: "Passed", startDate: "2024-01-15", endDate: "2024-01-20" },
          { type: "Employment Verification", status: "Pending", startDate: "2024-06-01", endDate: null },
          { type: "Education Verification", status: "Passed", startDate: "2024-01-10", endDate: "2024-01-12" }
        ]
      };

      function dotClass(status) {
        if (!status) return 'dot-unknown';
        const s = status.toLowerCase();
        if (s.includes('pass') || s.includes('complete') || s.includes('clear')) return 'dot-pass';
        if (s.includes('pend') || s.includes('progress')) return 'dot-pending';
        if (s.includes('fail') || s.includes('reject')) return 'dot-fail';
        return 'dot-unknown';
      }

      function fmtDate(d) { return d ? new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '—'; }

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const checks = data.backgroundChecks || [];
          if (!checks.length) {
            root.innerHTML = '<div class="empty">No background checks found.</div>';
            return;
          }

          let html = `<div class="header"><span class="icon">🔍</span><h1>Background Checks</h1><span class="person-id">${data.personId || ''}</span></div>`;
          for (const c of checks) {
            const dc = dotClass(c.status);
            html += `<div class="card"><span class="dot ${dc}"></span><div class="card-body"><div class="card-type">${c.type || 'Unknown'}</div><div class="card-status">${c.status || 'Unknown'}</div><div class="card-dates">${fmtDate(c.startDate)} → ${fmtDate(c.endDate)}</div></div></div>`;
          }
          root.innerHTML = html;
        } catch (e) {
          root.innerHTML = '<div class="empty">Unable to load background checks.</div>';
        }
      })();
    </script>
  </body>
</html>

<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)');function t(){if(!d.dataset.theme)d.dataset.theme=m.matches?'dark':'light';}t();m.addEventListener('change',function(){if(!d.getAttribute('data-theme'))t();});new MutationObserver(function(){}).observe(d,{attributes:true,attributeFilter:['data-theme']});})();</script>
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3; --accent: #4cc2ff; --border: #1f2630; --pos: #2bd48f; --neg: #ff6b6b; --warn: #f0b232; --btn-bg: #152235; --btn-border: #243145; --wd-accent: #f68d28; --wd-glow: rgba(246,141,40,.14); }
      :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e; --accent: #0078d4; --border: #e0e0e0; --pos: #107c10; --neg: #d13438; --warn: #ca5010; --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --wd-accent: #d47418; --wd-glow: rgba(212,116,24,.08); }
      html, body { margin: 0; background: var(--bg); }
      body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--wd-glow); border: 1px solid var(--wd-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .title { font-size: 16px; font-weight: 600; } .subtitle { color: var(--muted); font-size: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
      .section-label { font-size: 11px; color: var(--wd-accent); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; }
      .maximize-btn:hover { color: var(--wd-accent); border-color: var(--wd-accent); }
      .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
      .footer { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right; }
      .stats-row { display: flex; gap: 10px; margin-bottom: 10px; }
      .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
      .stat-value { font-size: 28px; font-weight: 700; color: var(--wd-accent); }
      .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
      .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
      .bar-label { font-size: 12px; min-width: 120px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .bar-track { flex: 1; height: 14px; background: var(--bg); border-radius: 7px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, var(--wd-accent), #e85d04); }
      .bar-count { font-size: 11px; color: var(--muted); min-width: 20px; }
      .roster { max-height: 260px; overflow-y: auto; }
      .member { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
      .member:last-child { border-bottom: none; }
      .m-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #fff; flex-shrink: 0; background: linear-gradient(135deg, var(--pos), #059669); }
      .m-avatar.mgr { background: linear-gradient(135deg, var(--accent), #6366f1); }
      .m-name { font-size: 13px; font-weight: 600; }
      .m-title { font-size: 11px; color: var(--muted); }
      .m-email { font-size: 11px; color: var(--accent); text-decoration: none; }
      .m-email:hover { text-decoration: underline; }
      .m-badge { font-size: 9px; color: var(--accent); text-transform: uppercase; font-weight: 700; letter-spacing: .5px; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)"><circle cx="12" cy="7" r="3"/><path d="M5 21v-2a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v2"/><path d="M17 11h4M19 9v4"/></svg>
          </div>
          <div><div class="title">Team Dashboard</div><div class="subtitle">Workday &middot; Manager View</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div id="root"><div class="loading">Loading team overview&hellip;</div></div>
      <div class="footer">Powered by <strong>workday / get_team_overview</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var _isFS = false, _maxBtn = document.getElementById("maximizeBtn");
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      function initials(name) { return (name || "?").split(" ").map(function(p) { return p[0]; }).join("").slice(0, 2).toUpperCase(); }

      function render(d) {
        if (!d || !d.success) { document.getElementById("root").innerHTML = '<div class="loading">No team data available.</div>'; reportHeight(); return; }
        var hc = d.headcount || 0;
        var titles = d.titleBreakdown || {};
        var orgs = d.organizationBreakdown || {};
        var members = d.teamMembers || [];
        var roleCount = Object.keys(titles).length;
        var orgCount = Object.keys(orgs).length;
        var maxTitle = 0; for (var k in titles) { if (titles[k] > maxTitle) maxTitle = titles[k]; }

        var html = '<div class="stats-row">';
        html += '<div class="stat-card"><div class="stat-value">' + hc + '</div><div class="stat-label">Headcount</div></div>';
        html += '<div class="stat-card"><div class="stat-value">' + roleCount + '</div><div class="stat-label">Roles</div></div>';
        html += '<div class="stat-card"><div class="stat-value">' + orgCount + '</div><div class="stat-label">Sub-orgs</div></div>';
        html += '</div>';

        if (maxTitle > 0) {
          html += '<div class="card"><div class="section-label">Role Breakdown</div>';
          var sorted = Object.keys(titles).sort(function(a, b) { return titles[b] - titles[a]; });
          for (var i = 0; i < sorted.length; i++) {
            var pct = Math.round((titles[sorted[i]] / maxTitle) * 100);
            html += '<div class="bar-row"><div class="bar-label">' + esc(sorted[i]) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="bar-count">' + titles[sorted[i]] + '</div></div>';
          }
          html += '</div>';
        }

        if (members.length) {
          html += '<div class="card"><div class="section-label">Team Roster (' + members.length + ')</div><div class="roster">';
          for (var j = 0; j < members.length; j++) {
            var m = members[j];
            var isMgr = m.isManager;
            html += '<div class="member">';
            html += '<div class="m-avatar' + (isMgr ? ' mgr' : '') + '">' + initials(m.name) + '</div>';
            html += '<div style="flex:1;min-width:0"><div class="m-name">' + esc(m.name) + (isMgr ? '<span class="m-badge">Mgr</span>' : '') + '</div>';
            html += '<div class="m-title">' + esc(m.businessTitle || "") + '</div>';
            if (m.primaryWorkEmail) html += '<a class="m-email" href="mailto:' + esc(m.primaryWorkEmail) + '">' + esc(m.primaryWorkEmail) + '</a>';
            html += '</div></div>';
          }
          html += '</div></div>';
        }

        document.getElementById("root").innerHTML = html; reportHeight();
      }

      async function init() {
        if (toolOutput && (toolOutput.success || toolOutput.teamMembers)) { render(toolOutput); return; }
        if (window.openai && typeof window.openai.callTool === "function") { try { var out = await window.openai.callTool("get_team_overview", toolInput); render((out && out.structuredContent) || out); } catch (e) { document.getElementById("root").innerHTML = '<div class="loading">' + esc(e.message || "Error loading team data") + '</div>'; reportHeight(); } }
        else { document.getElementById("root").innerHTML = '<div class="loading">Skybridge unavailable.</div>'; reportHeight(); }
      }

      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; init(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }
      init();
    </script>
  </body>
</html>

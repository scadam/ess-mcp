<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(0,102,204,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --coupa-accent: #0066cc; --coupa-glow: rgba(0,102,204,.14);
        --input-bg: #1a2030; --input-border: #2a3442;
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(0,77,153,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --coupa-accent: #004d99; --coupa-glow: rgba(0,77,153,.08);
        --input-bg: #fff; --input-border: #d0d0d0;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 560px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--coupa-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--coupa-glow); }
      .form-group { margin-bottom: 14px; }
      .form-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
      input[type="text"], input[type="number"] { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
      .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
      .line-entry { display: grid; grid-template-columns: 1fr 70px 90px 32px; gap: 8px; align-items: end; margin-bottom: 8px; }
      .line-entry input { padding: 6px 10px; font-size: 13px; }
      .btn-remove { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
      .btn-remove:hover { color: #f85149; }
      .btn-add { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--coupa-accent); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
      .btn-add:hover { opacity: .85; }
      .total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: 16px; font-weight: 600; }
      .total-row .amount { color: var(--coupa-accent); }
      .btn-submit { display: block; width: 100%; margin-top: 16px; padding: 10px; border-radius: 8px; border: none; background: var(--coupa-accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
      .btn-submit:hover { opacity: .85; }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--coupa-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = { title: "", "line-items": [] };
      let lineCounter = 0;

      function _askCopilot(msg) { if (window.openai && typeof window.openai.sendFollowUpMessage === "function") window.openai.sendFollowUpMessage({ prompt: msg }); }

      function addLine() {
        const container = document.getElementById('lines-container');
        const i = lineCounter++;
        const row = document.createElement('div');
        row.className = 'line-entry';
        row.id = 'line-' + i;
        row.innerHTML = `<input type="text" placeholder="Description" class="line-desc" /><input type="number" placeholder="Qty" min="1" value="1" class="line-qty" /><input type="number" placeholder="Unit price" min="0" step="0.01" value="0" class="line-price" /><button class="btn-remove" onclick="removeLine(${i})">×</button>`;
        container.appendChild(row);
        updateTotal();
      }

      function removeLine(i) {
        const el = document.getElementById('line-' + i);
        if (el) el.remove();
        updateTotal();
      }

      function updateTotal() {
        let total = 0;
        document.querySelectorAll('.line-entry').forEach(row => {
          const qty = parseFloat(row.querySelector('.line-qty')?.value) || 0;
          const price = parseFloat(row.querySelector('.line-price')?.value) || 0;
          total += qty * price;
        });
        const el = document.getElementById('total-amount');
        if (el) el.textContent = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(total);
      }

      function submitReq() {
        const title = document.getElementById('req-title').value.trim();
        const items = [];
        document.querySelectorAll('.line-entry').forEach(row => {
          const desc = row.querySelector('.line-desc')?.value?.trim();
          const qty = row.querySelector('.line-qty')?.value;
          const price = row.querySelector('.line-price')?.value;
          if (desc) items.push(desc + ' (qty: ' + qty + ', price: ' + price + ')');
        });
        _askCopilot('Create a requisition titled "' + title + '" with line items: ' + items.join('; '));
      }

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          root.innerHTML = `
            <div class="header"><div class="icon">C</div><h1>Create Requisition</h1></div>
            <div class="card">
              <div class="form-group">
                <label>Requisition Title</label>
                <input type="text" id="req-title" placeholder="e.g. Q2 Office Supplies" value="${data.title || ''}" />
              </div>
              <hr class="divider" />
              <div class="section-title">Line Items</div>
              <div id="lines-container"></div>
              <button class="btn-add" onclick="addLine()">+ Add Line Item</button>
              <div class="total-row"><span>Total</span><span class="amount" id="total-amount">$0.00</span></div>
              <button class="btn-submit" onclick="submitReq()">Submit Requisition</button>
            </div>`;

          document.getElementById('lines-container').addEventListener('input', updateTotal);
          addLine();
        } catch (e) {
          root.innerHTML = `<div class="header"><div class="icon">C</div><h1>Create Requisition</h1></div><div class="card"><div class="error">Unable to load requisition form.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

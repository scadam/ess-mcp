  <body>
    <div class="wrap">
      <div class="header">

        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" disabled>Schedule Event</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </div>
      <div class="footer" id="footerText">Powered by <strong>salesforce / create_event</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var subjectEl = document.getElementById("subject"), startEl = document.getElementById("start_datetime"), endEl = document.getElementById("end_datetime"), locEl = document.getElementById("location"), descEl = document.getElementById("description"), submitBtn = document.getElementById("submitBtn"), resetBtn = document.getElementById("resetBtn"), msgArea = document.getElementById("msgArea"), _maxBtn = document.getElementById("maximizeBtn");
      var acctSearchEl = document.getElementById("account_search"), acctIdEl = document.getElementById("account_id"), acctDropdown = document.getElementById("acctDropdown"), acctSpinner = document.getElementById("acctSpinner"), acctTagEl = document.getElementById("acctTag");
      var contactSearchEl = document.getElementById("contact_search"), contactIdEl = document.getElementById("contact_id"), contactDropdown = document.getElementById("contactDropdown"), contactSpinner = document.getElementById("contactSpinner"), contactTagEl = document.getElementById("contactTag");
      var oppSearchEl = document.getElementById("opp_search"), oppIdEl = document.getElementById("opportunity_id"), oppDropdown = document.getElementById("oppDropdown"), oppSpinner = document.getElementById("oppSpinner"), oppTagEl = document.getElementById("oppTag");
      var _isFS = false, isUpdate = false, currentEventId = null;
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';

      /* ── Typeahead engine ── */
      function debounce(fn, ms) { var t; return function() { var a = arguments, c = this; clearTimeout(t); t = setTimeout(function() { fn.apply(c, a); }, ms); }; }

      var acctActiveIdx = -1, contactActiveIdx = -1, oppActiveIdx = -1;

      function closeAllDropdowns() { acctDropdown.classList.remove("open"); contactDropdown.classList.remove("open"); oppDropdown.classList.remove("open"); acctActiveIdx = -1; contactActiveIdx = -1; oppActiveIdx = -1; reportHeight(); }
      document.addEventListener("click", function(e) {
        if (!acctSearchEl.contains(e.target) && !acctDropdown.contains(e.target)) { acctDropdown.classList.remove("open"); acctActiveIdx = -1; }

      function renderDropdown(dropdown, items, emptyMsg, onSelect, activeIdxRef) {

      /* ── Account typeahead ── */
      var acctResults = [], acctIdxRef = { val: -1 };

      function selectAccount(item) {

        acctDropdown.classList.remove("open");
        acctIdxRef.val = -1;
        showTag(acctTagEl, item.label, clearAccount);
        acctSearchEl.style.display = "none";
        enableContact();
        reportHeight();
      }

      function clearAccount() {
        acctIdEl.value = ""; acctSearchEl.value = ""; acctSearchEl.style.display = ""; acctTagEl.innerHTML = "";
        clearContact(); disableContact();
        reportHeight();
      }

      var doAccountSearch = debounce(async function(query) {
        if (!query || query.length < 1) { acctDropdown.classList.remove("open"); acctSpinner.classList.remove("visible"); reportHeight(); return; }

      acctSearchEl.addEventListener("keydown", function(e) { handleKeys(e, acctDropdown, acctResults, acctIdxRef, selectAccount); });

      /* ── Contact typeahead ── */

        contactSearchEl.value = item.label;
        contactDropdown.classList.remove("open");

      function clearContact() { contactIdEl.value = ""; contactSearchEl.value = ""; contactSearchEl.style.display = ""; contactTagEl.innerHTML = ""; reportHeight(); }

      /* ── Opportunity typeahead ── */
      var oppResults = [], oppIdxRef = { val: -1 };

      var doOppSearch = debounce(async function(query) {

      oppSearchEl.addEventListener("focus", function() {
        if (oppResults.length > 0 && !oppIdEl.value) { renderDropdown(oppDropdown, oppResults, "", selectOpportunity, oppIdxRef); }

      /* ── Create / Update mode ── */

      function enterCreateMode() {

        document.getElementById("footerText").innerHTML = 'Powered by <strong>salesforce / create_event</strong> via MCP';

      /* ── Submit handler ── */

            if (acctIdEl.value) args.account_id = acctIdEl.value;
            if (contactIdEl.value) args.contact_id = contactIdEl.value;
            if (locEl.value.trim()) args.location = locEl.value.trim();
            if (descEl.value.trim()) args.description = descEl.value.trim();
            output = await window.openai.callTool("create_event", args);
            var data = (output && output.structuredContent) || output;
            if (!data || !data.created) throw new Error((data && data.error) || "Event creation failed");
            var ev = data.event || {};
            enterUpdateMode(ev.id, ev.subject || subjectEl.value.trim());
            msgArea.innerHTML = '<div class="success-msg">&#10003; Event <strong>' + esc(ev.subject || subjectEl.value) + '</strong> scheduled successfully.</div>';
          }
        } catch (err) { msgArea.innerHTML = '<div class="error-msg">' + esc(err.message || "Operation failed") + '</div>'; }
        finally { submitBtn.textContent = isUpdate ? "Update Event" : "Schedule Event"; validate(); reportHeight(); }
      });

      /* ── Reset ── */
      resetBtn.addEventListener("click", function() {
        subjectEl.value = ""; startEl.value = ""; endEl.value = ""; locEl.value = ""; descEl.value = "";
        clearAccount(); clearContact(); disableContact(); clearOpportunity();
        msgArea.innerHTML = ""; enterCreateMode(); validate(); reportHeight();
      });

      /* ── Fullscreen toggle ── */
      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; reportHeight(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }

      /* ── Pre-fill / init ── */
      function setVal(el, v) { if (!el || v === undefined || v === null || v === "") return; if (el.type === "datetime-local" && typeof v === "string") v = v.substring(0,16).replace(" ","T"); el.value = v; }

      // Detect update mode from toolOutput
      var existingEvent = toolOutput.event || toolOutput;
      var hasExisting = !!(existingEvent && (existingEvent.id || existingEvent.event_id));
      if (hasExisting) {
        var evId = existingEvent.id || existingEvent.event_id;
        enterUpdateMode(evId, existingEvent.subject || "Event");
      }

      // Merge sources: existing event data + toolInput overrides
      var src = hasExisting ? Object.assign({}, existingEvent, toolInput) : Object.assign({}, toolOutput, toolInput);
      setVal(subjectEl, src.subject);
      setVal(startEl, src.start_datetime);
      setVal(endEl, src.end_datetime);
      setVal(locEl, src.location);
      setVal(descEl, src.description);

      // Pre-fill account
      if (src.account_id) {
        acctIdEl.value = src.account_id;
        var acctName = src.account_name || src.account_id;
        acctSearchEl.value = acctName;
        acctSearchEl.style.display = "none";
        showTag(acctTagEl, acctName, clearAccount);
        enableContact();
      }

      // Pre-fill contact
      if (src.contact_id) {
        contactIdEl.value = src.contact_id;
        var ctName = src.contact_name || src.contact_id;
        contactSearchEl.value = ctName;
        contactSearchEl.style.display = "none";
        showTag(contactTagEl, ctName, clearContact);
      }

      // Pre-fill opportunity
      if (src.opportunity_id) {
        oppIdEl.value = src.opportunity_id;
        var oppName = src.opportunity_name || src.opportunity_id;
        oppSearchEl.value = oppName;
        oppSearchEl.style.display = "none";
        showTag(oppTagEl, oppName, clearOpportunity);
      }

      // Show account_candidates as initial dropdown suggestions
      if (toolOutput.account_candidates && Array.isArray(toolOutput.account_candidates) && toolOutput.account_candidates.length > 0) {
        acctResults = toolOutput.account_candidates.map(function(a) { return { id: a.id || a.account_id || "", label: a.name || a.account_name || a.Name || "", sub: a.id || a.account_id || "" }; });
        acctSearchEl.addEventListener("focus", function() { if (!acctIdEl.value) { renderDropdown(acctDropdown, acctResults, "", selectAccount, acctIdxRef); } }, { once: true });
      }

      validate(); reportHeight();
    </script>
  </body>
</html>

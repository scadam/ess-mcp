<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(0,102,204,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --coupa-accent: #0066cc; --coupa-glow: rgba(0,102,204,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(0,77,153,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --coupa-accent: #004d99; --coupa-glow: rgba(0,77,153,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 600px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--coupa-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--coupa-glow); }
      table { width: 100%; border-collapse: collapse; }
      th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
      td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { color: var(--coupa-accent); }
      .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
      .status-active { background: rgba(46,160,67,.15); color: #3fb950; }
      .status-pending { background: rgba(210,153,0,.15); color: #d29900; }
      .status-inactive { background: rgba(248,81,73,.15); color: #f85149; }
      .empty { text-align: center; padding: 24px; color: var(--muted); }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--coupa-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        suppliers: [
          { id: "SUP-001", name: "Acme Industrial Supply Co.", status: "active", city: "Seattle", country: "United States" },
          { id: "SUP-002", name: "TechVision Ltd.", status: "active", city: "San Jose", country: "United States" },
          { id: "SUP-003", name: "ErgoWorks Inc.", status: "pending", city: "Portland", country: "United States" },
          { id: "SUP-004", name: "Global Parts GmbH", status: "active", city: "Munich", country: "Germany" },
          { id: "SUP-005", name: "Pacific Trading Co.", status: "inactive", city: "Tokyo", country: "Japan" }
        ]
      };

      function _askCopilot(msg) { if (window.openai && typeof window.openai.sendFollowUpMessage === "function") window.openai.sendFollowUpMessage({ prompt: msg }); }

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const list = data.suppliers || data.results || [];
          if (!list.length) {
            root.innerHTML = `<div class="header"><div class="icon">C</div><h1>Suppliers</h1></div><div class="card"><div class="empty">No suppliers found.</div></div>`;
            return;
          }

          const statusPill = (s) => {
            const sl = (s || '').toLowerCase();
            const cls = sl === 'active' ? 'status-active' : sl === 'inactive' ? 'status-inactive' : 'status-pending';
            return `<span class="status-pill ${cls}">${s || '—'}</span>`;
          };

          const rows = list.map(s => `
            <tr onclick="_askCopilot('Show supplier ${s.id || ''}')">
              <td>${s.name || '—'}</td>
              <td>${statusPill(s.status)}</td>
              <td>${s.city || '—'}</td>
              <td>${s.country || '—'}</td>
            </tr>`).join('');

          root.innerHTML = `
            <div class="header"><div class="icon">C</div><h1>Suppliers</h1></div>
            <div class="card">
              <table>
                <thead><tr><th>Name</th><th>Status</th><th>City</th><th>Country</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        } catch (e) {
          root.innerHTML = `<div class="header"><div class="icon">C</div><h1>Suppliers</h1></div><div class="card"><div class="error">Unable to load suppliers.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

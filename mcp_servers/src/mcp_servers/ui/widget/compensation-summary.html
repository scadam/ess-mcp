<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3; --accent: #4cc2ff; --border: #1f2630; --pos: #2bd48f; --neg: #ff6b6b; --warn: #f0b232; --btn-bg: #152235; --btn-border: #243145; --wd-accent: #f68d28; --wd-glow: rgba(246,141,40,.14); }
      :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e; --accent: #0078d4; --border: #e0e0e0; --pos: #107c10; --neg: #d13438; --warn: #ca5010; --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --wd-accent: #d47418; --wd-glow: rgba(212,116,24,.08); }
      html, body { margin: 0; background: var(--bg); }
      body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--wd-glow); border: 1px solid var(--wd-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .title { font-size: 16px; font-weight: 600; } .subtitle { color: var(--muted); font-size: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
      .section-label { font-size: 11px; color: var(--wd-accent); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .totals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .total-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; }
      .total-value { font-size: 18px; font-weight: 700; color: var(--wd-accent); }
      .total-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
      .comp-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 4px; transition: background 0.15s; }
      .comp-row:hover { background: var(--border); }
      .comp-row:last-child { border-bottom: none; }
      .comp-name { font-size: 12px; font-weight: 600; flex: 1; min-width: 0; }
      .comp-type { font-size: 10px; color: var(--wd-accent); font-weight: 600; text-transform: uppercase; margin: 0 8px; flex-shrink: 0; }
      .comp-amount { font-size: 13px; font-weight: 700; color: var(--pos); flex-shrink: 0; }
      .timeline { position: relative; padding-left: 18px; }
      .timeline::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 2px; background: var(--border); border-radius: 2px; }
      .tl-item { position: relative; padding-bottom: 12px; cursor: pointer; border-radius: 4px; transition: background 0.15s; }
      .tl-item:hover { background: var(--border); }
      .tl-item:last-child { padding-bottom: 0; }
      .tl-dot { position: absolute; left: -18px; top: 3px; width: 10px; height: 10px; border-radius: 50%; background: var(--wd-accent); border: 2px solid var(--card); }
      .tl-date { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
      .tl-desc { font-size: 12px; font-weight: 500; }
      .tl-amount { font-size: 11px; color: var(--pos); font-weight: 600; }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; }
      .maximize-btn:hover { color: var(--wd-accent); border-color: var(--wd-accent); }
      .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
      .footer { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right; }
    
      /* Enhanced interactivity */
      .card { transition: border-color .2s, box-shadow .2s; }
      .card:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); box-shadow: 0 2px 12px rgba(0,0,0,.08); }
      :root[data-theme="dark"] .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
      .btn, .maximize-btn, .hub-expand-btn { transition: all .15s ease; }
      [class*="-row"]:not(.form-grid):not(.field-row):not(.actions):not(.stats-row):not(.bar-row):not(.type-grid):not(.member-row):not(.funnel-row):not(.opp-row):not(.reports-row) { transition: background .15s; }
      @media (max-width: 480px) { .form-grid, .grid, .meta-grid, .totals-grid, .stats-row { grid-template-columns: 1fr !important; display: grid !important; flex-direction: column; } .stats-row { flex-wrap: wrap; } .stat-card { min-width: 0; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div><div class="title">Compensation Summary</div><div class="subtitle">Workday &middot; HR</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div id="root"><div class="loading">Loading compensation&hellip;</div></div>
      <div class="footer">Powered by <strong>workday / get_compensation</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var _isFS = false, _maxBtn = document.getElementById("maximizeBtn");
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      function money(n, cur) { var x = Number(n || 0); if (isNaN(x)) return String(n || "\u2014"); var sym = (cur === "EUR" ? "\u20ac" : cur === "GBP" ? "\u00a3" : "$"); return sym + x.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
      function _askCopilot(msg) { if (window.openai && typeof window.openai.sendFollowUpMessage === "function") window.openai.sendFollowUpMessage({ prompt: msg }); }
      var _components = [], _history = [];

      function render(d) {
        if (!d) { document.getElementById("root").innerHTML = '<div class="loading">No compensation data available.</div>'; reportHeight(); return; }
        var currency = d.currency || d.currencyCode || "USD";
        var base = d.baseSalary || d.base_salary || d.base || 0;
        var bonus = d.bonus || d.totalBonus || d.bonus_amount || 0;
        var total = d.totalCompensation || d.total_compensation || d.total || (Number(base) + Number(bonus));
        var components = d.components || d.compensationComponents || d.plans || [];
        var history = d.history || d.compensationHistory || d.changes || [];
        _components = components; _history = history;

        var html = '<div class="card"><div class="section-label">Overview</div><div class="totals-grid">';
        html += '<div class="total-cell"><div class="total-value">' + money(base, currency) + '</div><div class="total-label">Base Salary</div></div>';
        html += '<div class="total-cell"><div class="total-value">' + money(bonus, currency) + '</div><div class="total-label">Bonus</div></div>';
        html += '<div class="total-cell"><div class="total-value">' + money(total, currency) + '</div><div class="total-label">Total Comp</div></div>';
        html += '</div>';
        if (currency) html += '<div style="text-align:center;font-size:10px;color:var(--muted);margin-top:6px">Currency: ' + esc(currency) + '</div>';
        html += '</div>';

        if (components.length) {
          html += '<div class="card"><div class="section-label">Components</div>';
          var shown = _isFS ? components.length : Math.min(6, components.length);
          for (var i = 0; i < shown; i++) {
            var c = components[i];
            var cName = c.name || c.planName || c.component || c.descriptor || "Component";
            var cType = c.type || c.category || c.frequency || "";
            var cAmt = c.amount || c.value || c.annualAmount || 0;
            html += '<div class="comp-row" data-comp-idx="' + i + '"><div class="comp-name">' + esc(cName) + '</div>';
            if (cType) html += '<div class="comp-type">' + esc(cType) + '</div>';
            html += '<div class="comp-amount">' + money(cAmt, currency) + '</div></div>';
          }
          if (!_isFS && components.length > shown) html += '<div style="font-size:11px;color:var(--muted);margin-top:6px">+ ' + (components.length - shown) + ' more</div>';
          html += '</div>';
        }

        if (history.length) {
          var hShown = _isFS ? history.length : Math.min(4, history.length);
          html += '<div class="card"><div class="section-label">History</div><div class="timeline">';
          for (var j = 0; j < hShown; j++) {
            var h = history[j];
            var hDate = h.date || h.effectiveDate || h.effective_date || "";
            var hDesc = h.description || h.reason || h.changeReason || h.type || "Compensation Change";
            var hAmt = h.amount || h.newAmount || h.new_amount || "";
            html += '<div class="tl-item" data-hist-idx="' + j + '"><div class="tl-dot"></div><div class="tl-date">' + esc(hDate) + '</div><div class="tl-desc">' + esc(hDesc) + '</div>';
            if (hAmt) html += '<div class="tl-amount">' + money(hAmt, currency) + '</div>';
            html += '</div>';
          }
          if (!_isFS && history.length > hShown) html += '<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-left:4px">+ ' + (history.length - hShown) + ' more</div>';
          html += '</div></div>';
        }

        document.getElementById("root").innerHTML = html; reportHeight();

        // Wire up click handlers for comp rows
        var compRows = document.querySelectorAll('[data-comp-idx]');
        for (var ci = 0; ci < compRows.length; ci++) {
          compRows[ci].addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-comp-idx'), 10);
            var c = _components[idx]; if (!c) return;
            var cName = c.name || c.planName || c.component || c.descriptor || "Component";
            _askCopilot('Tell me more about my "' + cName + '" compensation component. What does it include and how is it calculated?');
          });
        }
        // Wire up click handlers for history items
        var histItems = document.querySelectorAll('[data-hist-idx]');
        for (var hi = 0; hi < histItems.length; hi++) {
          histItems[hi].addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-hist-idx'), 10);
            var h = _history[idx]; if (!h) return;
            var hDesc = h.description || h.reason || h.changeReason || h.type || "Compensation Change";
            var hDate = h.date || h.effectiveDate || h.effective_date || "";
            _askCopilot('Tell me more about my compensation change: "' + hDesc + '"' + (hDate ? ' effective ' + hDate : '') + '. What was the reason and impact?');
          });
        }
      }

      async function init() {
        if (toolOutput && (toolOutput.baseSalary || toolOutput.base_salary || toolOutput.base || toolOutput.totalCompensation || toolOutput.components)) { render(toolOutput); return; }
        if (window.openai && typeof window.openai.callTool === "function") { try { var out = await window.openai.callTool("get_compensation", toolInput); render((out && out.structuredContent) || out); } catch (e) { document.getElementById("root").innerHTML = '<div class="loading">' + esc(e.message || "Error loading compensation") + '</div>'; reportHeight(); } }
        else { document.getElementById("root").innerHTML = '<div class="loading">Skybridge unavailable.</div>'; reportHeight(); }
      }

      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; init(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }
      init();
    </script>
  </body>
</html>

  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)');function t(){if(!d.dataset.theme)d.dataset.theme=m.matches?'dark':'light';}t();m.addEventListener('change',function(){if(!d.getAttribute('data-theme'))t();});new MutationObserver(function(){}).observe(d,{attributes:true,attributeFilter:['data-theme']});})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14;
        --card: #151a21;
        --muted: #a9b1bd;
        --text: #e6edf3;
        --accent: #4cc2ff;
        --border: #1f2630;
        --pos: #2bd48f;
        --neg: #ff6b6b;
        --warn: #f0b232;
        --input-bg: #0f131a;
        --btn-bg: #152235;
        --btn-border: #243145;
        --btn-primary-bg: linear-gradient(135deg, #1a6dff, #4cc2ff);
        --btn-primary-border: #2a80ff;
        --success-border: #1a5a3a;
        --success-glow: rgba(43,212,143,.16);
        --error-bg: rgba(255,107,107,.08);
        --error-border: rgba(255,107,107,.25);
        --jira-accent: #0052cc;
        --jira-glow: rgba(0,82,204,.12);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5;
        --card: #ffffff;
        --muted: #65707d;
        --text: #1e1e1e;
        --accent: #0078d4;
        --border: #e0e0e0;
        --pos: #107c10;
        --neg: #d13438;
        --warn: #ca5010;
        --input-bg: #ffffff;
        --btn-bg: #f0f0f0;
        --btn-border: #d0d0d0;
        --btn-primary-bg: linear-gradient(135deg, #0078d4, #4cc2ff);
        --btn-primary-border: #0078d4;
        --success-border: #107c10;
        --success-glow: rgba(16,124,16,.08);
        --error-bg: rgba(209,52,56,.06);
        --error-border: rgba(209,52,56,.25);
        --jira-accent: #0052cc;
        --jira-glow: rgba(0,82,204,.08);
      }
      html, body { height: 100%; background: var(--bg); }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .wrap { padding: 16px; min-height: 100%; box-sizing: border-box; }
      .header {
        display: flex; align-items: center;
        justify-content: space-between; margin-bottom: 14px;
      }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .jira-icon {
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--jira-glow);
        border: 1px solid var(--jira-accent);
        display: flex; align-items: center; justify-content: center;
      }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { color: var(--muted); font-size: 12px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px; padding: 18px;
        margin-bottom: 14px;
      }
      .section-label {
        font-size: 11px; color: var(--jira-accent); text-transform: uppercase;
        letter-spacing: .8px; font-weight: 600; margin-bottom: 10px;
        padding-bottom: 6px; border-bottom: 1px solid var(--border);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .full-width { grid-column: 1 / -1; }
      .field label {
        display: block; font-size: 11px; color: var(--muted);
        text-transform: uppercase; letter-spacing: .5px;
        margin-bottom: 4px;
      }
      .field input, .field select, .field textarea {
        width: 100%; box-sizing: border-box;
        background: var(--input-bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 8px 10px; font-size: 13px; outline: none;
        font-family: inherit;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: var(--accent);
      }
      .field textarea { resize: vertical; }
      .field select option { background: var(--card); color: var(--text); }
      .actions { margin-top: 14px; display: flex; gap: 8px; }
      .btn {
        background: var(--btn-bg); color: var(--text);
        border: 1px solid var(--btn-border); border-radius: 8px;
        padding: 8px 16px; font-size: 12px; cursor: pointer;
      }
      .btn-primary {
        background: var(--btn-primary-bg);
        border-color: var(--btn-primary-border); font-weight: 600;
      }
      .btn:disabled { opacity: .5; cursor: default; }
      .badge {
        display: inline-block; padding: 2px 8px; border-radius: 6px;
        font-size: 10px; font-weight: 600; text-transform: uppercase;
      }
      .badge-status { background: var(--jira-glow); color: var(--jira-accent); border: 1px solid var(--jira-accent); }
      .badge-high { background: rgba(255,107,107,.15); color: var(--neg); border: 1px solid var(--neg); }
      .badge-medium { background: rgba(240,178,50,.12); color: var(--warn); border: 1px solid var(--warn); }
      .badge-low { background: rgba(43,212,143,.12); color: var(--pos); border: 1px solid var(--pos); }
      .meta-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 6px 12px; font-size: 12px; margin-top: 10px;
      }
      .meta-grid .label { color: var(--muted); }
      .meta-grid .value { color: var(--text); font-weight: 500; }
      .comments-list {
        margin-top: 8px; display: flex; flex-direction: column; gap: 8px;
      }
      .comment-item {
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 12px;
      }
      .comment-header {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 11px; color: var(--muted); margin-bottom: 4px;
      }
      .comment-author { font-weight: 600; color: var(--text); }
      .comment-body { font-size: 13px; line-height: 1.5; }
      .no-comments { font-size: 12px; color: var(--muted); font-style: italic; }
      .success-msg {
        margin-top: 10px; padding: 10px; border-radius: 8px;
        background: var(--success-glow); border: 1px solid var(--success-border);
        font-size: 12px; color: var(--pos);
      }
      .error-msg {
        margin-top: 10px; padding: 10px; border-radius: 8px;
        background: var(--error-bg); border: 1px solid var(--error-border);
        font-size: 12px; color: var(--neg);
      }
      .footer {
        margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right;
      }
      .maximize-btn {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 4px 8px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: color .15s, border-color .15s;
      }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }
      .labels-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
      .label-chip {
        background: var(--jira-glow); color: var(--jira-accent);
        border: 1px solid var(--jira-accent); border-radius: 6px;
        padding: 1px 6px; font-size: 10px; font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="jira-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--jira-accent)">
              <rect x="3" y="3" width="4" height="18" rx="1"/><rect x="10" y="3" width="4" height="12" rx="1"/><rect x="17" y="3" width="4" height="8" rx="1"/>
            </svg>
          </div>
          <div>
            <div class="title" id="pageTitle">Jira Issue</div>
            <div class="subtitle" id="pageSubtitle">Jira &middot; Issue Management</div>
          </div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>

      <!-- Detail view (shown when issue data is present) -->
      <div id="detailView" style="display:none;">
        <div class="card" id="detailCard"></div>

        <div class="card" id="commentsCard">
          <div class="section-label">Comments</div>
          <div id="commentsList" class="comments-list"></div>
        </div>

        <div class="card">
          <div class="section-label">Update Issue</div>
          <div class="form-grid">
            <div class="field full-width">
              <label for="upd_summary">Summary</label>
              <input id="upd_summary" type="text" placeholder="Update summary" />
            </div>
            <div class="field">
              <label for="upd_priority">Priority</label>
              <select id="upd_priority">
                <option value="">-- No change --</option>
                <option value="Highest">Highest</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
                <option value="Lowest">Lowest</option>
              </select>
            </div>
            <div class="field">
              <label for="upd_labels">Labels (comma-separated)</label>
              <input id="upd_labels" type="text" placeholder="e.g. compliance, urgent" />
            </div>
            <div class="field full-width">
              <label for="upd_description">Description</label>
              <textarea id="upd_description" rows="3" placeholder="Update description"></textarea>
            </div>
            <div class="field full-width">
              <label for="upd_comment">Add Comment</label>
              <textarea id="upd_comment" rows="2" placeholder="Write a comment..."></textarea>
            </div>
          </div>
          <div id="updateMsg"></div>
          <div class="actions">
            <button class="btn btn-primary" id="updateBtn">Update Issue</button>
          </div>
        </div>
      </div>

      <!-- Create form (shown when no issue data) -->
      <div id="createView">
        <div class="card">
          <div class="section-label">Create Issue</div>
          <div class="form-grid">
            <div class="field">
              <label for="cr_project">Project Key *</label>
              <input id="cr_project" type="text" placeholder="e.g. PROJ" />
            </div>
            <div class="field">
              <label for="cr_type">Issue Type</label>
              <select id="cr_type">
                <option value="Task">Task</option>
                <option value="Bug">Bug</option>
                <option value="Story">Story</option>
                <option value="Epic">Epic</option>
              </select>
            </div>
            <div class="field full-width">
              <label for="cr_summary">Summary *</label>
              <input id="cr_summary" type="text" placeholder="Brief summary of the issue" />
            </div>
            <div class="field">
              <label for="cr_priority">Priority</label>
              <select id="cr_priority">
                <option value="Medium">Medium</option>
                <option value="Highest">Highest</option>
                <option value="High">High</option>
                <option value="Low">Low</option>
                <option value="Lowest">Lowest</option>
              </select>
            </div>
            <div class="field">
              <label for="cr_labels">Labels (comma-separated)</label>
              <input id="cr_labels" type="text" placeholder="e.g. compliance, urgent" />
            </div>
            <div class="field full-width">
              <label for="cr_description">Description</label>
              <textarea id="cr_description" rows="4" placeholder="Detailed description of the issue"></textarea>
            </div>
          </div>
          <div id="createMsg"></div>
          <div class="actions">
            <button class="btn btn-primary" id="createBtn" disabled>Create Issue</button>
            <button class="btn" id="resetBtn">Reset</button>
          </div>
        </div>
      </div>

      <div class="footer">Powered by <strong>jira</strong> via MCP</div>
    </div>

    <script>
      /* ---- Data access (Skybridge pattern) ---- */
      var toolInput  = (window.openai && window.openai.toolInput)  || {};
      var toolOutput = (window.openai && window.openai.toolOutput) || {};

      var SESSION_KEY = "jira_widget_issue";

      function saveIssueToSession(issue) {
        try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(issue)); } catch(e) {}
      }
      function loadIssueFromSession() {
        try { var s = sessionStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
      }
      function clearIssueSession() {
        try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
      }

      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

      function fmtDate(iso) {
        if (!iso) return "—";
        try { return new Date(iso).toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" }); }
        catch { return iso; }
      }

      function priorityBadge(p) {
        if (!p) return "";
        var cls = "badge-medium";
        var lp = (p || "").toLowerCase();
        if (lp === "highest" || lp === "high") cls = "badge-high";
        else if (lp === "low" || lp === "lowest") cls = "badge-low";
        return '<span class="badge ' + cls + '">' + esc(p) + '</span>';
      }

      function reportHeight() {
        if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") {
          window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
        }
      }

      /* ---- Elements ---- */
      var detailView  = document.getElementById("detailView");
      var createView  = document.getElementById("createView");
      var detailCard  = document.getElementById("detailCard");
      var commentsList= document.getElementById("commentsList");
      var updateBtn   = document.getElementById("updateBtn");
      var updateMsg   = document.getElementById("updateMsg");
      var createBtn   = document.getElementById("createBtn");
      var resetBtn    = document.getElementById("resetBtn");
      var createMsg   = document.getElementById("createMsg");
      var currentKey  = null;

      /* ---- Determine mode: detail/update vs create ---- */
      var issueData = toolOutput.issue || toolOutput;
      var comments  = toolOutput.comments || [];
      var hasIssue  = !!(issueData && issueData.key);

      if (hasIssue) {
        saveIssueToSession(issueData);
        showDetailView(issueData, comments);
      } else {
        // Check if a prior create in the same session produced an issue
        var sessionIssue = loadIssueFromSession();
        if (sessionIssue) {
          showDetailView(sessionIssue, []);
        } else {
          showCreateView();
        }
      }

      function showDetailView(issue, cmnts) {
        currentKey = issue.key;
        createView.style.display = "none";
        detailView.style.display = "block";

        document.getElementById("pageTitle").textContent = issue.key;
        document.getElementById("pageSubtitle").textContent =
          (issue.project || issue.projectKey || "Jira") + " \u00b7 " + (issue.issueType || "Issue");

        var labelsHtml = "";
        if (issue.labels && issue.labels.length) {
          labelsHtml = '<div class="labels-wrap">' +
            issue.labels.map(function(l) { return '<span class="label-chip">' + esc(l) + '</span>'; }).join("") +
            '</div>';
        }

        var descText = issue.description || "";
        if (typeof descText === "object") descText = "(ADF content)";

        detailCard.innerHTML =
          '<div class="section-label">Issue Details</div>' +
          '<div style="font-size:15px;font-weight:600;margin-bottom:8px;">' + esc(issue.summary) + '</div>' +
          '<div style="display:flex;gap:6px;margin-bottom:10px;">' +
            '<span class="badge badge-status">' + esc(issue.status || "Unknown") + '</span>' +
            priorityBadge(issue.priority) +
          '</div>' +
          (descText ? '<div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5;">' + esc(descText) + '</div>' : '') +
          labelsHtml +
          '<div class="meta-grid">' +
            '<span class="label">Assignee</span><span class="value">' + esc(issue.assignee || "Unassigned") + '</span>' +
            '<span class="label">Reporter</span><span class="value">' + esc(issue.reporter || "—") + '</span>' +
            '<span class="label">Created</span><span class="value">' + fmtDate(issue.created) + '</span>' +
            '<span class="label">Updated</span><span class="value">' + fmtDate(issue.updated) + '</span>' +
            '<span class="label">Due Date</span><span class="value">' + fmtDate(issue.duedate) + '</span>' +
            '<span class="label">Project</span><span class="value">' + esc(issue.projectKey || issue.project || "—") + '</span>' +
          '</div>';

        /* Comments */
        if (cmnts && cmnts.length) {
          commentsList.innerHTML = cmnts.map(function(c) {
            return '<div class="comment-item">' +
              '<div class="comment-header">' +
                '<span class="comment-author">' + esc(c.author || "Unknown") + '</span>' +
                '<span>' + fmtDate(c.created) + '</span>' +
              '</div>' +
              '<div class="comment-body">' + esc(c.body || "") + '</div>' +
            '</div>';
          }).join("");
        } else {
          commentsList.innerHTML = '<div class="no-comments">No comments yet.</div>';
        }

        /* Pre-populate update fields */
        document.getElementById("upd_summary").value = issue.summary || "";
        var descVal = issue.description || "";
        if (typeof descVal === "object") descVal = "";
        document.getElementById("upd_description").value = descVal;
        if (issue.labels && issue.labels.length) {
          document.getElementById("upd_labels").value = issue.labels.join(", ");
        }

        reportHeight();
      }

      function showCreateView() {
        detailView.style.display = "none";
        createView.style.display = "block";
        document.getElementById("pageTitle").textContent = "Create Jira Issue";
        document.getElementById("pageSubtitle").textContent = "Jira \u00b7 New Issue";

        /* Pre-populate from toolInput */
        var inp = toolInput || {};
        if (inp.project_key) document.getElementById("cr_project").value = inp.project_key;
        if (inp.summary)     document.getElementById("cr_summary").value = inp.summary;
        if (inp.description) document.getElementById("cr_description").value = inp.description;
        if (inp.issue_type)  document.getElementById("cr_type").value = inp.issue_type;
        if (inp.priority)    document.getElementById("cr_priority").value = inp.priority;
        if (inp.labels && Array.isArray(inp.labels)) document.getElementById("cr_labels").value = inp.labels.join(", ");

        validateCreate();
        reportHeight();
      }

      /* ---- Create form validation ---- */
      function validateCreate() {
        var proj = document.getElementById("cr_project").value.trim();
        var summ = document.getElementById("cr_summary").value.trim();
        createBtn.disabled = !(proj && summ);
      }
      ["cr_project", "cr_summary"].forEach(function(id) {
        var el = document.getElementById(id);
        el.addEventListener("input", validateCreate);
        el.addEventListener("change", validateCreate);
      });

      resetBtn.addEventListener("click", function() {
        ["cr_project","cr_summary","cr_description","cr_labels"].forEach(function(id) {
          document.getElementById(id).value = "";
        });
        document.getElementById("cr_type").value = "Task";
        document.getElementById("cr_priority").value = "Medium";
        createMsg.innerHTML = "";
        createBtn.disabled = true;
        clearIssueSession();
        reportHeight();
      });

      /* ---- Create issue ---- */
      createBtn.addEventListener("click", async function() {
        if (!window.openai || typeof window.openai.callTool !== "function") return;
        createBtn.disabled = true;
        createBtn.textContent = "Creating\u2026";
        createMsg.innerHTML = "";

        try {
          var args = {
            project_key: document.getElementById("cr_project").value.trim(),
            summary: document.getElementById("cr_summary").value.trim(),
            issue_type: document.getElementById("cr_type").value,
          };
          var pri = document.getElementById("cr_priority").value;
          if (pri) args.priority = pri;
          var desc = document.getElementById("cr_description").value.trim();
          if (desc) args.description = desc;
          var lbls = document.getElementById("cr_labels").value.trim();
          if (lbls) args.labels = lbls.split(",").map(function(l) { return l.trim(); }).filter(Boolean);

          var output = await window.openai.callTool("create_issue", args);
          var data = output;
          if (output && output.structuredContent) data = output.structuredContent;

          if (!data || !data.created) {
            throw new Error((data && data.error) || "Issue creation failed");
          }

          /* Persist so remount after maximize restores detail view */
          if (data.issue) saveIssueToSession(data.issue);

          /* Switch to detail view */
          showDetailView(data.issue, []);
          createMsg.innerHTML = "";

        } catch (err) {
          createMsg.innerHTML = '<div class="error-msg">' + esc(err.message || "Creation failed") + '</div>';
          createBtn.textContent = "Create Issue";
          validateCreate();
        }
        reportHeight();
      });

      /* ---- Update issue ---- */
      updateBtn.addEventListener("click", async function() {
        if (!window.openai || typeof window.openai.callTool !== "function" || !currentKey) return;
        updateBtn.disabled = true;
        updateBtn.textContent = "Updating\u2026";
        updateMsg.innerHTML = "";

        try {
          var args = { key: currentKey };
          var summ = document.getElementById("upd_summary").value.trim();
          if (summ) args.summary = summ;
          var pri = document.getElementById("upd_priority").value;
          if (pri) args.priority = pri;
          var desc = document.getElementById("upd_description").value.trim();
          if (desc) args.description = desc;
          var lbls = document.getElementById("upd_labels").value.trim();
          if (lbls) args.labels = lbls.split(",").map(function(l) { return l.trim(); }).filter(Boolean);
          var cmt = document.getElementById("upd_comment").value.trim();
          if (cmt) args.comment = cmt;

          var output = await window.openai.callTool("update_issue", args);
          var data = output;
          if (output && output.structuredContent) data = output.structuredContent;

          if (!data || !data.success) {
            throw new Error((data && data.error) || "Update failed");
          }

          updateMsg.innerHTML = '<div class="success-msg">\u2713 Issue ' + esc(currentKey) + ' updated successfully.</div>';

          /* Clear comment field on success */
          document.getElementById("upd_comment").value = "";
          document.getElementById("upd_description").value = "";
          document.getElementById("upd_priority").value = "";

          /* Refresh detail if we have a new issue snapshot */
          if (data.issue) {
            showDetailView(data.issue, []);
            updateMsg.innerHTML = '<div class="success-msg">\u2713 Issue ' + esc(currentKey) + ' updated successfully.</div>';
          }

        } catch (err) {
          updateMsg.innerHTML = '<div class="error-msg">' + esc(err.message || "Update failed") + '</div>';
        } finally {
          updateBtn.disabled = false;
          updateBtn.textContent = "Update Issue";
          reportHeight();
        }
      });

      /* ---- Display Mode (maximize / restore) ---- */
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      var _isFullscreen = false;
      var _maxBtn = document.getElementById("maximizeBtn");

      async function toggleFullscreen() {
        if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return;
        var mode = _isFullscreen ? "inline" : "fullscreen";
        try {
          await window.openai.requestDisplayMode({ mode: mode });
          _isFullscreen = !_isFullscreen;
          _maxBtn.innerHTML = _isFullscreen ? _collapseSvg : _expandSvg;
          _maxBtn.title = _isFullscreen ? "Restore" : "Maximize";
          reportHeight();
        } catch (e) { /* host denied */ }
      }

      if (_maxBtn) {
        if (window.openai && typeof window.openai.requestDisplayMode === "function") {
          _maxBtn.addEventListener("click", toggleFullscreen);
        } else {
          _maxBtn.style.display = "none";
        }
      }

      reportHeight();
    </script>
  </body>
</html>

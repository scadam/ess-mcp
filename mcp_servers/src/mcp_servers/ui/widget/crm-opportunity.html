  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="sf-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--sf-accent)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div><div class="title" id="pageTitle">Create Opportunity</div><div class="subtitle" id="pageSubtitle">Salesforce &middot; CRM</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div class="card">
        <div class="section-label">Opportunity Details</div>
        <div class="form-grid">
          <div class="field full-width"><label for="opp_name">Opportunity Name *</label><input id="opp_name" type="text" placeholder="e.g. Contoso &mdash; Q2 Renewal" /></div>
          <div class="field">
            <label for="account_search">Account Name</label>
            <div class="typeahead-wrap">
              <input id="account_search" type="text" placeholder="Search accounts&hellip;" autocomplete="off" />
              <div class="ta-spinner" id="acctSpinner"></div>
              <div class="ta-dropdown" id="acctDropdown"></div>
            </div>
            <input type="hidden" id="account_id" />
            <div id="acctTag"></div>
          </div>
          <div class="field"><label for="stage_name">Stage</label><select id="stage_name"><option value="Prospecting">Prospecting</option><option value="Qualification">Qualification</option><option value="Needs Analysis">Needs Analysis</option><option value="Value Proposition">Value Proposition</option><option value="Proposal/Price Quote">Proposal/Price Quote</option><option value="Negotiation/Review">Negotiation/Review</option><option value="Closed Won">Closed Won</option><option value="Closed Lost">Closed Lost</option></select></div>
          <div class="field">
            <label for="contact_search">Contact</label>
            <div class="typeahead-wrap">
              <input id="contact_search" type="text" placeholder="Select an account first" autocomplete="off" disabled />

            <input type="hidden" id="contact_id" />
            <div id="contactTag"></div>

          <div class="field"><label for="amount">Amount ($)</label><input id="amount" type="number" step="0.01" min="0" placeholder="0.00" /></div>
          <div class="field"><label for="close_date">Close Date</label><input id="close_date" type="date" /></div>
          <div class="field full-width"><label for="description">Description</label><textarea id="description" rows="3" placeholder="Additional details about this opportunity"></textarea></div>
        </div>
        <div id="msgArea"></div>
        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" disabled>Create Opportunity</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </div>
      <div class="footer" id="footerText">Powered by <strong>salesforce / create_opportunity</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var nameEl = document.getElementById("opp_name"), acctSearchEl = document.getElementById("account_search"), acctIdEl = document.getElementById("account_id"), acctDropdown = document.getElementById("acctDropdown"), acctSpinner = document.getElementById("acctSpinner"), acctTagEl = document.getElementById("acctTag");
      var contactSearchEl = document.getElementById("contact_search"), contactIdEl = document.getElementById("contact_id"), contactDropdown = document.getElementById("contactDropdown"), contactSpinner = document.getElementById("contactSpinner"), contactTagEl = document.getElementById("contactTag");
      var stageEl = document.getElementById("stage_name"), amtEl = document.getElementById("amount"), dateEl = document.getElementById("close_date"), descEl = document.getElementById("description"), submitBtn = document.getElementById("submitBtn"), resetBtn = document.getElementById("resetBtn"), msgArea = document.getElementById("msgArea"), _maxBtn = document.getElementById("maximizeBtn");
      var _isFS = false, isUpdate = false, currentOppId = null;
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';

      function debounce(fn, ms) { var t; return function() { var a = arguments, c = this; clearTimeout(t); t = setTimeout(function() { fn.apply(c, a); }, ms); }; }

      document.addEventListener("click", function(e) {
        if (!acctSearchEl.contains(e.target) && !acctDropdown.contains(e.target)) { acctDropdown.classList.remove("open"); acctActiveIdx = -1; }

      function renderDropdown(dropdown, items, emptyMsg, onSelect, activeIdxRef) {

        reportHeight();

      function clearAccount() {
        acctIdEl.value = ""; acctSearchEl.value = ""; acctSearchEl.style.display = ""; acctTagEl.innerHTML = "";

        reportHeight();
      }

      var doAccountSearch = debounce(async function(query) {

          var accounts = (data && data.accounts) || (Array.isArray(data) ? data : []);
          acctResults = accounts.map(function(a) { return { id: a.id || a.account_id || "", label: a.name || a.account_name || a.Name || "", sub: a.id || a.account_id || "" }; });

      function selectContact(item) {
        contactIdEl.value = item.id;
        contactSearchEl.value = item.label;
        contactDropdown.classList.remove("open");
        contactIdxRef.val = -1;
        showTag(contactTagEl, item.label, clearContact);
        contactSearchEl.style.display = "none";
        reportHeight();
      }

      function clearContact() { contactIdEl.value = ""; contactSearchEl.value = ""; contactSearchEl.style.display = ""; contactTagEl.innerHTML = ""; reportHeight(); }

      var doContactSearch = debounce(async function(query) {

          var out = await window.openai.callTool("list_contacts", { account_id: acctIdEl.value, search_text: query, limit: 5 });

      contactSearchEl.addEventListener("keydown", function(e) { handleKeys(e, contactDropdown, contactResults, contactIdxRef, selectContact); });

      /* ── Create / Update mode ── */
      function enterUpdateMode(oppId, subtitle) {
        isUpdate = true; currentOppId = oppId;
        submitBtn.textContent = "Update Opportunity";
        document.getElementById("pageTitle").textContent = "Update Opportunity";
        if (subtitle) document.getElementById("pageSubtitle").textContent = "Salesforce \u00b7 " + subtitle;
        document.getElementById("footerText").innerHTML = 'Powered by <strong>salesforce / update_opportunity</strong> via MCP';
      }

      function enterCreateMode() {
        isUpdate = false; currentOppId = null;
        submitBtn.textContent = "Create Opportunity";
        document.getElementById("pageTitle").textContent = "Create Opportunity";
        document.getElementById("pageSubtitle").textContent = "Salesforce \u00b7 CRM";
        document.getElementById("footerText").innerHTML = 'Powered by <strong>salesforce / create_opportunity</strong> via MCP';
      }

      /* ── Submit handler ── */
      submitBtn.addEventListener("click", async function() {
        if (!window.openai || typeof window.openai.callTool !== "function") return;

          var output;

            var updateArgs = { opportunity_id: currentOppId };
            if (nameEl.value.trim()) updateArgs.name = nameEl.value.trim();
            if (stageEl.value) updateArgs.stage_name = stageEl.value;
            if (acctIdEl.value) updateArgs.account_id = acctIdEl.value;
            if (amtEl.value) updateArgs.amount = Number(amtEl.value);
            if (dateEl.value) updateArgs.close_date = dateEl.value;
            if (descEl.value.trim()) updateArgs.description = descEl.value.trim();

          } else {
            var args = { name: nameEl.value.trim(), stage_name: stageEl.value };
            if (acctIdEl.value) args.account_id = acctIdEl.value;
            if (amtEl.value) args.amount = Number(amtEl.value);
            if (dateEl.value) args.close_date = dateEl.value;
            if (descEl.value.trim()) args.description = descEl.value.trim();
            output = await window.openai.callTool("create_opportunity", args);

            msgArea.innerHTML = '<div class="success-msg">&#10003; Opportunity <strong>' + esc(opp.name || nameEl.value) + '</strong> created successfully.</div>';
          }
        } catch (err) { msgArea.innerHTML = '<div class="error-msg">' + esc(err.message || "Operation failed") + '</div>'; }
        finally { submitBtn.textContent = isUpdate ? "Update Opportunity" : "Create Opportunity"; validate(); reportHeight(); }
      });

      /* ── Reset ── */
      resetBtn.addEventListener("click", function() {
        nameEl.value = ""; clearAccount(); clearContact(); disableContact();
        stageEl.value = "Prospecting"; amtEl.value = ""; dateEl.value = ""; descEl.value = "";

      /* ── Fullscreen toggle ── */

      set(stageEl, src.stage_name || "Prospecting");
      set(amtEl, src.amount);
      set(dateEl, src.close_date);
      set(descEl, src.description);

      // Pre-fill account

      if (toolOutput.account_candidates && Array.isArray(toolOutput.account_candidates) && toolOutput.account_candidates.length > 0) {
        acctResults = toolOutput.account_candidates.map(function(a) { return { id: a.id || a.account_id || "", label: a.name || a.account_name || a.Name || "", sub: a.id || a.account_id || "" }; });
        acctSearchEl.addEventListener("focus", function() { if (!acctIdEl.value) { renderDropdown(acctDropdown, acctResults, "", selectAccount, acctIdxRef); } }, { once: true });
      }

      validate(); reportHeight();
    </script>
  </body>
</html>

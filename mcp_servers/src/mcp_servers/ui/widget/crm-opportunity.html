<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)');function t(){if(!d.dataset.theme)d.dataset.theme=m.matches?'dark':'light';}t();m.addEventListener('change',function(){if(!d.getAttribute('data-theme'))t();});new MutationObserver(function(){}).observe(d,{attributes:true,attributeFilter:['data-theme']});})()</script>
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3; --accent: #4cc2ff; --border: #1f2630; --pos: #2bd48f; --neg: #ff6b6b; --warn: #f0b232; --input-bg: #0f131a; --btn-bg: #152235; --btn-border: #243145; --btn-primary-bg: linear-gradient(135deg,#1a6dff,#4cc2ff); --btn-primary-border: #2a80ff; --success-border: #1a5a3a; --success-glow: rgba(43,212,143,.16); --error-bg: rgba(255,107,107,.08); --error-border: rgba(255,107,107,.25); --sf-accent: #1589ee; --sf-glow: rgba(21,137,238,.14); }
      :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e; --accent: #0078d4; --border: #e0e0e0; --pos: #107c10; --neg: #d13438; --warn: #ca5010; --input-bg: #ffffff; --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --btn-primary-bg: linear-gradient(135deg,#0078d4,#4cc2ff); --btn-primary-border: #0078d4; --success-border: #107c10; --success-glow: rgba(16,124,16,.08); --error-bg: rgba(209,52,56,.06); --error-border: rgba(209,52,56,.25); --sf-accent: #0070d2; --sf-glow: rgba(0,112,210,.08); }
      html, body { margin: 0; background: var(--bg); }
      body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .sf-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--sf-glow); border: 1px solid var(--sf-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .title { font-size: 16px; font-weight: 600; } .subtitle { color: var(--muted); font-size: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
      .section-label { font-size: 11px; color: var(--sf-accent); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .full-width { grid-column: 1 / -1; }
      .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
      .field input, .field select, .field textarea { width: 100%; box-sizing: border-box; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; font-family: inherit; }
      .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--sf-accent); }
      .field select option { background: var(--card); color: var(--text); }
      .field textarea { resize: vertical; }
      .actions { margin-top: 14px; display: flex; gap: 8px; }
      .btn { background: var(--btn-bg); color: var(--text); border: 1px solid var(--btn-border); border-radius: 8px; padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: inherit; }
      .btn-primary { background: var(--btn-primary-bg); border-color: var(--btn-primary-border); font-weight: 600; }
      .btn:disabled { opacity: .5; cursor: default; }
      .success-msg { margin-top: 10px; padding: 10px; border-radius: 8px; background: var(--success-glow); border: 1px solid var(--success-border); font-size: 12px; color: var(--pos); }
      .error-msg { margin-top: 10px; padding: 10px; border-radius: 8px; background: var(--error-bg); border: 1px solid var(--error-border); font-size: 12px; color: var(--neg); }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; }
      .maximize-btn:hover { color: var(--sf-accent); border-color: var(--sf-accent); }
      .footer { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="sf-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--sf-accent)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div><div class="title" id="pageTitle">Create Opportunity</div><div class="subtitle">Salesforce &middot; CRM</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div class="card">
        <div class="section-label">Opportunity Details</div>
        <div class="form-grid">
          <div class="field full-width"><label for="opp_name">Opportunity Name *</label><input id="opp_name" type="text" placeholder="e.g. Contoso &mdash; Q2 Renewal" /></div>
          <div class="field"><label for="account_id">Account ID</label><input id="account_id" type="text" placeholder="Salesforce Account ID" /></div>
          <div class="field"><label for="stage_name">Stage</label><select id="stage_name"><option value="Prospecting">Prospecting</option><option value="Qualification">Qualification</option><option value="Needs Analysis">Needs Analysis</option><option value="Value Proposition">Value Proposition</option><option value="Proposal/Price Quote">Proposal/Price Quote</option><option value="Negotiation/Review">Negotiation/Review</option><option value="Closed Won">Closed Won</option><option value="Closed Lost">Closed Lost</option></select></div>
          <div class="field"><label for="amount">Amount ($)</label><input id="amount" type="number" step="0.01" min="0" placeholder="0.00" /></div>
          <div class="field"><label for="close_date">Close Date</label><input id="close_date" type="date" /></div>
          <div class="field full-width"><label for="description">Description</label><textarea id="description" rows="3" placeholder="Additional details about this opportunity"></textarea></div>
        </div>
        <div id="msgArea"></div>
        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" disabled>Create Opportunity</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </div>
      <div class="footer">Powered by <strong>salesforce / create_opportunity</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var nameEl = document.getElementById("opp_name"), acctEl = document.getElementById("account_id"), stageEl = document.getElementById("stage_name"), amtEl = document.getElementById("amount"), dateEl = document.getElementById("close_date"), descEl = document.getElementById("description"), submitBtn = document.getElementById("submitBtn"), resetBtn = document.getElementById("resetBtn"), msgArea = document.getElementById("msgArea"), _maxBtn = document.getElementById("maximizeBtn");
      var _isFS = false;
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      function validate() { submitBtn.disabled = !nameEl.value.trim(); }
      nameEl.addEventListener("input", validate);
      function set(el, v) { if (el && v !== undefined && v !== null && v !== "") el.value = v; }
      var src = Object.assign({}, toolOutput, toolInput);
      set(nameEl, src.name); set(acctEl, src.account_id); set(stageEl, src.stage_name || "Prospecting"); set(amtEl, src.amount); set(dateEl, src.close_date); set(descEl, src.description);
      validate();
      resetBtn.addEventListener("click", function() { nameEl.value=""; acctEl.value=""; stageEl.value="Prospecting"; amtEl.value=""; dateEl.value=""; descEl.value=""; msgArea.innerHTML=""; validate(); reportHeight(); });
      submitBtn.addEventListener("click", async function() {
        if (!window.openai || typeof window.openai.callTool !== "function") return;
        submitBtn.disabled = true; submitBtn.textContent = "Creating\u2026"; msgArea.innerHTML = "";
        try {
          var args = { name: nameEl.value.trim(), stage_name: stageEl.value };
          if (acctEl.value.trim()) args.account_id = acctEl.value.trim();
          if (amtEl.value) args.amount = Number(amtEl.value);
          if (dateEl.value) args.close_date = dateEl.value;
          if (descEl.value.trim()) args.description = descEl.value.trim();
          var out = await window.openai.callTool("create_opportunity", args);
          var d = (out && out.structuredContent) || out;
          if (d && d.created) { var opp = d.opportunity || {}; msgArea.innerHTML = '<div class="success-msg">&#10003; Opportunity <strong>'+esc(opp.name||nameEl.value)+'</strong> created successfully.</div>'; document.getElementById("pageTitle").textContent = "Opportunity Created"; }
          else throw new Error((d && d.error) || "Creation failed");
        } catch (err) { msgArea.innerHTML = '<div class="error-msg">'+esc(err.message||"Operation failed")+'</div>'; }
        finally { submitBtn.textContent = "Create Opportunity"; validate(); reportHeight(); }
      });
      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; reportHeight(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }
      reportHeight();
    </script>
  </body>
</html>

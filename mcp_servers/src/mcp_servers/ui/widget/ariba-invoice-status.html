<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(0,180,216,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --ariba-accent: #00b4d8; --ariba-glow: rgba(0,180,216,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(0,150,180,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --ariba-accent: #0096b4; --ariba-glow: rgba(0,150,180,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 520px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--ariba-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--ariba-glow); }
      .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
      .inv-number { font-size: 18px; font-weight: 600; }
      .inv-total { font-size: 18px; font-weight: 700; color: var(--ariba-accent); }
      .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 4px; }
      .status-pending { background: rgba(210,153,0,.15); color: #d29900; }
      .status-approved { background: rgba(46,160,67,.15); color: #3fb950; }
      .status-paid { background: rgba(56,139,253,.15); color: #388bfd; }
      .status-rejected { background: rgba(248,81,73,.15); color: #f85149; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
      .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
      .field span { font-size: 14px; }
      .field.full { grid-column: 1 / -1; }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--ariba-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        invoiceNumber: "INV-2026-00487",
        status: "pending",
        total: 12450.00,
        currency: "USD",
        supplierName: "Acme Industrial Supply Co.",
        invoiceDate: "2026-04-10",
        dueDate: "2026-05-10",
        poReference: "PO-2026-01234",
        paymentStatus: "Awaiting Approval"
      };

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const d = data;
          const st = (d.status || '').toLowerCase();
          const statusClass = st === 'approved' ? 'status-approved' : st === 'paid' ? 'status-paid' : st === 'rejected' ? 'status-rejected' : 'status-pending';
          const statusLabel = st.charAt(0).toUpperCase() + st.slice(1) || 'Pending';
          const fmt = (v, c) => v != null ? new Intl.NumberFormat('en-US', { style: 'currency', currency: c || 'USD' }).format(v) : '—';

          root.innerHTML = `
            <div class="header"><div class="icon">A</div><h1>Invoice Status</h1></div>
            <div class="card">
              <div class="top-row">
                <div>
                  <div class="inv-number">${d.invoiceNumber || '—'}</div>
                  <span class="status-pill ${statusClass}">${statusLabel}</span>
                </div>
                <div class="inv-total">${fmt(d.total, d.currency)}</div>
              </div>
              <hr class="divider" />
              <div class="fields">
                <div class="field full"><label>Supplier</label><span>${d.supplierName || '—'}</span></div>
                <div class="field"><label>Invoice Date</label><span>${d.invoiceDate || '—'}</span></div>
                <div class="field"><label>Due Date</label><span>${d.dueDate || '—'}</span></div>
                <div class="field"><label>PO Reference</label><span>${d.poReference || '—'}</span></div>
                <div class="field"><label>Payment Status</label><span>${d.paymentStatus || '—'}</span></div>
              </div>
            </div>`;
        } catch (e) {
          root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Invoice Status</h1></div><div class="card"><div class="error">Unable to load invoice details.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

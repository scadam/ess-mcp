<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(0,180,216,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --ariba-accent: #00b4d8; --ariba-glow: rgba(0,180,216,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(0,150,180,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --ariba-accent: #0096b4; --ariba-glow: rgba(0,150,180,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 600px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--ariba-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--ariba-glow); }
      table { width: 100%; border-collapse: collapse; }
      th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
      td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
      tr:last-child td { border-bottom: none; }
      .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
      .status-received { background: rgba(46,160,67,.15); color: #3fb950; }
      .status-partial { background: rgba(210,153,0,.15); color: #d29900; }
      .status-pending { background: rgba(139,148,158,.15); color: #8b949e; }
      .expand-btn { background: none; border: none; color: var(--ariba-accent); cursor: pointer; font-size: 13px; font-weight: 600; }
      .expand-btn:hover { text-decoration: underline; }
      .line-items { display: none; padding: 8px 10px; }
      .line-items.open { display: block; }
      .line-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: var(--muted); }
      .empty { text-align: center; padding: 24px; color: var(--muted); }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--ariba-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        receipts: [
          { receiptDate: "2026-04-15", poNumber: "PO-2026-01234", status: "received", receivedBy: "Jane Doe", lineItems: [{ description: "Office Chairs (Ergonomic)", quantity: 10, unit: "EA" }, { description: "Standing Desks", quantity: 5, unit: "EA" }] },
          { receiptDate: "2026-04-12", poNumber: "PO-2026-01200", status: "partial", receivedBy: "John Smith", lineItems: [{ description: "Laptop Docking Stations", quantity: 15, unit: "EA" }] },
          { receiptDate: "2026-04-08", poNumber: "PO-2026-01180", status: "received", receivedBy: "Jane Doe", lineItems: [{ description: "Printer Paper A4", quantity: 50, unit: "BOX" }, { description: "Toner Cartridges", quantity: 20, unit: "EA" }] }
        ]
      };

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const list = data.receipts || data.results || [];
          if (!list.length) {
            root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Receipts</h1></div><div class="card"><div class="empty">No receipts found.</div></div>`;
            return;
          }

          const statusPill = (s) => {
            const sl = (s || '').toLowerCase();
            const cls = sl === 'received' ? 'status-received' : sl === 'partial' ? 'status-partial' : 'status-pending';
            return `<span class="status-pill ${cls}">${s || '—'}</span>`;
          };

          const rows = list.map((r, i) => {
            const lines = (r.lineItems || []).map(l => `<div class="line-item"><span>${l.description || '—'}</span><span>${l.quantity || 0} ${l.unit || ''}</span></div>`).join('');
            return `<tr>
              <td>${r.receiptDate || '—'}</td>
              <td>${r.poNumber || '—'}</td>
              <td>${statusPill(r.status)}</td>
              <td>${r.receivedBy || '—'}</td>
              <td><button class="expand-btn" onclick="toggleLines(${i})">▸ Lines</button></td>
            </tr>
            <tr><td colspan="5"><div class="line-items" id="lines-${i}">${lines || '<div class="line-item">No line items</div>'}</div></td></tr>`;
          }).join('');

          root.innerHTML = `
            <div class="header"><div class="icon">A</div><h1>Receipts</h1></div>
            <div class="card">
              <table>
                <thead><tr><th>Date</th><th>PO #</th><th>Status</th><th>Received By</th><th></th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        } catch (e) {
          root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Receipts</h1></div><div class="card"><div class="error">Unable to load receipts.</div></div>`;
        }
      })();

      function toggleLines(i) {
        const el = document.getElementById('lines-' + i);
        if (el) el.classList.toggle('open');
      }
    </script>
  </body>
</html>

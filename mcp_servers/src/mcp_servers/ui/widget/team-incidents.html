<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --pos: #2bd48f; --warn: #f0b232;
        --neg: #ff6b6b; --pill-border: #253040; --card-hover-border: #2a3442;
        --tag-bg: #0f131a; --btn-bg: #152235; --btn-border: #243145;
        --bar-bg: #1a2233; --sn-accent: #3eb489; --sn-glow: rgba(62,180,137,.12);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --pos: #107c10; --warn: #ca5010;
        --neg: #d13438; --pill-border: #d0d0d0; --card-hover-border: #c8c8c8;
        --tag-bg: #f5f5f5; --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --bar-bg: #e8e8e8; --sn-accent: #2e9968; --sn-glow: rgba(46,153,104,.08);
      }
      html, body { height: 100%; background: var(--bg); }
      body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .sn-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--sn-glow); border: 1px solid var(--sn-accent); display: flex; align-items: center; justify-content: center; }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { color: var(--muted); font-size: 12px; }
      .total-stat { text-align: center; padding: 12px 0 8px; font-size: 28px; font-weight: 700; color: var(--accent); }
      .total-label { font-size: 12px; color: var(--muted); font-weight: 400; }
      .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 12px 0 6px; }
      .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
      .pill { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; border: 1px solid var(--pill-border); }
      .pill-critical { background: rgba(255,107,107,.15); color: var(--neg); border-color: var(--neg); }
      .pill-high { background: rgba(240,178,50,.15); color: var(--warn); border-color: var(--warn); }
      .pill-medium { background: rgba(240,220,50,.12); color: #e0c030; border-color: #c0a828; }
      .pill-low { background: rgba(43,212,143,.12); color: var(--pos); border-color: var(--pos); }
      .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
      .bar-name { width: 90px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
      .bar-track { flex: 1; height: 16px; background: var(--bar-bg); border-radius: 4px; overflow: hidden; }
      .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; min-width: 2px; transition: width .3s; }
      .bar-count { width: 28px; font-weight: 600; font-size: 11px; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { text-align: left; color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; padding: 4px 6px; border-bottom: 1px solid var(--border); }
      td { padding: 5px 6px; border-bottom: 1px solid var(--border); }
      td.num-link { color: var(--accent); font-weight: 600; cursor: pointer; } td.num-link:hover { text-decoration: underline; }
      td .btn-edit-icon { display: inline-flex; align-items: center; gap: 3px; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; padding: 2px 6px; font-size: 10px; cursor: pointer; opacity: .6; transition: opacity .15s, background .15s; white-space: nowrap; vertical-align: middle; }
      td .btn-edit-icon:hover { opacity: 1; background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .tag { display: inline-block; padding: 1px 6px; border-radius: 6px; background: var(--tag-bg); border: 1px solid var(--border); font-size: 10px; }
      .tag.p1 { border-color: var(--neg); color: var(--neg); }
      .tag.p2 { border-color: var(--warn); color: var(--warn); }
      .footer { margin-top: 10px; display: flex; gap: 8px; }
      .btn { background: var(--btn-bg); color: var(--text); border: 1px solid var(--btn-border); border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .15s, border-color .15s; }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }
      .loading, .error, .empty { text-align: center; padding: 32px 0; font-size: 13px; color: var(--muted); }
      .error { color: var(--neg); }
    
      /* Enhanced interactivity */
      .card { transition: border-color .2s, box-shadow .2s; }
      .card:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); box-shadow: 0 2px 12px rgba(0,0,0,.08); }
      :root[data-theme="dark"] .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
      .btn, .maximize-btn, .hub-expand-btn { transition: all .15s ease; }
      [class*="-row"]:not(.form-grid):not(.field-row):not(.actions):not(.stats-row):not(.bar-row):not(.type-grid):not(.member-row):not(.funnel-row):not(.opp-row):not(.reports-row) { transition: background .15s; }
      @media (max-width: 480px) { .form-grid, .grid, .meta-grid, .totals-grid, .stats-row { grid-template-columns: 1fr !important; display: grid !important; flex-direction: column; } .stats-row { flex-wrap: wrap; } .stat-card { min-width: 0; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="sn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--sn-accent)"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div><div class="title">Team Incidents</div><div class="subtitle">ServiceNow &middot; Workload Overview</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
        </div>
      </div>
      <div id="root"><div class="loading">Loading team incidents&hellip;</div></div>
      <div class="footer"><button class="btn" id="refreshBtn">Refresh</button></div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {};
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }

      function prioClass(p) { var n = parseInt(p, 10); if (n <= 1 || /critical/i.test(p)) return "tag p1"; if (n <= 2 || /high/i.test(p)) return "tag p2"; return "tag"; }
      function _askCopilot(msg) { if (window.openai && typeof window.openai.sendFollowUpMessage === "function") window.openai.sendFollowUpMessage({ prompt: msg }); }

      function render(data) {
        var root = document.getElementById("root");
        if (!data || !data.success) { root.innerHTML = '<div class="error">No data available</div>'; reportHeight(); return; }
        var html = '<div class="total-stat">' + (data.total_open || data.totalOpen || 0) + ' <span class="total-label">open incidents</span></div>';

        var prio = data.by_priority || data.byPriority;
        if (prio) {
          html += '<div class="section-title">By Priority</div><div class="pills">';
          var pmap = {"1 - Critical":"pill-critical","2 - High":"pill-high","3 - Medium":"pill-medium","4 - Low":"pill-low"};
          Object.keys(prio).forEach(function(k) { var cls = pmap[k] || ""; html += '<span class="pill ' + cls + '">' + esc(k) + ': ' + prio[k] + '</span>'; });
          html += '</div>';
        }

        var assignee = data.by_assignee || data.byAssignee;
        if (assignee) {
          html += '<div class="section-title">Assignee Workload</div>';
          var entries = Object.keys(assignee).map(function(k) { return { name: k, count: assignee[k] }; });
          entries.sort(function(a, b) { return b.count - a.count; });
          var max = entries.length ? entries[0].count : 1;
          entries.forEach(function(e) {
            var pct = Math.round((e.count / max) * 100);
            html += '<div class="bar-row"><span class="bar-name">' + esc(e.name) + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><span class="bar-count">' + e.count + '</span></div>';
          });
        }

        var recent = data.recent_incidents || data.recentIncidents;
        if (recent && recent.length) {
          var items = recent.slice(0, 10);
          html += '<div class="section-title">Recent Incidents</div><table><tr><th>Number</th><th>Description</th><th>Priority</th><th>Assigned To</th><th></th></tr>';
          items.forEach(function(inc) {
            html += '<tr><td class="num-link" onclick="_askCopilot(\'Tell me about ServiceNow incident ' + esc(inc.number) + ': ' + esc(inc.short_description || '').replace(/'/g,'\\x27') + '\')">' + esc(inc.number) + '</td><td>' + esc(inc.short_description || "") + '</td><td><span class="' + prioClass(inc.priority) + '">P' + esc(String(inc.priority || "")) + '</span></td><td>' + esc(inc.assigned_to || "—") + '</td><td><button class="btn-edit-icon" onclick="_askCopilot(\'Show me the update form for ServiceNow incident ' + esc(inc.number) + ' so I can update it.\')" title="Open for update"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button></td></tr>';
          });
          html += '</table>';
        }
        root.innerHTML = html;
        reportHeight();
      }

      async function load() {
        document.getElementById("root").innerHTML = '<div class="loading">Loading team incidents&hellip;</div>';
        try {
          if (!window.openai || typeof window.openai.callTool !== "function") { document.getElementById("root").innerHTML = '<div class="error">Skybridge not available</div>'; return; }
          var output = await window.openai.callTool("get_team_incidents", {});
          if (output && output.structuredContent) { window.openai.toolOutput = output.structuredContent; render(output.structuredContent); } else { render(output); }
        } catch (err) { document.getElementById("root").innerHTML = '<div class="error">' + esc(err.message || "Failed to load") + '</div>'; }
      }

      document.getElementById("refreshBtn").addEventListener("click", load);

      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      var _isFullscreen = false, _maxBtn = document.getElementById("maximizeBtn");

      function _applyFullscreenLayout() {
        var w = document.querySelector(".wrap");
        if (window.openai) { if (window.openai.maxHeight) { w.style.height = window.openai.maxHeight + "px"; w.style.overflow = "auto"; }
          var sa = window.openai.safeArea; if (sa && sa.insets) { w.style.paddingTop = (sa.insets.top||16)+"px"; w.style.paddingBottom = (sa.insets.bottom||16)+"px"; w.style.paddingLeft = (sa.insets.left||16)+"px"; w.style.paddingRight = (sa.insets.right||16)+"px"; } }
      }
      function _resetLayout() { var w = document.querySelector(".wrap"); w.style.height=""; w.style.overflow=""; w.style.paddingTop=""; w.style.paddingBottom=""; w.style.paddingLeft=""; w.style.paddingRight=""; }

      async function toggleFullscreen() {
        if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return;
        try { await window.openai.requestDisplayMode({ mode: _isFullscreen ? "inline" : "fullscreen" }); _isFullscreen = !_isFullscreen;
          _maxBtn.innerHTML = _isFullscreen ? _collapseSvg : _expandSvg; _maxBtn.title = _isFullscreen ? "Restore" : "Maximize";
          if (_isFullscreen) _applyFullscreenLayout(); else _resetLayout(); reportHeight(); } catch (e) {}
      }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFullscreen); else _maxBtn.style.display = "none"; }

      if (toolOutput && toolOutput.success) { render(toolOutput); }
      else { setTimeout(function() { var f = (window.openai && window.openai.toolOutput) || {}; if (f && f.success) render(f); else load(); }, 0); }
    </script>
  </body>
</html>

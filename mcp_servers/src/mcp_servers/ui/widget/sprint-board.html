<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3; --border: #1f2630; --pos: #2bd48f; --neg: #ff6b6b; --warn: #f0b232; --btn-bg: #152235; --btn-border: #243145; --jira-accent: #0052cc; --jira-mid: #4e8ff5; --jira-glow: rgba(0,82,204,.12); --badge-bg: #1a2540; --badge-text: #4e8ff5; --bar-todo: #555d6e; --bar-ip: #4e8ff5; --bar-done: #2bd48f; }
      :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e; --border: #e0e0e0; --pos: #107c10; --neg: #d13438; --warn: #ca5010; --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --jira-accent: #0052cc; --jira-mid: #2563eb; --jira-glow: rgba(0,82,204,.08); --badge-bg: #e8f0fe; --badge-text: #0052cc; --bar-todo: #b0b5be; --bar-ip: #2563eb; --bar-done: #107c10; }
      html, body { margin: 0; background: var(--bg); }
      body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .jira-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--jira-glow); border: 1px solid var(--jira-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .title { font-size: 16px; font-weight: 600; } .subtitle { color: var(--muted); font-size: 12px; }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; }
      .maximize-btn:hover { color: var(--jira-mid); border-color: var(--jira-mid); }
      .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
      .footer { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
      .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

      /* Sprint info card */
      .sprint-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 6px; }
      .sprint-name { font-size: 15px; font-weight: 700; }
      .state-badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 2px 8px; border-radius: 10px; }
      .state-active { background: var(--bar-done); color: #fff; }
      .state-closed { background: var(--bar-todo); color: #fff; }
      .state-future { background: var(--badge-bg); color: var(--badge-text); }
      .sprint-dates { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .sprint-goal { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 4px; }
      .sprint-count { font-size: 12px; color: var(--jira-mid); font-weight: 600; }

      /* Board columns */
      .board { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
      .col { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px; min-height: 80px; }
      .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
      .col-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }
      .col-count { font-size: 10px; background: var(--badge-bg); color: var(--badge-text); padding: 1px 7px; border-radius: 8px; font-weight: 600; }
      .col-todo .col-header { border-bottom-color: var(--bar-todo); }
      .col-ip .col-header { border-bottom-color: var(--bar-ip); }
      .col-done .col-header { border-bottom-color: var(--bar-done); }

      /* Issue cards */
      .issue-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 6px; }
      .issue-card:last-child { margin-bottom: 0; }
      .issue-key { font-size: 11px; font-weight: 700; color: var(--jira-mid); }
      .issue-summary { font-size: 12px; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35; }
      .issue-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
      .prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .assignee-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--badge-bg); color: var(--badge-text); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .empty-col { color: var(--muted); font-size: 11px; text-align: center; padding: 14px 0; }

      /* Enhanced interactivity */
      .card, .col { transition: border-color .2s, box-shadow .2s; }
      .card:hover, .col:hover { border-color: color-mix(in srgb, var(--jira-accent) 30%, var(--border)); box-shadow: 0 2px 12px rgba(0,0,0,.08); }
      :root[data-theme="dark"] .card:hover, :root[data-theme="dark"] .col:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
      .issue-card { transition: border-color .15s, box-shadow .15s; }
      .issue-card:hover { border-color: var(--jira-mid); box-shadow: 0 1px 6px rgba(0,0,0,.1); }
      :root[data-theme="dark"] .issue-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,.3); }
      .btn, .maximize-btn { transition: all .15s ease; }
      @media (max-width: 480px) { .board { grid-template-columns: 1fr !important; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="jira-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--jira-mid)"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <div><div class="title">Sprint Board</div><div class="subtitle">Jira &middot; Agile</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div id="root"><div class="loading">Loading sprint board&hellip;</div></div>
      <div class="footer">Powered by <strong>jira / get_sprint</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var _isFS = false, _maxBtn = document.getElementById("maximizeBtn");
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      var prioColors = { "Highest": "#d32f2f", "High": "#e67700", "Medium": "#f0b232", "Low": "#2bd48f", "Lowest": "#8da3b8" };

      function categorize(status) {
        var s = (status || "").toLowerCase();
        if (s.indexOf("done") > -1 || s.indexOf("closed") > -1 || s.indexOf("resolved") > -1) return "done";
        if (s.indexOf("in progress") > -1 || s.indexOf("in review") > -1) return "ip";
        return "todo";
      }

      function initials(name) {
        if (!name) return "?";
        var parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        return parts[0].substring(0, 2).toUpperCase();
      }

      function fmtDate(d) {
        if (!d) return "";
        try { var dt = new Date(d); return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); } catch (e) { return d; }
      }

      function stateClass(state) {
        var s = (state || "").toLowerCase();
        if (s === "active") return "state-active";
        if (s === "closed") return "state-closed";
        return "state-future";
      }

      function renderIssueCard(issue) {
        var html = '<div class="issue-card">';
        html += '<div class="issue-key">' + esc(issue.key) + '</div>';
        html += '<div class="issue-summary">' + esc(issue.summary) + '</div>';
        html += '<div class="issue-footer">';
        var pc = prioColors.hasOwnProperty(issue.priority) ? prioColors[issue.priority] : "var(--muted)";
        html += '<div class="prio-dot" style="background:' + pc + '" title="' + esc(issue.priority || "None") + '"></div>';
        html += '<div class="assignee-avatar" title="' + esc(issue.assignee || "Unassigned") + '">' + esc(initials(issue.assignee)) + '</div>';
        html += '</div></div>';
        return html;
      }

      function render(d) {
        if (!d || (!d.issues && !d.name)) { document.getElementById("root").innerHTML = '<div class="loading">No sprint data available.</div>'; reportHeight(); return; }
        var issues = d.issues || [];
        var html = '';

        /* Sprint info card */
        html += '<div class="card">';
        html += '<div class="sprint-meta">';
        html += '<span class="sprint-name">' + esc(d.name || "Sprint") + '</span>';
        if (d.state) html += '<span class="state-badge ' + stateClass(d.state) + '">' + esc(d.state) + '</span>';
        html += '</div>';
        if (d.startDate || d.endDate) html += '<div class="sprint-dates">' + esc(fmtDate(d.startDate)) + ' &rarr; ' + esc(fmtDate(d.endDate)) + '</div>';
        if (d.goal) html += '<div class="sprint-goal">' + esc(d.goal) + '</div>';
        html += '<div class="sprint-count">' + (d.issueCount || issues.length) + ' issues</div>';
        html += '</div>';

        /* Bucket issues */
        var buckets = { todo: [], ip: [], done: [] };
        for (var i = 0; i < issues.length; i++) {
          buckets[categorize(issues[i].status)].push(issues[i]);
        }

        /* Board columns */
        html += '<div class="board">';

        /* To Do */
        html += '<div class="col col-todo"><div class="col-header"><span class="col-title">To Do</span><span class="col-count">' + buckets.todo.length + '</span></div>';
        if (buckets.todo.length === 0) html += '<div class="empty-col">No issues</div>';
        for (var t = 0; t < buckets.todo.length; t++) html += renderIssueCard(buckets.todo[t]);
        html += '</div>';

        /* In Progress */
        html += '<div class="col col-ip"><div class="col-header"><span class="col-title">In Progress</span><span class="col-count">' + buckets.ip.length + '</span></div>';
        if (buckets.ip.length === 0) html += '<div class="empty-col">No issues</div>';
        for (var p = 0; p < buckets.ip.length; p++) html += renderIssueCard(buckets.ip[p]);
        html += '</div>';

        /* Done */
        html += '<div class="col col-done"><div class="col-header"><span class="col-title">Done</span><span class="col-count">' + buckets.done.length + '</span></div>';
        if (buckets.done.length === 0) html += '<div class="empty-col">No issues</div>';
        for (var dn = 0; dn < buckets.done.length; dn++) html += renderIssueCard(buckets.done[dn]);
        html += '</div>';

        html += '</div>';
        document.getElementById("root").innerHTML = html; reportHeight();
      }

      async function init() {
        if (toolOutput && (toolOutput.issues || toolOutput.name)) { render(toolOutput); return; }
        if (window.openai && typeof window.openai.callTool === "function") { try { var out = await window.openai.callTool("get_sprint", toolInput); render((out && out.structuredContent) || out); } catch (e) { document.getElementById("root").innerHTML = '<div class="loading">' + esc(e.message || "Error loading sprint") + '</div>'; reportHeight(); } }
        else { document.getElementById("root").innerHTML = '<div class="loading">Skybridge unavailable.</div>'; reportHeight(); }
      }

      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; init(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }
      init();
    </script>
  </body>
</html>

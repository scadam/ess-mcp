<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3; --accent: #4cc2ff; --border: #1f2630; --pos: #2bd48f; --neg: #ff6b6b; --warn: #f0b232; --btn-bg: #152235; --btn-border: #243145; --jira-accent: #0052cc; --jira-mid: #4e8ff5; --jira-glow: rgba(0,82,204,.12); --badge-bg: #1a2540; --badge-text: #4e8ff5; --col-bg: rgba(0,82,204,.06); }
      :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e; --accent: #0078d4; --border: #e0e0e0; --pos: #107c10; --neg: #d13438; --warn: #ca5010; --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --jira-accent: #0052cc; --jira-mid: #2563eb; --jira-glow: rgba(0,82,204,.08); --badge-bg: #e8f0fe; --badge-text: #0052cc; --col-bg: rgba(0,82,204,.03); }
      html, body { margin: 0; background: var(--bg); }
      body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .jira-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--jira-glow); border: 1px solid var(--jira-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .title { font-size: 16px; font-weight: 600; } .subtitle { color: var(--muted); font-size: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
      .section-label { font-size: 11px; color: var(--jira-mid); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .sprint-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .sprint-goal { font-size: 12px; color: var(--text); font-style: italic; margin-bottom: 12px; padding: 8px; background: var(--col-bg); border-radius: 8px; border-left: 3px solid var(--jira-accent); }
      .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .column { background: var(--col-bg); border-radius: 12px; padding: 10px; min-height: 80px; }
      .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .col-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; }
      .col-todo .col-title { color: var(--muted); }
      .col-ip .col-title { color: var(--jira-mid); }
      .col-done .col-title { color: var(--pos); }
      .col-count { font-size: 10px; color: var(--muted); background: var(--badge-bg); color: var(--badge-text); padding: 2px 7px; border-radius: 99px; font-weight: 600; }
      .issue-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 8px; }
      .issue-card:last-child { margin-bottom: 0; }
      .issue-key { font-size: 10px; font-weight: 700; color: var(--jira-mid); margin-bottom: 4px; }
      .issue-summary { font-size: 12px; font-weight: 500; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .issue-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
      .issue-assignee { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
      .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; }
      .maximize-btn:hover { color: var(--jira-mid); border-color: var(--jira-mid); }
      .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
      .footer { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right; }

      /* Enhanced interactivity */
      .card, .issue-card { transition: border-color .2s, box-shadow .2s; }
      .card:hover, .issue-card:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); box-shadow: 0 2px 12px rgba(0,0,0,.08); }
      :root[data-theme="dark"] .card:hover, :root[data-theme="dark"] .issue-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
      .btn, .maximize-btn, .hub-expand-btn { transition: all .15s ease; }
      @media (max-width: 480px) { .board { grid-template-columns: 1fr !important; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="jira-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--jira-mid)"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <div><div class="title">Sprint Board</div><div class="subtitle">Jira &middot; Active Sprint</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>
      <div id="root"><div class="loading">Loading sprint&hellip;</div></div>
      <div class="footer">Powered by <strong>jira / list_issues</strong> via MCP</div>
    </div>
    <script>
      var toolOutput = (window.openai && window.openai.toolOutput) || {}, toolInput = (window.openai && window.openai.toolInput) || {};
      var _isFS = false, _maxBtn = document.getElementById("maximizeBtn");
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      function reportHeight() { if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

      function prioColor(p) {
        var lower = (p || "").toLowerCase();
        if (lower === "highest" || lower === "high") return "var(--neg)";
        if (lower === "medium") return "var(--warn)";
        if (lower === "low" || lower === "lowest") return "var(--pos)";
        return "var(--muted)";
      }

      function statusCategory(s) {
        var lower = (s || "").toLowerCase();
        if (lower === "done" || lower === "closed" || lower === "resolved") return "done";
        if (lower === "in progress" || lower === "in review" || lower === "in development") return "ip";
        return "todo";
      }

      function fmtDate(d) { if (!d) return ""; try { var dt = new Date(d); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); } catch(e) { return d; } }

      function renderBoard(sprint, issues) {
        var cols = { todo: [], ip: [], done: [] };
        for (var i = 0; i < issues.length; i++) {
          var cat = statusCategory(issues[i].status);
          cols[cat].push(issues[i]);
        }

        var html = '';
        // Sprint info
        if (sprint) {
          html += '<div class="card">';
          html += '<div class="section-label">' + esc(sprint.name || "Active Sprint") + '</div>';
          if (sprint.startDate || sprint.endDate) {
            html += '<div class="sprint-meta">' + fmtDate(sprint.startDate) + ' &mdash; ' + fmtDate(sprint.endDate) + '</div>';
          }
          if (sprint.goal) {
            html += '<div class="sprint-goal">' + esc(sprint.goal) + '</div>';
          }
          html += '</div>';
        }

        // Kanban board
        html += '<div class="board">';
        var colDefs = [
          { key: "todo", label: "To Do", cls: "col-todo" },
          { key: "ip", label: "In Progress", cls: "col-ip" },
          { key: "done", label: "Done", cls: "col-done" }
        ];
        for (var c = 0; c < colDefs.length; c++) {
          var def = colDefs[c], items = cols[def.key];
          var shown = _isFS ? items.length : Math.min(6, items.length);
          html += '<div class="column ' + def.cls + '">';
          html += '<div class="col-header"><span class="col-title">' + def.label + '</span><span class="col-count">' + items.length + '</span></div>';
          for (var j = 0; j < shown; j++) {
            var issue = items[j];
            html += '<div class="issue-card">';
            html += '<div class="issue-key">' + esc(issue.key || "") + '</div>';
            html += '<div class="issue-summary">' + esc(issue.summary || "") + '</div>';
            html += '<div class="issue-meta">';
            html += '<div class="issue-assignee">' + esc(issue.assignee || "Unassigned") + '</div>';
            html += '<div class="priority-dot" style="background:' + prioColor(issue.priority) + '" title="' + esc(issue.priority || "") + '"></div>';
            html += '</div></div>';
          }
          if (!_isFS && items.length > shown) html += '<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">+ ' + (items.length - shown) + ' more</div>';
          html += '</div>';
        }
        html += '</div>';

        document.getElementById("root").innerHTML = html; reportHeight();
      }

      async function init() {
        if (toolOutput && toolOutput.issues) { renderBoard(toolOutput.sprint || null, toolOutput.issues); return; }
        if (window.openai && typeof window.openai.callTool === "function") {
          try {
            // Fetch active sprint
            var sprintOut = await window.openai.callTool("list_sprints", { state: "active" });
            var sprintData = (sprintOut && sprintOut.structuredContent) || sprintOut;
            var sprints = (sprintData && sprintData.sprints) || [];
            if (!sprints.length) { document.getElementById("root").innerHTML = '<div class="loading">No active sprint found.</div>'; reportHeight(); return; }
            var sprint = sprints[0];
            // Fetch issues for the active sprint
            var issueOut = await window.openai.callTool("list_issues", { sprint_id: sprint.id });
            var issueData = (issueOut && issueOut.structuredContent) || issueOut;
            var issues = (issueData && issueData.issues) || [];
            renderBoard(sprint, issues);
          } catch (e) { document.getElementById("root").innerHTML = '<div class="loading">' + esc(e.message || "Error loading sprint") + '</div>'; reportHeight(); }
        }
        else { document.getElementById("root").innerHTML = '<div class="loading">Skybridge unavailable.</div>'; reportHeight(); }
      }
      async function toggleFS() { if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return; try { await window.openai.requestDisplayMode({mode:_isFS?"inline":"fullscreen"}); _isFS=!_isFS; _maxBtn.innerHTML=_isFS?_collapseSvg:_expandSvg; _maxBtn.title=_isFS?"Restore":"Maximize"; init(); } catch(e){} }
      if (_maxBtn) { if (window.openai && typeof window.openai.requestDisplayMode === "function") _maxBtn.addEventListener("click", toggleFS); else _maxBtn.style.display = "none"; }
      init();
    </script>
  </body>
</html>

<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --input-bg: #0f131a;
        --wd-accent: #f68620; --wd-glow: rgba(246,134,32,.12);
        --ok: #2bd48f; --warn: #f0b232; --danger: #ff6b6b;
        --on-track: #2bd48f; --at-risk: #f0b232; --behind: #ff6b6b; --not-started: #a9b1bd;
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --input-bg: #ffffff;
        --wd-accent: #c2670d; --wd-glow: rgba(194,103,13,.08);
        --ok: #107c10; --warn: #ca5010; --danger: #d13438;
        --on-track: #107c10; --at-risk: #ca5010; --behind: #d13438; --not-started: #65707d;
      }
      html, body { height: 100%; background: var(--bg); }
      body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; min-height: 100%; }

      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--wd-glow); border: 1px solid var(--wd-accent); display: flex; align-items: center; justify-content: center; }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { font-size: 12px; color: var(--muted); }

      /* Aggregate stats */
      .agg { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
      .agg-card { flex: 1; min-width: 90px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: center; }
      .agg-num { font-size: 22px; font-weight: 700; }
      .agg-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

      /* Team member sections */
      .member-section { margin-bottom: 16px; }
      .member-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0; cursor: pointer; transition: background .12s; }
      .member-header:hover { background: color-mix(in srgb, var(--accent) 6%, var(--card)); }
      .member-header .avatar { width: 32px; height: 32px; border-radius: 50%; background: color-mix(in srgb, var(--accent) 18%, var(--card)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--accent); flex-shrink: 0; }
      .member-header .info { flex: 1; }
      .member-header .name { font-size: 13px; font-weight: 600; }
      .member-header .role { font-size: 11px; color: var(--muted); }
      .member-header .goal-count { font-size: 11px; color: var(--muted); background: var(--input-bg); padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border); }
      .member-header .chevron { color: var(--muted); transition: transform .2s; }
      .member-header .chevron.open { transform: rotate(90deg); }

      .member-goals { border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; display: none; }
      .member-goals.open { display: block; }

      .goal-item { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; transition: background .12s; }
      .goal-item:last-child { border-bottom: none; }
      .goal-item:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
      .goal-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
      .goal-info { flex: 1; }
      .goal-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
      .goal-desc-short { font-size: 11px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
      .goal-meta { font-size: 10px; color: var(--muted); white-space: nowrap; }
      .goal-status-pill { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }

      .progress-mini { width: 60px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 4px; }
      .progress-mini-fill { height: 100%; border-radius: 2px; }

      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }

      .loading, .empty { text-align: center; padding: 24px 0; color: var(--muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
          <div><div class="title">Team Goals</div><div class="subtitle">Workday &middot; Manager View</div></div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>

      <div id="aggRow" class="agg"></div>
      <div id="content"><div class="loading">Loading team goals&hellip;</div></div>
    </div>

    <script>
      (function() {
        "use strict";
        var teamData = [];
        var contentEl = document.getElementById("content");
        var aggEl = document.getElementById("aggRow");
        function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
        function rh() { if (window.openai && window.openai.notifyIntrinsicHeight) window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }
        function initials(n) { return (n||"").split(/\s+/).map(function(w){return w[0]}).join("").substring(0,2).toUpperCase(); }

        function normalizeStatus(s) {
          s = (s || "").toLowerCase();
          if (s.indexOf("track") >= 0 || s === "completed" || s === "achieved") return "on-track";
          if (s.indexOf("risk") >= 0) return "at-risk";
          if (s.indexOf("behind") >= 0 || s.indexOf("off") >= 0) return "behind";
          return "not-started";
        }
        function statusColor(ns) {
          switch(ns) { case "on-track": return "var(--on-track)"; case "at-risk": return "var(--at-risk)"; case "behind": return "var(--behind)"; default: return "var(--not-started)"; }
        }
        function statusLabel(ns) {
          switch(ns) { case "on-track": return "On Track"; case "at-risk": return "At Risk"; case "behind": return "Behind"; default: return "Pending"; }
        }
        function fmtDate(d) { if (!d) return ""; try { return new Date(d).toLocaleDateString(undefined, {month:"short",day:"numeric"}); } catch(e) { return d; } }

        function renderAgg() {
          var totalGoals = 0, totalOnTrack = 0, totalAtRisk = 0, totalBehind = 0;
          teamData.forEach(function(m) {
            (m.goals || []).forEach(function(g) {
              totalGoals++;
              var ns = normalizeStatus(g.status);
              if (ns === "on-track") totalOnTrack++;
              else if (ns === "at-risk") totalAtRisk++;
              else if (ns === "behind") totalBehind++;
            });
          });
          aggEl.innerHTML =
            '<div class="agg-card"><div class="agg-num">' + teamData.length + '</div><div class="agg-label">Reports</div></div>' +
            '<div class="agg-card"><div class="agg-num">' + totalGoals + '</div><div class="agg-label">Goals</div></div>' +
            '<div class="agg-card"><div class="agg-num" style="color:var(--on-track)">' + totalOnTrack + '</div><div class="agg-label">On Track</div></div>' +
            '<div class="agg-card"><div class="agg-num" style="color:var(--at-risk)">' + totalAtRisk + '</div><div class="agg-label">At Risk</div></div>' +
            (totalBehind ? '<div class="agg-card"><div class="agg-num" style="color:var(--behind)">' + totalBehind + '</div><div class="agg-label">Behind</div></div>' : '');
        }

        function render() {
          if (!teamData.length) { contentEl.innerHTML = '<div class="empty">No team goal data available.</div>'; rh(); return; }
          var html = '';
          teamData.forEach(function(member, mIdx) {
            var goals = member.goals || [];
            html += '<div class="member-section"><div class="member-header" data-m="' + mIdx + '">' +
              '<div class="avatar">' + esc(initials(member.descriptor || member.worker || member.name || member.workerName)) + '</div>' +
              '<div class="info"><div class="name">' + esc(member.descriptor || member.worker || member.name || member.workerName) + '</div>' +
              '<div class="role">' + esc(member.businessTitle || member.title || "") + '</div></div>' +
              '<span class="goal-count">' + goals.length + ' goal' + (goals.length !== 1 ? 's' : '') + '</span>' +
              '<span class="chevron" id="chev-' + mIdx + '">&#9654;</span></div>';
            html += '<div class="member-goals" id="goals-' + mIdx + '">';
            if (goals.length === 0) {
              html += '<div class="goal-item" style="justify-content:center;color:var(--muted);font-size:12px;">No goals assigned</div>';
            } else {
              goals.forEach(function(g) {
                var ns = normalizeStatus(g.status);
                var col = statusColor(ns);
                var pct = g.percentComplete != null ? g.percentComplete : (ns === "on-track" ? 75 : ns === "at-risk" ? 40 : ns === "behind" ? 15 : 0);
                html += '<div class="goal-item">' +
                  '<div class="goal-dot" style="background:' + col + '"></div>' +
                  '<div class="goal-info"><div class="goal-name">' + esc(g.name || g.descriptor || "Goal") + '</div>' +
                  (g.description ? '<div class="goal-desc-short">' + esc(g.description) + '</div>' : '') +
                  '<div class="progress-mini"><div class="progress-mini-fill" style="width:' + Math.min(100, Math.max(0, pct)) + '%;background:' + col + '"></div></div></div>' +
                  '<div style="text-align:right"><span class="goal-status-pill" style="color:' + col + ';border:1px solid ' + col + '">' + statusLabel(ns) + '</span>' +
                  (g.dueDate ? '<div class="goal-meta" style="margin-top:4px">Due ' + fmtDate(g.dueDate) + '</div>' : '') +
                  '</div></div>';
              });
            }
            html += '</div></div>';
          });
          contentEl.innerHTML = html;

          // toggle expand
          contentEl.querySelectorAll(".member-header").forEach(function(el) {
            el.addEventListener("click", function() {
              var idx = this.getAttribute("data-m");
              var panel = document.getElementById("goals-" + idx);
              var chev = document.getElementById("chev-" + idx);
              if (panel) { panel.classList.toggle("open"); }
              if (chev) { chev.classList.toggle("open"); }
              rh();
            });
          });
          // expand first member by default
          var fp = document.getElementById("goals-0"), fc = document.getElementById("chev-0");
          if (fp) { fp.classList.add("open"); }
          if (fc) { fc.classList.add("open"); }
          rh();
        }

        async function load() {
          try {
            var toolData = window.openai && window.openai.toolOutput;
            if (toolData) {
              var td = typeof toolData === "string" ? JSON.parse(toolData) : toolData;
              teamData = td.teamGoals || td.team || td.members || td.data || [];
            }
            if (teamData.length === 0 && window.openai && window.openai.callTool) {
              var out = await window.openai.callTool("get_team_goals", {});
              var d = out && out.structuredContent ? out.structuredContent : out;
              teamData = (d && (d.teamGoals || d.team || d.members)) ? (d.teamGoals || d.team || d.members) : [];
            }
            renderAgg();
            render();
          } catch (e) {
            contentEl.innerHTML = '<div class="loading" style="color:var(--danger)">' + esc(e.message) + '</div>';
            rh();
          }
        }

        var _fs = false, _mb = document.getElementById("maximizeBtn");
        _mb.addEventListener("click", async function() {
          if (!window.openai || !window.openai.requestDisplayMode) return;
          try { await window.openai.requestDisplayMode({ mode: _fs ? "inline" : "fullscreen" }); _fs = !_fs; rh(); } catch(e) {}
        });

        load();
      })();
    </script>
  </body>
</html>

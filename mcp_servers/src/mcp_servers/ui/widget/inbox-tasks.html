<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --input-bg: #0f131a;
        --btn-bg: #152235; --btn-border: #243145; --btn-hover: #1a2d44;
        --wd-accent: #f68620; --wd-glow: rgba(246,134,32,.12);
        --ok: #2bd48f; --warn: #f0b232; --danger: #ff6b6b;
        --approve-bg: rgba(43,212,143,.12); --approve-border: #1a5a3a;
        --deny-bg: rgba(255,107,107,.08); --deny-border: rgba(255,107,107,.25);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --input-bg: #ffffff;
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0; --btn-hover: #e4e4e4;
        --wd-accent: #c2670d; --wd-glow: rgba(194,103,13,.08);
        --ok: #107c10; --warn: #ca5010; --danger: #d13438;
        --approve-bg: rgba(16,124,16,.08); --approve-border: #107c10;
        --deny-bg: rgba(209,52,56,.06); --deny-border: #d13438;
      }
      html, body { height: 100%; background: var(--bg); }
      body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
      .wrap { padding: 16px; box-sizing: border-box; min-height: 100%; }

      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--wd-glow); border: 1px solid var(--wd-accent); display: flex; align-items: center; justify-content: center; }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { font-size: 12px; color: var(--muted); }

      .stats-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
      .stat { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
      .stat .num { font-weight: 700; font-size: 16px; margin-right: 4px; }
      .stat.urgent .num { color: var(--danger); }
      .stat.approval .num { color: var(--warn); }
      .stat.total .num { color: var(--accent); }

      .controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
      .input, .select { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; box-sizing: border-box; }
      .input { flex: 1; }
      .btn { background: var(--btn-bg); color: var(--text); border: 1px solid var(--btn-border); border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
      .btn:hover { background: var(--btn-hover); }

      .list { display: grid; gap: 8px; }
      .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; transition: border-color .2s, box-shadow .2s; }
      .task-card:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
      :root[data-theme="dark"] .task-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
      .task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
      .task-subject { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
      .task-meta { font-size: 11px; color: var(--muted); }
      .task-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
      .chip { font-size: 10px; border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; color: var(--muted); }
      .chip.approval { color: var(--warn); border-color: var(--warn); }
      .chip.overdue { color: var(--danger); border-color: var(--danger); }

      /* Expandable action area */
      .task-actions { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
      .task-actions.open { display: block; }
      .action-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
      .comment-field { flex: 1; min-width: 160px; }
      .comment-field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
      .comment-field textarea { width: 100%; box-sizing: border-box; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 40px; }

      .btn-approve { background: var(--approve-bg); color: var(--ok); border: 1px solid var(--approve-border); border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
      .btn-approve:hover { filter: brightness(1.15); }
      .btn-deny { background: var(--deny-bg); color: var(--danger); border: 1px solid var(--deny-border); border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
      .btn-deny:hover { filter: brightness(1.15); }
      .btn-detail { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 11px; cursor: pointer; }
      .btn-detail:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }

      .action-result { margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
      .action-result.success { background: var(--approve-bg); border: 1px solid var(--approve-border); color: var(--ok); }
      .action-result.error { background: var(--deny-bg); border: 1px solid var(--deny-border); color: var(--danger); }

      .task-card.processed { opacity: .6; }

      .loading, .empty, .error { text-align: center; padding: 24px 0; color: var(--muted); font-size: 13px; }
      .error { color: var(--danger); }
      .maximize-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }
      @media (max-width: 480px) { .action-row { flex-direction: column; } .stats-row { flex-direction: column; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg></div>
          <div><div class="title">Inbox Tasks</div><div class="subtitle">Workday &middot; Approve &amp; Action</div></div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn" id="refresh">Refresh</button>
          <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
        </div>
      </div>

      <div id="stats" class="stats-row"></div>
      <div class="controls">
        <input id="search" class="input" placeholder="Search tasks&hellip;" />
        <select id="filterType" class="select"><option value="">All types</option></select>
      </div>
      <div id="content"><div class="loading">Loading inbox tasks&hellip;</div></div>
    </div>

    <script>
      (function() {
        "use strict";
        var allTasks = [], viewTasks = [], expandedIdx = null;
        var searchEl = document.getElementById("search");
        var filterEl = document.getElementById("filterType");
        var statsEl = document.getElementById("stats");
        var contentEl = document.getElementById("content");

        function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
        function rh() { if (window.openai && window.openai.notifyIntrinsicHeight) window.openai.notifyIntrinsicHeight(document.body.scrollHeight); }

        function isOverdue(due) { if (!due) return false; return new Date(due) < new Date(); }
        function fmtDate(d) { if (!d) return ""; try { return new Date(d).toLocaleDateString(undefined, {month:"short",day:"numeric",year:"numeric"}); } catch(e) { return d; } }

        function renderStats() {
          var total = allTasks.length, approvals = 0, overdue = 0;
          for (var i = 0; i < allTasks.length; i++) {
            if ((allTasks[i].stepType || "").toLowerCase() === "approval") approvals++;
            if (isOverdue(allTasks[i].due)) overdue++;
          }
          statsEl.innerHTML =
            '<div class="stat total"><span class="num">' + total + '</span>Total</div>' +
            '<div class="stat approval"><span class="num">' + approvals + '</span>Approvals</div>' +
            (overdue ? '<div class="stat urgent"><span class="num">' + overdue + '</span>Overdue</div>' : '');
        }

        function populateFilter() {
          var types = {};
          for (var i = 0; i < allTasks.length; i++) { var t = allTasks[i].stepType || "Other"; types[t] = true; }
          var cur = filterEl.value;
          filterEl.innerHTML = '<option value="">All types</option>';
          Object.keys(types).sort().forEach(function(t) { var o = document.createElement("option"); o.value = t; o.textContent = t; filterEl.appendChild(o); });
          if (cur && types[cur]) filterEl.value = cur;
        }

        function applyFilters() {
          var q = (searchEl.value || "").toLowerCase().trim();
          var ft = filterEl.value;
          viewTasks = allTasks.filter(function(t) {
            var match = !q || (t.descriptor || "").toLowerCase().indexOf(q) >= 0 || (t.subject || "").toLowerCase().indexOf(q) >= 0 || (t.initiator || "").toLowerCase().indexOf(q) >= 0;
            var typeMatch = !ft || (t.stepType || "") === ft;
            return match && typeMatch;
          });
          render();
        }

        function taskCard(t, idx) {
          var isApproval = (t.stepType || "").toLowerCase() === "approval";
          var overdue = isOverdue(t.due);
          var meta = [];
          if (t.initiator) meta.push("From: " + t.initiator);
          if (t.assigned) meta.push("Assigned: " + fmtDate(t.assigned));
          if (t.due) meta.push("Due: " + fmtDate(t.due));

          var chips = '<span class="chip">' + esc(t.stepType || "Task") + '</span>';
          if (isApproval) chips += '<span class="chip approval">Needs Decision</span>';
          if (overdue) chips += '<span class="chip overdue">Overdue</span>';
          if (t.status) chips += '<span class="chip">' + esc(t.status) + '</span>';

          var actions = '<div class="task-actions" id="actions-' + idx + '">' +
            '<div class="action-row">' +
              '<div class="comment-field"><label>Comment (optional)</label><textarea id="comment-' + idx + '" rows="2" placeholder="Add a comment&hellip;"></textarea></div>' +
            '</div>' +
            '<div class="action-row" style="margin-top:8px;">' +
              (isApproval ? '<button class="btn-approve" data-idx="' + idx + '" data-action="approve">&#10003; Approve</button><button class="btn-deny" data-idx="' + idx + '" data-action="deny">&#10007; Deny</button>' : '') +
              '<button class="btn-detail" data-idx="' + idx + '" data-detail="1">View Details</button>' +
            '</div>' +
            '<div id="result-' + idx + '"></div>' +
          '</div>';

          return '<div class="task-card" id="card-' + idx + '" data-idx="' + idx + '">' +
            '<div class="task-top" style="cursor:pointer" data-toggle="' + idx + '">' +
              '<div><div class="task-subject">' + esc(t.descriptor || t.subject || "Untitled Task") + '</div>' +
              '<div class="task-meta">' + esc(meta.join(" · ")) + '</div></div>' +
            '</div>' +
            '<div class="task-chips">' + chips + '</div>' +
            actions +
          '</div>';
        }

        function render() {
          if (!viewTasks.length) { contentEl.innerHTML = '<div class="empty">No tasks match your filters.</div>'; rh(); return; }
          var html = '<div class="list">';
          for (var i = 0; i < viewTasks.length; i++) html += taskCard(viewTasks[i], i);
          html += '</div>';
          contentEl.innerHTML = html;
          bindEvents();
          rh();
        }

        function bindEvents() {
          contentEl.querySelectorAll("[data-toggle]").forEach(function(el) {
            el.addEventListener("click", function() {
              var idx = this.getAttribute("data-toggle");
              var panel = document.getElementById("actions-" + idx);
              if (panel) { panel.classList.toggle("open"); rh(); }
            });
          });
          contentEl.querySelectorAll("[data-action]").forEach(function(el) {
            el.addEventListener("click", function(e) {
              e.stopPropagation();
              var idx = parseInt(this.getAttribute("data-idx"), 10);
              var action = this.getAttribute("data-action");
              executeAction(idx, action);
            });
          });
          contentEl.querySelectorAll("[data-detail]").forEach(function(el) {
            el.addEventListener("click", function(e) {
              e.stopPropagation();
              var idx = parseInt(this.getAttribute("data-idx"), 10);
              var t = viewTasks[idx];
              if (t && window.openai && window.openai.sendFollowUpMessage) {
                window.openai.sendFollowUpMessage({ prompt: 'Get detailed information about my inbox task "' + (t.descriptor || '') + '" (task ID: ' + (t.id || '') + ')' });
              }
            });
          });
        }

        async function executeAction(idx, action) {
          var t = viewTasks[idx];
          if (!t || !t.id) return;
          var commentEl = document.getElementById("comment-" + idx);
          var resultEl = document.getElementById("result-" + idx);
          var comment = commentEl ? commentEl.value.trim() : "";
          resultEl.innerHTML = '<div class="action-result" style="background:var(--input-bg);border:1px solid var(--border);color:var(--muted)">Processing&hellip;</div>';
          rh();
          try {
            if (!window.openai || !window.openai.callTool) throw new Error("Skybridge not available");
            var params = { task_id: t.id, decision: action };
            if (comment) params.comment = comment;
            var out = await window.openai.callTool("action_inbox_task", params);
            var data = out && out.structuredContent ? out.structuredContent : out;
            if (data && data.success) {
              resultEl.innerHTML = '<div class="action-result success">&#10003; Task ' + (action === "approve" ? "approved" : "denied") + ' successfully.</div>';
              var card = document.getElementById("card-" + idx);
              if (card) card.classList.add("processed");
            } else {
              resultEl.innerHTML = '<div class="action-result error">Failed: ' + esc((data && data.error) || "Unknown error") + '</div>';
            }
          } catch (e) {
            resultEl.innerHTML = '<div class="action-result error">' + esc(e.message || "Action failed") + '</div>';
          }
          rh();
        }

        async function load() {
          var toolOutput = (window.openai && window.openai.toolOutput) || null;
          if (toolOutput && toolOutput.tasks) {
            allTasks = toolOutput.tasks;
            renderStats();
            populateFilter();
            applyFilters();
            return;
          }
          contentEl.innerHTML = '<div class="loading">Loading inbox tasks&hellip;</div>';
          try {
            if (!window.openai || !window.openai.callTool) throw new Error("Skybridge not available");
            var out = await window.openai.callTool("get_inbox_tasks", {});
            var data = out && out.structuredContent ? out.structuredContent : out;
            allTasks = (data && data.tasks) ? data.tasks : [];
            renderStats();
            populateFilter();
            applyFilters();
          } catch (e) {
            contentEl.innerHTML = '<div class="error">' + esc(e.message || "Failed to load") + '</div>';
            rh();
          }
        }

        searchEl.addEventListener("input", applyFilters);
        filterEl.addEventListener("change", applyFilters);
        document.getElementById("refresh").addEventListener("click", load);

        var _exSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
        var _coSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
        var _fs = false, _mb = document.getElementById("maximizeBtn");
        _mb.addEventListener("click", async function() {
          if (!window.openai || !window.openai.requestDisplayMode) return;
          try { await window.openai.requestDisplayMode({ mode: _fs ? "inline" : "fullscreen" }); _fs = !_fs; _mb.innerHTML = _fs ? _coSvg : _exSvg; _mb.title = _fs ? "Restore" : "Maximize"; rh(); } catch(e) {}
        });

        load();
      })();
    </script>
  </body>
</html>

<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(0,180,216,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --ariba-accent: #00b4d8; --ariba-glow: rgba(0,180,216,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(0,150,180,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --ariba-accent: #0096b4; --ariba-glow: rgba(0,150,180,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 560px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--ariba-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--ariba-glow); margin-bottom: 10px; cursor: pointer; transition: border-color .15s; }
      .card:hover { border-color: var(--ariba-accent); }
      .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
      .req-title { font-size: 15px; font-weight: 600; }
      .req-total { font-size: 15px; font-weight: 700; color: var(--ariba-accent); }
      .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 4px; }
      .status-draft { background: rgba(139,148,158,.15); color: #8b949e; }
      .status-submitted { background: rgba(56,139,253,.15); color: #388bfd; }
      .status-approved { background: rgba(46,160,67,.15); color: #3fb950; }
      .status-rejected { background: rgba(248,81,73,.15); color: #f85149; }
      .status-pending { background: rgba(210,153,0,.15); color: #d29900; }
      .meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--muted); }
      .empty { text-align: center; padding: 24px; color: var(--muted); }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--ariba-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        requisitions: [
          { id: "REQ-2026-00310", title: "Q2 Office Supplies", status: "submitted", requester: "Alex Chen", date: "2026-04-10", total: 3240.00, currency: "USD" },
          { id: "REQ-2026-00298", title: "IT Equipment Refresh", status: "approved", requester: "Jane Doe", date: "2026-04-05", total: 18500.00, currency: "USD" },
          { id: "REQ-2026-00285", title: "Marketing Materials", status: "draft", requester: "John Smith", date: "2026-03-28", total: 750.00, currency: "USD" },
          { id: "REQ-2026-00270", title: "Lab Safety Equipment", status: "pending", requester: "Alex Chen", date: "2026-03-22", total: 5100.00, currency: "USD" }
        ]
      };

      function _askCopilot(msg) { if (window.openai && typeof window.openai.sendFollowUpMessage === "function") window.openai.sendFollowUpMessage({ prompt: msg }); }

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const list = data.requisitions || data.results || [];
          if (!list.length) {
            root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Requisitions</h1></div><div class="card"><div class="empty">No requisitions found.</div></div>`;
            return;
          }

          const fmt = (v, c) => v != null ? new Intl.NumberFormat('en-US', { style: 'currency', currency: c || 'USD' }).format(v) : '—';
          const statusClass = (s) => { const sl = (s||'').toLowerCase(); return sl === 'approved' ? 'status-approved' : sl === 'rejected' ? 'status-rejected' : sl === 'submitted' ? 'status-submitted' : sl === 'pending' ? 'status-pending' : 'status-draft'; };

          const cards = list.map(r => `
            <div class="card" onclick="_askCopilot('Show requisition ${r.id || ''}')">
              <div class="card-top">
                <div>
                  <div class="req-title">${r.title || r.id || '—'}</div>
                  <span class="status-pill ${statusClass(r.status)}">${r.status || 'Draft'}</span>
                </div>
                <div class="req-total">${fmt(r.total, r.currency)}</div>
              </div>
              <div class="meta">
                <span>${r.id || ''}</span>
                <span>${r.requester || ''}</span>
                <span>${r.date || ''}</span>
              </div>
            </div>`).join('');

          root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Requisitions</h1></div>${cards}`;
        } catch (e) {
          root.innerHTML = `<div class="header"><div class="icon">A</div><h1>Requisitions</h1></div><div class="card"><div class="error">Unable to load requisitions.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

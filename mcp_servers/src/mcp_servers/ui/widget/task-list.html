<html>
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
:root {
  color-scheme: light dark;
  --bg:#0b0f14; --surface:#111822; --card:#141c26; --card-hover:#172030;
  --border:#1e2a3a; --border-soft:#1a2435;
  --text:#e4ecf5; --text-muted:#7a8fa8; --text-dim:#4a5f78;
  --accent:#4cc2ff; --pos:#2bd48f; --neg:#ff6b6b; --warn:#f0b232;
  --chip-bg:#0e1620;
  --sn-color:#3eb489; --wd-color:#0875e1; --wd-orange:#f68620;
  --sf-color:#00a1e0; --jr-color:#0052cc;
  --r-card:12px; --r-chip:6px; --r-btn:8px; --r-pill:999px;
}
:root[data-theme="light"] {
  --bg:#f0f4f9; --surface:#fff; --card:#fff; --card-hover:#f5f8fc;
  --border:#dde3ee; --border-soft:#e8edf5;
  --text:#111827; --text-muted:#5a6580; --text-dim:#9faabf;
  --accent:#0078d4; --pos:#107c10; --neg:#d13438; --warn:#ca5010;
  --chip-bg:#eef2f8;
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg)}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:13px;color:var(--text);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
textarea{font-family:inherit;font-size:12px;resize:none}
.hub{display:flex;flex-direction:column;min-height:100%}

/* Header */
.hub-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.hub-brand{display:flex;align-items:center;gap:10px}
.hub-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,rgba(76,194,255,.15),rgba(76,194,255,.05));border:1px solid rgba(76,194,255,.3);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.hub-title{font-size:14px;font-weight:700;letter-spacing:-.2px}
.hub-subtitle{font-size:11px;color:var(--text-muted);margin-top:1px}
.hub-meta{display:flex;align-items:center;gap:8px}
.hub-count{font-size:11px;color:var(--text-muted);background:var(--chip-bg);border:1px solid var(--border);padding:2px 8px;border-radius:var(--r-pill)}
.hub-expand-btn{width:28px;height:28px;border-radius:7px;background:transparent;color:var(--text-muted);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s}
.hub-expand-btn:hover{color:var(--accent);border-color:var(--accent)}

/* Tabs */
.hub-tabs{display:flex;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:9px 14px;font-size:12px;font-weight:600;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:var(--r-pill);background:rgba(76,194,255,.12);color:var(--accent)}
.tab.active .tab-badge{background:var(--accent);color:var(--bg)}

/* Filters */
.hub-filters{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
.lozenges{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap}
.lozenge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r-pill);font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);transition:all .15s}
.lozenge:hover{color:var(--text);border-color:var(--text-dim)}
.lozenge.active{background:rgba(76,194,255,.1);color:var(--accent);border-color:rgba(76,194,255,.4)}
.lozenge[data-sys="servicenow"].active{background:rgba(62,180,137,.1);color:var(--sn-color);border-color:rgba(62,180,137,.4)}
.lozenge[data-sys="workday"].active{background:rgba(8,117,225,.12);color:var(--wd-color);border-color:rgba(8,117,225,.4)}
.lozenge[data-sys="salesforce"].active{background:rgba(0,161,224,.1);color:var(--sf-color);border-color:rgba(0,161,224,.4)}
.lozenge[data-sys="jira"].active{background:rgba(0,82,204,.12);color:var(--jr-color);border-color:rgba(0,82,204,.4)}
.lozenge-count{font-weight:700;opacity:.8}
.sort-wrap{position:relative;flex-shrink:0}
.sort-select{appearance:none;background:var(--chip-bg);border:1.5px solid var(--border);border-radius:var(--r-btn);color:var(--text-muted);padding:3px 22px 3px 8px;font-size:11px;font-family:inherit;cursor:pointer;outline:none;transition:border-color .15s}
.sort-select:hover,.sort-select:focus{border-color:var(--text-dim);color:var(--text)}
.sort-chevron{position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-dim);font-size:9px}

/* Hidden bar */
.hidden-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;font-size:11px;background:rgba(240,178,50,.06);border-bottom:1px solid rgba(240,178,50,.15);color:var(--warn);gap:8px}
.hidden-show-btn{font-size:10px;font-weight:600;padding:2px 8px;border:1px solid rgba(240,178,50,.3);border-radius:var(--r-pill);background:rgba(240,178,50,.1);color:var(--warn);transition:background .15s}
.hidden-show-btn:hover{background:rgba(240,178,50,.2)}

/* List */
.hub-list{flex:1;overflow-y:auto;padding:8px 10px 4px;max-height:380px;transition:max-height .2s}
.hub-list.fullscreen-mode{max-height:none}
.hub-list::-webkit-scrollbar{width:4px}
.hub-list::-webkit-scrollbar-track{background:transparent}
.hub-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* States */
.state-msg{text-align:center;padding:32px 16px;font-size:13px;color:var(--text-muted)}
.state-msg.error{color:var(--neg)}
@keyframes dots{0%,100%{content:'.'}33%{content:'..'}66%{content:'...'}}
.loading-dots::after{content:'...';animation:dots 1.2s infinite}

/* Cards */
.card{border-radius:var(--r-card);margin-bottom:6px;background:var(--card);overflow:hidden;border:1px solid var(--border);border-left:3px solid var(--sys-color,var(--border));cursor:pointer;transition:background .15s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.card:hover{background:var(--card-hover)}
.card:last-child{margin-bottom:0}
.card[data-sys="servicenow"]{--sys-color:var(--sn-color);--sys-bg:rgba(62,180,137,.08);--sys-label:#3eb489}
.card[data-sys="workday"]{--sys-color:var(--wd-orange);--sys-bg:rgba(246,134,32,.08);--sys-label:#f68620}
.card[data-sys="salesforce"]{--sys-color:var(--sf-color);--sys-bg:rgba(0,161,224,.08);--sys-label:#00a1e0}
.card[data-sys="jira"]{--sys-color:var(--jr-color);--sys-bg:rgba(0,82,204,.1);--sys-label:#4e8ff5}
.card-head{display:flex;align-items:flex-start;gap:10px;padding:10px 12px 8px}
.sys-badge{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:var(--sys-bg,var(--chip-bg));border:1px solid var(--sys-color,var(--border));color:var(--sys-label,var(--text-muted));font-size:9px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;margin-top:1px;text-transform:uppercase}
.card-body{flex:1;min-width:0}
.card-title{font-size:12.5px;font-weight:600;line-height:1.35;margin:0 0 5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-chips{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;padding:1px 6px;border-radius:var(--r-chip);font-size:10px;font-weight:600;background:var(--chip-bg);border:1px solid var(--border);color:var(--text-muted)}
.chip-priority-1,.chip-priority-2{color:var(--neg);border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.08)}
.chip-priority-3{color:var(--warn);border-color:rgba(240,178,50,.25);background:rgba(240,178,50,.08)}
.chip-overdue{color:var(--neg);border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.08)}
.chip-required{color:var(--warn);border-color:rgba(240,178,50,.25);background:rgba(240,178,50,.08)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;gap:6px;min-height:26px}
.expand-arrow{font-size:9px;color:var(--text-dim);transition:transform .2s;display:inline-block}
.card.expanded .expand-arrow{transform:rotate(180deg)}
.due-label{font-size:10px;color:var(--text-dim);white-space:nowrap}
.due-label.overdue{color:var(--neg)}

/* Card detail */
.card-detail{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s}
.card.expanded .card-detail{max-height:1200px;padding:0 12px 12px;overflow:visible}
.detail-divider{height:1px;background:var(--border-soft);margin-bottom:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:10px}
.detail-field .df-label{font-size:9.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin:0 0 2px}
.detail-field .df-val{font-size:12px;font-weight:500;color:var(--text);margin:0;word-break:break-all}
.detail-summary{font-size:12px;color:var(--text-muted);margin:0 0 10px;line-height:1.5}
.detail-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-dim);margin:10px 0 6px}

/* Actions shared */
.approval-section,.task-actions-section{border-top:1px solid var(--border-soft);padding-top:10px;margin-top:2px}
.approval-loading{font-size:12px;color:var(--text-muted);padding:8px 0}
.approval-comment,.comment-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-btn);color:var(--text);padding:7px 10px;outline:none;transition:border-color .15s}
.approval-comment{margin-bottom:8px}
.approval-comment:focus,.comment-input:focus{border-color:var(--accent)}
.comment-input{margin-bottom:6px;height:54px}
.approval-btns,.inline-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;padding:6px 14px;border-radius:var(--r-btn);font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--chip-bg);color:var(--text);transition:background .15s,opacity .15s;text-decoration:none;cursor:pointer;box-sizing:border-box}
.btn:hover{background:var(--card-hover)}
.btn:disabled{opacity:.45;cursor:default}
.btn-approve{background:rgba(43,212,143,.12);color:var(--pos);border-color:rgba(43,212,143,.3)}
.btn-approve:hover:not(:disabled){background:rgba(43,212,143,.22)}
.btn-reject{background:rgba(255,107,107,.1);color:var(--neg);border-color:rgba(255,107,107,.3)}
.btn-reject:hover:not(:disabled){background:rgba(255,107,107,.2)}
.btn-copilot{background:rgba(76,194,255,.07);color:var(--accent);border-color:rgba(76,194,255,.25);margin-left:auto}
.btn-copilot:hover{background:rgba(76,194,255,.15)}
.btn-open{gap:4px;background:var(--chip-bg);color:var(--text-muted);border-color:var(--border);font-size:11px}
.btn-open:hover{color:var(--accent);border-color:var(--accent)}
.btn-sys{background:var(--sys-bg,var(--chip-bg));color:var(--sys-label,var(--text));border-color:var(--sys-color,var(--border))}
.btn-sys:hover{opacity:.85}
.btn-send{background:rgba(76,194,255,.1);color:var(--accent);border-color:rgba(76,194,255,.3)}
.btn-send:hover:not(:disabled){background:rgba(76,194,255,.2)}
.btn-launch{background:rgba(8,117,225,.12);color:var(--wd-color);border-color:rgba(8,117,225,.35);gap:5px}
.btn-launch:hover{background:rgba(8,117,225,.22)}
.btn-transition{padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:600;border:1.5px solid var(--border);background:var(--chip-bg);color:var(--text-muted);transition:all .15s}
.btn-transition:hover{background:var(--card-hover);color:var(--text)}
.result-msg{margin-top:8px;padding:7px 10px;border-radius:var(--r-btn);font-size:12px;text-align:center}
.result-msg.success{background:rgba(43,212,143,.1);color:var(--pos)}
.result-msg.error{background:rgba(255,107,107,.1);color:var(--neg)}
.nonce-expiry{font-size:10px;color:var(--text-dim);margin-top:5px;text-align:right}
.comment-list{max-height:140px;overflow-y:auto;margin-bottom:8px}
.comment-item{background:var(--bg);border:1px solid var(--border-soft);border-radius:var(--r-btn);padding:7px 9px;margin-bottom:4px}
.comment-meta{font-size:10px;color:var(--text-dim);margin-bottom:3px}
.comment-body{font-size:11.5px;color:var(--text-muted);line-height:1.4}
.transitions-label{font-size:10px;color:var(--text-dim);font-style:italic}

/* Footer */
.hub-footer{padding:8px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.btn-refresh{padding:5px 12px;border-radius:var(--r-btn);background:var(--chip-bg);color:var(--text-muted);border:1.5px solid var(--border);font-size:11px;transition:color .15s,border-color .15s}
.btn-refresh:hover{color:var(--text);border-color:var(--text-dim)}
</style>
</head>
<body>
<div class="hub" id="hub">

  <div class="hub-header">
    <div class="hub-brand">
      <div class="hub-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div>
        <div class="hub-title">Tasks &amp; Approvals</div>
        <div class="hub-subtitle">Unified Activity Hub</div>
      </div>
    </div>
    <div class="hub-meta">
      <span class="hub-count" id="countBadge">0 items</span>
      <button class="hub-expand-btn" id="expandBtn" title="Fullscreen">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="hub-tabs" id="tabBar">
    <button class="tab active" data-tab="approvals">Approvals <span class="tab-badge" id="badgeApprovals">0</span></button>
    <button class="tab" data-tab="tasks">Tasks <span class="tab-badge" id="badgeTasks">0</span></button>
    <button class="tab" data-tab="learning">Learning <span class="tab-badge" id="badgeLearning">0</span></button>
  </div>

  <div class="hub-filters">
    <div class="lozenges" id="lozengeBar"><button class="lozenge active" data-sys="all">All</button></div>
    <div class="sort-wrap">
      <select class="sort-select" id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="due-asc">Due earliest first</option>
        <option value="due-desc">Due latest first</option>
        <option value="created-desc">Newest first</option>
        <option value="created-asc">Oldest first</option>
        <option value="priority">By priority</option>
        <option value="system">By system</option>
      </select>
      <span class="sort-chevron">&#9662;</span>
    </div>
  </div>

  <div class="hidden-bar" id="hiddenBar" style="display:none">
    <span id="hiddenMsg"></span>
    <button class="hidden-show-btn" id="toggleClosedBtn">Show all</button>
  </div>

  <div class="hub-list" id="list">
    <div class="state-msg"><span class="loading-dots">Loading</span></div>
  </div>

  <div class="hub-footer">
    <button class="btn-refresh" id="refreshBtn">&#8635; Refresh</button>
  </div>
</div>

<script>
/* ── State ── */
var _items=[],_activeTab='approvals',_activeSys='all',_sortKey='default';
var _showClosed=false,_isFullscreen=false,_expanded={},_reviews={},_details={};

var CLOSED_RE=/^(done|closed|resolved|completed|won.t|cancelled?|canceled|withdrawn|inactive|finished|fixed|verified|rejected)/i;
function isClosed(s){return CLOSED_RE.test((s||'').trim());}

var SYS_META={
  servicenow:{abbr:'SN',label:'ServiceNow'},
  workday:{abbr:'WD',label:'Workday'},
  salesforce:{abbr:'SF',label:'Salesforce'},
  jira:{abbr:'JR',label:'Jira'}
};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fmt(s){if(!s)return '\u2014';try{return new Date(s).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}catch(e){return s;}}
function notifyHeight(){if(window.openai&&typeof window.openai.notifyIntrinsicHeight==='function')window.openai.notifyIntrinsicHeight(document.body.scrollHeight);}

function openLink(url){
  if(!url)return;
  if(window.openai&&typeof window.openai.openUrl==='function'){window.openai.openUrl(url);return;}
  var a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
  a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function priClass(p){
  if(!p)return '';
  var n=parseInt(p);
  if(!isNaN(n)){if(n<=2)return 'chip-priority-1';if(n===3)return 'chip-priority-3';return '';}
  var l=(p||'').toLowerCase();
  if(l==='highest'||l==='critical'||l==='high')return 'chip-priority-1';
  if(l==='medium'||l==='moderate')return 'chip-priority-3';
  return '';
}

function safeId(id){return(id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\\'");}

/* ── Lozenges ── */
function buildLozenges(){
  var tk={approvals:'approval',tasks:'task',learning:'learning'}[_activeTab]||_activeTab;
  var counts={};
  _items.filter(function(i){return i.kind===tk;}).forEach(function(i){counts[i.system]=(counts[i.system]||0)+1;});
  var total=_items.filter(function(i){return i.kind===tk;}).length;
  var bar=document.getElementById('lozengeBar');
  bar.innerHTML='';
  var allBtn=document.createElement('button');
  allBtn.className='lozenge'+(_activeSys==='all'?' active':'');
  allBtn.setAttribute('data-sys','all');
  allBtn.innerHTML='All <span class="lozenge-count">'+total+'</span>';
  allBtn.onclick=function(){_activeSys='all';buildLozenges();applyFilters();};
  bar.appendChild(allBtn);
  Object.keys(counts).sort().forEach(function(sys){
    var meta=SYS_META[sys]||{label:sys,abbr:sys.slice(0,2).toUpperCase()};
    var btn=document.createElement('button');
    btn.className='lozenge'+(_activeSys===sys?' active':'');
    btn.setAttribute('data-sys',sys);
    btn.innerHTML=esc(meta.label)+' <span class="lozenge-count">'+counts[sys]+'</span>';
    btn.onclick=(function(s){return function(){_activeSys=_activeSys===s?'all':s;buildLozenges();applyFilters();};})(sys);
    bar.appendChild(btn);
  });
}

/* ── Sort ── */
function sortItems(items){
  var key=_sortKey;
  return items.slice().sort(function(a,b){
    if(key==='default'){
      var ko={approval:0,task:1,learning:2};
      var ka=ko[a.kind]||1,kb=ko[b.kind]||1;
      if(ka!==kb)return ka-kb;
      return(a.dueDate||'9999')<(b.dueDate||'9999')?-1:1;
    }
    if(key==='due-asc')return(a.dueDate||'9999')<(b.dueDate||'9999')?-1:1;
    if(key==='due-desc')return(a.dueDate||'9999')>(b.dueDate||'9999')?-1:1;
    if(key==='created-desc')return(a.createdDate||'0')>(b.createdDate||'0')?-1:1;
    if(key==='created-asc')return(a.createdDate||'9')<(b.createdDate||'9')?-1:1;
    if(key==='system')return(a.system||'').localeCompare(b.system||'');
    if(key==='priority'){
      var pa=parseInt(a.priority)||99,pb=parseInt(b.priority)||99;
      if(pa!==pb)return pa-pb;
      var pm={critical:1,highest:1,high:2,medium:3,moderate:3,low:4,lowest:5};
      return(pm[(a.priority||'').toLowerCase()]||99)-(pm[(b.priority||'').toLowerCase()]||99);
    }
    return 0;
  });
}

/* ── Render ── */
function render(data){
  _items=(data&&data.items)||[];
  document.getElementById('badgeApprovals').textContent=data?(data.approvalCount||0):0;
  document.getElementById('badgeTasks').textContent=data?(data.taskCount||0):0;
  document.getElementById('badgeLearning').textContent=data?(data.learningCount||0):0;
  document.getElementById('countBadge').textContent=_items.length+' item'+(_items.length!==1?'s':'');
  buildLozenges();applyFilters();
}

function applyFilters(){
  var list=document.getElementById('list');
  var tk={approvals:'approval',tasks:'task',learning:'learning'}[_activeTab]||_activeTab;
  var visible=[],hidden=0;
  sortItems(_items).forEach(function(item){
    if(item.kind!==tk)return;
    if(_activeSys!=='all'&&item.system!==_activeSys)return;
    if(!_showClosed&&isClosed(item.status)){hidden++;return;}
    visible.push(item);
  });
  var hbar=document.getElementById('hiddenBar');
  if(hidden>0){
    hbar.style.display='flex';
    document.getElementById('hiddenMsg').textContent=hidden+' completed item'+(hidden!==1?'s':'')+' hidden';
    document.getElementById('toggleClosedBtn').textContent=_showClosed?'Hide completed':'Show all';
  }else{hbar.style.display='none';}
  if(visible.length===0){list.innerHTML='<div class="state-msg">No '+_activeTab+' found.</div>';notifyHeight();return;}
  list.innerHTML=visible.map(renderCard).join('');
  notifyHeight();
}

document.getElementById('toggleClosedBtn').onclick=function(){_showClosed=!_showClosed;applyFilters();};
document.getElementById('refreshBtn').onclick=load;
document.getElementById('sortSelect').onchange=function(){_sortKey=this.value;applyFilters();};

/* ── Card ── */
function renderCard(item){
  var meta=SYS_META[item.system]||{abbr:(item.system||'??').slice(0,2).toUpperCase(),label:item.system||'Unknown'};
  var isExp=!!_expanded[item.id];
  var chips='';
  if(item.status)chips+='<span class="chip">'+esc(item.status)+'</span>';
  if(item.priority)chips+='<span class="chip '+priClass(item.priority)+'">'+esc(item.priority)+'</span>';
  if(item.assignee)chips+='<span class="chip">'+esc(item.assignee)+'</span>';
  if(item.overdue)chips+='<span class="chip chip-overdue">&#9888; Overdue</span>';
  if(item.required)chips+='<span class="chip chip-required">Required</span>';
  var rawId='';
  if(item.id&&item.id.indexOf(':')>=0){var p=item.id.split(':');rawId=p.slice(2).join(':');}
  if(rawId&&rawId.length<=20)chips+='<span class="chip">'+esc(rawId)+'</span>';
  var due='';
  if(item.dueDate){
    var ov=item.overdue||(new Date(item.dueDate)<new Date());
    due='<span class="due-label'+(ov?' overdue':'')+'" title="Due">'+esc(fmt(item.dueDate))+'</span>';
  }
  var sid=safeId(item.id);
  var det=isExp?renderCardDetail(item):'';
  return '<div class="card'+(isExp?' expanded':'')+'" data-sys="'+esc(item.system)+'" data-id="'+esc(item.id)+'" onclick="toggleCard(\''+sid+'\')">'+
    '<div class="card-head">'+
      '<div class="sys-badge">'+esc(meta.abbr)+'</div>'+
      '<div class="card-body">'+
        '<div class="card-title">'+esc(item.title||'(untitled)')+'</div>'+
        '<div class="card-chips">'+chips+'</div>'+
      '</div>'+
      '<div class="card-right"><span class="expand-arrow">&#9662;</span>'+due+'</div>'+
    '</div>'+
    '<div class="card-detail">'+det+'</div>'+
  '</div>';
}

function renderCardDetail(item){
  var h='<div class="detail-divider"></div>';
  if(item.summary)h+='<p class="detail-summary">'+esc(item.summary)+'</p>';
  var fields=[];
  if(item.system)fields.push(['System',item.system]);
  if(item.status)fields.push(['Status',item.status]);
  if(item.priority)fields.push(['Priority',item.priority]);
  if(item.assignee)fields.push(['Assignee',item.assignee]);
  if(item.createdDate)fields.push(['Created',fmt(item.createdDate)]);
  if(item.dueDate)fields.push(['Due',fmt(item.dueDate)]);
  if(fields.length){
    h+='<div class="detail-grid">';
    fields.forEach(function(f){h+='<div class="detail-field"><p class="df-label">'+esc(f[0])+'</p><p class="df-val">'+esc(f[1])+'</p></div>';});
    h+='</div>';
  }
  if(item.kind==='approval')h+=renderApprovalSection(item);
  else if(item.kind==='learning')h+=renderLearningSection(item);
  else if(item.system==='jira'||item.system==='salesforce')h+=renderTaskActionSection(item);
  else h+=renderBasicTaskSection(item);
  return h;
}

/* ── Approval section ── */
function renderApprovalSection(item){
  var rev=_reviews[item.id];
  var sid=safeId(item.id);
  var h='<div class="approval-section" onclick="event.stopPropagation()">';
  if(!rev||rev.loading){
    h+='<div class="approval-loading"><span class="loading-dots">Loading approval</span></div>';
  }else if(rev.resultMsg){
    h+='<div class="result-msg '+(rev.resultSuccess?'success':'error')+'">'+esc(rev.resultMsg)+'</div>'+renderOpenBtn(item);
  }else if(rev.error){
    h+='<div class="result-msg error">'+esc(rev.error)+'</div>'+renderOpenBtn(item);
  }else if(rev.data){
    var snonce=safeId(rev.data.nonce||'');
    var exp=rev.data.expiresAt;
    h+='<textarea class="approval-comment" id="ac-'+esc(item.id)+'" rows="2" placeholder="Optional comment..."></textarea>';
    h+='<div class="approval-btns">';
    h+='<button class="btn btn-approve" id="ba-'+esc(item.id)+'" onclick="execDecision(\''+sid+'\',\'approve\',\''+snonce+'\')">&#10003; Approve</button>';
    h+='<button class="btn btn-reject" id="br-'+esc(item.id)+'" onclick="execDecision(\''+sid+'\',\'reject\',\''+snonce+'\')">&#10007; Reject</button>';
    h+='<button class="btn btn-copilot" onclick="askCopilotApproval(\''+sid+'\')">&#129504; Ask Copilot</button>';
    if(item.link)h+=renderOpenBtn(item);
    h+='</div>';
    if(exp)h+='<div class="nonce-expiry">Expires '+esc(new Date(exp).toLocaleTimeString())+'</div>';
  }
  h+='</div>';
  return h;
}

/* ── Learning section ── */
function renderLearningSection(item){
  var sid=safeId(item.id);
  var h='<div class="task-actions-section" onclick="event.stopPropagation()">';
  // Status + metadata chips
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">';
  if(item.status)h+='<span class="chip">'+esc(item.status)+'</span>';
  if(item.required)h+='<span class="chip chip-required">Required</span>';
  if(item.overdue)h+='<span class="chip chip-overdue">&#9888; Overdue</span>';
  if(item.dueDate)h+='<span class="chip">Due: '+esc(fmt(item.dueDate))+'</span>';
  if(item.contentProvider)h+='<span class="chip">'+esc(item.contentProvider)+'</span>';
  if(item.courseDuration)h+='<span class="chip">'+esc(item.courseDuration)+'</span>';
  h+='</div>';
  // Comments thread
  if(item.comments&&item.comments.trim()){
    var commentLines=item.comments.split(';').map(function(s){return s.trim();}).filter(Boolean);
    h+='<div class="detail-section-title">Comments ('+commentLines.length+')</div>';
    h+='<div class="comment-list">';
    commentLines.forEach(function(line){
      // Lines are formatted "DD/MM/YYYY, HH:MM:SS: (Author) text"
      var m=line.match(/^(\d[^:]+):\s*\(([^)]+)\)\s*(.*)$/);
      if(m){
        h+='<div class="comment-item"><div class="comment-meta">'+esc(m[2])+' &middot; '+esc(m[1])+'</div><div class="comment-body">'+esc(m[3])+'</div></div>';
      }else{
        h+='<div class="comment-item"><div class="comment-body">'+esc(line)+'</div></div>';
      }
    });
    h+='</div>';
  }
  // Action buttons
  h+='<div class="inline-actions">';
  if(item.link){
    h+='<a class="btn btn-launch" href="'+esc(item.link)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#9654; Launch Course</a>';
  }else{
    h+='<span class="transitions-label">No course link available</span>';
  }
  h+='<button class="btn btn-copilot" onclick="askCopilotTask(\''+sid+'\')" style="margin-left:auto">&#129504; Ask Copilot</button>';
  h+='</div></div>';
  return h;
}

/* ── Task action section (Jira / Salesforce) ── */
function renderTaskActionSection(item){
  var det=_details[item.id];
  var sid=safeId(item.id);
  var h='<div class="task-actions-section" onclick="event.stopPropagation()">';
  if(!det||det.loading){
    h+='<div class="approval-loading"><span class="loading-dots">Loading details</span></div>';
  }else if(det.error){
    h+='<div class="result-msg error">'+esc(det.error)+'</div>'+renderBasicTaskSection(item);
  }else if(det.data){
    var d=det.data,comments=d.comments||[];
    h+='<div class="detail-section-title">Comments ('+comments.length+')</div>';
    if(comments.length){
      h+='<div class="comment-list">';
      comments.forEach(function(c){
        var author=c.author||c.created_by||'';
        var body=c.body||c.CommentBody||'';
        var dt=fmt(c.created||c.created_date||c.CreatedDate||'');
        h+='<div class="comment-item"><div class="comment-meta">'+esc(author)+(dt?' &middot; '+esc(dt):'')+
           '</div><div class="comment-body">'+esc(body)+'</div></div>';
      });
      h+='</div>';
    }else{
      h+='<p style="font-size:11px;color:var(--text-dim);margin:0 0 6px;">No comments yet.</p>';
    }
    h+='<textarea class="comment-input" id="ci-'+esc(item.id)+'" placeholder="Write a comment..."></textarea>';
    h+='<div class="inline-actions">';
    h+='<button class="btn btn-send" id="bs-'+esc(item.id)+'" onclick="addComment(\''+sid+'\')">&#10148; Post</button>';
    if(item.system==='salesforce'){
      h+='<select class="sort-select" id="sfs-'+esc(item.id)+'" style="font-size:11px;padding:3px 18px 3px 7px;">';
      ['New','Working','Escalated','Closed'].forEach(function(s){
        h+='<option value="'+esc(s)+'"'+(item.status===s?' selected':'')+'>'+esc(s)+'</option>';
      });
      h+='</select><button class="btn btn-sys" onclick="updateStatus(\''+sid+'\')">Update Status</button>';
    }
    if(item.system==='jira'){
      var trans=d.transitions||[];
      if(trans.length){
        h+='<span class="transitions-label">Transition:</span>';
        trans.slice(0,6).forEach(function(t){
          h+='<button class="btn btn-transition" onclick="execTransition(\''+sid+'\',\''+safeId(t.id||'')+'\')">'+esc(t.name)+'</button>';
        });
      }
    }
    if(item.link)h+=renderOpenBtn(item);
    h+='<button class="btn btn-copilot" onclick="askCopilotTask(\''+sid+'\')" style="margin-left:auto">&#129504; Ask Copilot</button>';
    h+='</div>';
    if(det.resultMsg)h+='<div class="result-msg '+(det.resultSuccess?'success':'error')+'">'+esc(det.resultMsg)+'</div>';
  }
  h+='</div>';
  return h;
}

function renderBasicTaskSection(item){
  var sid=safeId(item.id);
  var h='<div class="task-actions-section" onclick="event.stopPropagation()">';
  h+='<div class="inline-actions">';
  h+='<button class="btn btn-copilot" onclick="askCopilotTask(\''+sid+'\')">&#129504; Ask Copilot how to action this</button>';
  if(item.link)h+=renderOpenBtn(item);
  h+='</div></div>';
  return h;
}

function renderOpenBtn(item){
  if(!item.link)return '';
  var meta=SYS_META[item.system]||{label:item.system||'system'};
  // Use openLink() so Skybridge's openUrl API is used when available.
  // return false prevents the <a> from also trying to navigate (blocked in sandbox).
  return '<a class="btn btn-open" href="'+esc(item.link)+'" onclick="openLink(this.href);return false;">&nearr; Open in '+esc(meta.label)+'</a>';
}

/* ── Toggle ── */
window.toggleCard=function(itemId){
  var wasExp=_expanded[itemId];
  _expanded[itemId]=!wasExp;
  if(!wasExp){
    var item=_items.find(function(i){return i.id===itemId;});
    if(item){
      if(item.kind==='approval'&&!_reviews[itemId])loadApprovalReview(itemId);
      else if((item.system==='jira'||item.system==='salesforce')&&item.kind==='task'&&!_details[itemId])loadItemDetail(itemId);
    }
  }
  applyFilters();
};

/* ── Approval review ── */
async function loadApprovalReview(itemId){
  _reviews[itemId]={loading:true};applyFilters();
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    var out=await window.openai.callTool('prepare_approval_review',{item_id:itemId});
    var data=(out&&out.structuredContent)||out||{};
    var rev=data.review||data;
    if(!rev||!rev.nonce)throw new Error('No review data');
    _reviews[itemId]={loading:false,data:rev};
  }catch(e){_reviews[itemId]={loading:false,error:e.message||'Failed to load review'};}
  applyFilters();
}

window.execDecision=async function(itemId,decision,nonce){
  event.stopPropagation();
  var ab=document.getElementById('ba-'+itemId),rb=document.getElementById('br-'+itemId);
  if(ab)ab.disabled=true;if(rb)rb.disabled=true;
  var ce=document.getElementById('ac-'+itemId);
  var comment=ce?ce.value:'';
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    await window.openai.callTool('execute_approval_decision',{nonce:nonce,decision:decision,comment:comment});
    _reviews[itemId]={resultSuccess:true,resultMsg:(decision==='approve'?'✓ Approved':'✗ Rejected')+' successfully'};
  }catch(e){
    _reviews[itemId].resultMsg=e.message||'Action failed';_reviews[itemId].resultSuccess=false;
    if(ab)ab.disabled=false;if(rb)rb.disabled=false;
  }
  applyFilters();
};

/* ── Item detail ── */
async function loadItemDetail(itemId){
  _details[itemId]={loading:true};applyFilters();
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    var out=await window.openai.callTool('get_item_detail',{item_id:itemId});
    _details[itemId]={loading:false,data:(out&&out.structuredContent)||out||{}};
  }catch(e){_details[itemId]={loading:false,error:e.message||'Failed to load details'};}
  applyFilters();
}

window.addComment=async function(itemId){
  event.stopPropagation();
  var btn=document.getElementById('bs-'+itemId),ta=document.getElementById('ci-'+itemId);
  if(!ta||!ta.value.trim())return;
  var comment=ta.value.trim();if(btn)btn.disabled=true;
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    await window.openai.callTool('add_item_comment',{item_id:itemId,comment:comment});
    // Optimistically insert the new comment so it appears immediately even if
    // the provider API has a short indexing delay before returning it in the reload.
    if(_details[itemId]&&_details[itemId].data){
      var now=new Date().toISOString();
      var optimistic={body:comment,author:'You',created:now};
      _details[itemId].data.comments=(_details[itemId].data.comments||[]).concat([optimistic]);
      applyFilters();
    }
    ta.value='';
    // Reload in the background to get canonical server state.
    delete _details[itemId];
    await loadItemDetail(itemId);
  }catch(e){
    if(_details[itemId])_details[itemId].resultMsg=e.message||'Failed';
    if(_details[itemId])_details[itemId].resultSuccess=false;
    if(btn)btn.disabled=false;applyFilters();
  }
};

window.updateStatus=async function(itemId){
  event.stopPropagation();
  var sel=document.getElementById('sfs-'+itemId);if(!sel)return;
  var ns=sel.value,ce=document.getElementById('ci-'+itemId),comment=ce?ce.value.trim():'';
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    await window.openai.callTool('execute_item_transition',{item_id:itemId,action:ns,comment:comment});
    if(ce)ce.value='';
    var item=_items.find(function(i){return i.id===itemId;});if(item)item.status=ns;
    if(_details[itemId])_details[itemId].resultMsg='✓ Status updated to '+ns;
    if(_details[itemId])_details[itemId].resultSuccess=true;
  }catch(e){
    if(_details[itemId])_details[itemId].resultMsg=e.message||'Failed';
    if(_details[itemId])_details[itemId].resultSuccess=false;
  }
  applyFilters();
};

window.execTransition=async function(itemId,transitionId){
  event.stopPropagation();
  var ce=document.getElementById('ci-'+itemId),comment=ce?ce.value.trim():'';
  try{
    if(!window.openai||typeof window.openai.callTool!=='function')throw new Error('Skybridge not available');
    var out=await window.openai.callTool('execute_item_transition',{item_id:itemId,action:transitionId,comment:comment});
    var res=(out&&out.structuredContent)||out||{};
    var ns=res.newStatus||res.status||'updated';
    if(ce)ce.value='';
    var item=_items.find(function(i){return i.id===itemId;});if(item&&ns)item.status=ns;
    delete _details[itemId];await loadItemDetail(itemId);
  }catch(e){
    if(_details[itemId])_details[itemId].resultMsg=e.message||'Failed';
    if(_details[itemId])_details[itemId].resultSuccess=false;
    applyFilters();
  }
};

/* ── Ask Copilot ── */
window.askCopilotTask=function(itemId){
  event.stopPropagation();
  if(!window.openai||typeof window.openai.sendFollowUpMessage!=='function')return;
  var item=_items.find(function(i){return i.id===itemId;});if(!item)return;
  var msg;
  if(item.kind==='learning'){
    msg='I have a Workday learning assignment: "'+item.title+'". Please help me understand what this course covers and whether it is relevant to my role.';
    if(item.dueDate)msg+='\nDue: '+item.dueDate;
  }else{
    msg='I have a task in '+(item.system||'the system')+': "'+item.title+'". Please help me understand what I need to do to complete it.';
    if(item.summary)msg+='\nDescription: '+item.summary;
    if(item.status)msg+='\nStatus: '+item.status;
    if(item.priority)msg+='\nPriority: '+item.priority;
    if(item.dueDate)msg+='\nDue: '+item.dueDate;
  }
  msg+='\n(Ref: '+itemId+')';
  window.openai.sendFollowUpMessage({prompt:msg});
};

window.askCopilotApproval=function(itemId){
  event.stopPropagation();
  if(!window.openai||typeof window.openai.sendFollowUpMessage!=='function')return;
  var item=_items.find(function(i){return i.id===itemId;});if(!item)return;
  var msg='Please summarise this approval request in '+(item.system||'the system')+' so I can decide whether to approve or reject it.\n\n"'+item.title+'"';
  if(item.summary)msg+='\nContext: '+item.summary;
  if(item.assignee)msg+='\nRequested by: '+item.assignee;
  msg+='\n(Ref: '+itemId+')';
  window.openai.sendFollowUpMessage({prompt:msg});
};

/* ── Tabs ── */
document.getElementById('tabBar').addEventListener('click',function(e){
  var btn=e.target.closest('[data-tab]');if(!btn)return;
  _activeTab=btn.dataset.tab;_activeSys='all';_expanded={};
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===_activeTab);});
  buildLozenges();applyFilters();
});

/* ── Fullscreen ── */
var _expSvg='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
var _colSvg='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
var _expBtn=document.getElementById('expandBtn');
async function toggleFullscreen(){
  if(!window.openai||typeof window.openai.requestDisplayMode!=='function')return;
  try{
    await window.openai.requestDisplayMode({mode:_isFullscreen?'inline':'fullscreen'});
    _isFullscreen=!_isFullscreen;
    _expBtn.innerHTML=_isFullscreen?_colSvg:_expSvg;
    _expBtn.title=_isFullscreen?'Restore':'Fullscreen';
    document.getElementById('list').classList.toggle('fullscreen-mode',_isFullscreen);
    notifyHeight();
  }catch(e){}
}
if(window.openai&&typeof window.openai.requestDisplayMode==='function'){
  _expBtn.addEventListener('click',toggleFullscreen);
}else{_expBtn.style.display='none';}

/* ── Load ── */
async function load(){
  _expanded={};_reviews={};_details={};
  document.getElementById('list').innerHTML='<div class="state-msg"><span class="loading-dots">Loading</span></div>';
  try{
    if(!window.openai||typeof window.openai.callTool!=='function'){
      document.getElementById('list').innerHTML='<div class="state-msg error">Skybridge not available</div>';return;
    }
    var out=await window.openai.callTool('list_items',{});
    var data=(out&&out.structuredContent)?out.structuredContent:out;
    render(data);
  }catch(e){
    document.getElementById('list').innerHTML='<div class="state-msg error">'+esc(e.message||'Failed to load')+'</div>';
    notifyHeight();
  }
}

/* ── Bootstrap ── */
var to=(window.openai&&window.openai.toolOutput)||{};
if(to&&to.items){render(to);}else{load();}
</script>

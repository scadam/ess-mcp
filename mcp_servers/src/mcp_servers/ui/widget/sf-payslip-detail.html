<html>
  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)'),a=!d.hasAttribute('data-theme');function s(){d.setAttribute('data-theme',m.matches?'dark':'light')}if(a)s();m.addEventListener('change',function(){if(a)s()});new MutationObserver(function(){a=false}).observe(d,{attributes:true,attributeFilter:['data-theme']})})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14; --card: #151a21; --muted: #a9b1bd; --text: #e6edf3;
        --accent: #4cc2ff; --border: #1f2630; --card-border: #2a3442;
        --card-shadow: rgba(0,0,0,.3); --card-glow: rgba(240,171,0,.16);
        --btn-bg: #152235; --btn-border: #243145;
        --sf-accent: #f0ab00; --sf-glow: rgba(240,171,0,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5; --card: #ffffff; --muted: #65707d; --text: #1e1e1e;
        --accent: #0078d4; --border: #e0e0e0; --card-border: #d0d0d0;
        --card-shadow: rgba(0,0,0,.08); --card-glow: rgba(212,152,0,.08);
        --btn-bg: #f0f0f0; --btn-border: #d0d0d0;
        --sf-accent: #d49800; --sf-glow: rgba(212,152,0,.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }
      .wrap { max-width: 560px; margin: 0 auto; }
      .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .header .icon { color: var(--sf-accent); font-size: 20px; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px var(--card-shadow), 0 0 0 1px var(--card-glow); }
      .pay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
      .pay-date { font-size: 16px; font-weight: 600; }
      .pay-period { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .pay-currency { font-size: 13px; color: var(--muted); background: var(--btn-bg); padding: 4px 10px; border-radius: 8px; }
      .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .col-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 600; }
      .line-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
      .line-item:last-child { border-bottom: none; }
      .line-label { color: var(--text); }
      .line-amount { font-weight: 600; font-variant-numeric: tabular-nums; }
      .earnings .line-amount { color: #3fb950; }
      .deductions .line-amount { color: #f85149; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
      .totals { display: flex; justify-content: space-between; gap: 20px; }
      .total-box { flex: 1; text-align: center; padding: 12px; border-radius: 10px; background: var(--btn-bg); }
      .total-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
      .total-value { font-size: 22px; font-weight: 700; }
      .total-gross .total-value { color: var(--text); }
      .total-net .total-value { color: var(--sf-accent); }
      .spinner { display: flex; justify-content: center; padding: 48px 0; }
      .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--sf-accent); border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 32px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="spinner"></div></div>
    <script>
      const SAMPLE_DATA = {
        payDate: "2026-04-15", period: "April 1 – April 30, 2026", currency: "USD",
        gross: "8,500.00", net: "6,120.00",
        earnings: [
          { label: "Base Salary", amount: "7,500.00" },
          { label: "Overtime", amount: "500.00" },
          { label: "Bonus", amount: "500.00" }
        ],
        deductions: [
          { label: "Federal Tax", amount: "1,275.00" },
          { label: "State Tax", amount: "425.00" },
          { label: "Social Security", amount: "527.00" },
          { label: "Medicare", amount: "123.25" },
          { label: "401(k)", amount: "29.75" }
        ]
      };

      (async () => {
        const root = document.getElementById('root');
        try {
          const data = typeof window.openai !== 'undefined'
            ? await window.openai.toolOutput
            : SAMPLE_DATA;

          const d = data;
          root.innerHTML = `
            <div class="header"><span class="icon">◆</span><h1>Payslip Detail</h1></div>
            <div class="card">
              <div class="pay-header">
                <div>
                  <div class="pay-date">${d.payDate || '—'}</div>
                  <div class="pay-period">${d.period || ''}</div>
                </div>
                <span class="pay-currency">${d.currency || 'USD'}</span>
              </div>
              <div class="columns">
                <div class="earnings">
                  <div class="col-title">Earnings</div>
                  ${(d.earnings || []).map(e => `
                    <div class="line-item">
                      <span class="line-label">${e.label}</span>
                      <span class="line-amount">${e.amount}</span>
                    </div>
                  `).join('')}
                </div>
                <div class="deductions">
                  <div class="col-title">Deductions</div>
                  ${(d.deductions || []).map(e => `
                    <div class="line-item">
                      <span class="line-label">${e.label}</span>
                      <span class="line-amount">−${e.amount}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
              <hr class="divider" />
              <div class="totals">
                <div class="total-box total-gross">
                  <div class="total-label">Gross Pay</div>
                  <div class="total-value">${d.gross || '—'}</div>
                </div>
                <div class="total-box total-net">
                  <div class="total-label">Net Pay</div>
                  <div class="total-value">${d.net || '—'}</div>
                </div>
              </div>
            </div>`;
        } catch (e) {
          root.innerHTML = `<div class="header"><span class="icon">◆</span><h1>Payslip Detail</h1></div><div class="card"><div class="error">Unable to load payslip detail.</div></div>`;
        }
      })();
    </script>
  </body>
</html>

  <script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)');function t(){if(!d.dataset.theme)d.dataset.theme=m.matches?'dark':'light';}t();m.addEventListener('change',function(){if(!d.getAttribute('data-theme'))t();});new MutationObserver(function(){}).observe(d,{attributes:true,attributeFilter:['data-theme']});})()</script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14;
        --card: #151a21;
        --muted: #a9b1bd;
        --text: #e6edf3;
        --accent: #4cc2ff;
        --border: #1f2630;
        --pos: #2bd48f;
        --neg: #ff6b6b;
        --input-bg: #0f131a;
        --btn-bg: #152235;
        --btn-border: #243145;
        --btn-primary-bg: linear-gradient(135deg, #1a6dff, #4cc2ff);
        --btn-primary-border: #2a80ff;
        --success-border: #1a5a3a;
        --success-glow: rgba(43,212,143,.16);
        --error-bg: rgba(255,107,107,.08);
        --error-border: rgba(255,107,107,.25);
        --cal-today: rgba(76,194,255,.18);
        --cal-booked: rgba(76,194,255,.35);
        --cal-selected: rgba(43,212,143,.35);
        --cal-range: rgba(43,212,143,.12);
        --cal-hover: rgba(255,255,255,.06);
        --badge-bg: #1e2a38;
        --badge-text: #a9b1bd;
        --warn: #ffb347;
        --wd-accent: #f68620;
        --wd-glow: rgba(246,134,32,.12);
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5;
        --card: #ffffff;
        --muted: #65707d;
        --text: #1e1e1e;
        --accent: #0078d4;
        --border: #e0e0e0;
        --pos: #107c10;
        --neg: #d13438;
        --input-bg: #ffffff;
        --btn-bg: #f0f0f0;
        --btn-border: #d0d0d0;
        --btn-primary-bg: linear-gradient(135deg, #0078d4, #4cc2ff);
        --btn-primary-border: #0078d4;
        --success-border: #107c10;
        --success-glow: rgba(16,124,16,.08);
        --error-bg: rgba(209,52,56,.06);
        --error-border: rgba(209,52,56,.25);
        --cal-today: rgba(0,120,212,.12);
        --cal-booked: rgba(0,120,212,.25);
        --cal-selected: rgba(16,124,16,.25);
        --cal-range: rgba(16,124,16,.08);
        --cal-hover: rgba(0,0,0,.04);
        --badge-bg: #e8e8e8;
        --badge-text: #4a5568;
        --warn: #ca8a04;
        --wd-accent: #c2670d;
        --wd-glow: rgba(194,103,13,.08);
      }
      html, body { height: 100%; background: var(--bg); }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .wrap { padding: 16px; min-height: 100%; box-sizing: border-box; }
      .header {
        display: flex; align-items: center;
        justify-content: space-between; margin-bottom: 14px;
      }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .wd-icon {
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--wd-glow);
        border: 1px solid var(--wd-accent);
        display: flex; align-items: center; justify-content: center;
      }
      .title { font-size: 16px; font-weight: 600; }
      .subtitle { color: var(--muted); font-size: 12px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px; padding: 18px;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 12px; font-weight: 600; text-transform: uppercase;
        letter-spacing: .5px; color: var(--muted); margin: 0 0 10px;
      }

      /* ---------- Balances ---------- */
      .balances { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
      .bal-chip {
        display: flex; align-items: center; gap: 6px;
        background: var(--badge-bg); border: 1px solid var(--border);
        border-radius: 20px; padding: 5px 12px; font-size: 12px;
      }
      .bal-chip .hours {
        font-weight: 700; font-size: 14px; color: var(--accent);
      }
      .bal-chip .plan { color: var(--badge-text); }
      .bal-chip.empty { opacity: .45; }
      .bal-chip.warn .hours { color: var(--warn); }

      /* ---------- Calendar ---------- */
      .cal-wrap { user-select: none; }
      .cal-nav {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 8px;
      }
      .cal-nav button {
        background: transparent; border: 1px solid var(--border);
        color: var(--text); border-radius: 6px; width: 28px; height: 28px;
        cursor: pointer; font-size: 14px; display: flex; align-items: center;
        justify-content: center;
      }
      .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }
      .cal-month { font-size: 13px; font-weight: 600; }
      .cal-grid {
        display: grid; grid-template-columns: repeat(7, 1fr);
        gap: 2px; text-align: center; font-size: 12px;
      }
      .cal-dow {
        font-size: 10px; color: var(--muted); text-transform: uppercase;
        padding: 4px 0; font-weight: 600;
      }
      .cal-day {
        position: relative; padding: 6px 2px; border-radius: 6px;
        cursor: pointer; transition: background .12s;
        line-height: 1;
      }
      .cal-day:hover { background: var(--cal-hover); }
      .cal-day.outside { color: var(--muted); opacity: .35; pointer-events: none; }
      .cal-day.today { background: var(--cal-today); font-weight: 700; }
      .cal-day.booked { background: var(--cal-booked); font-weight: 600; }
      .cal-day.sel-start, .cal-day.sel-end {
        background: var(--cal-selected); font-weight: 700;
      }
      .cal-day.in-range { background: var(--cal-range); }
      .cal-day.weekend { color: var(--muted); opacity: .50; }
      .cal-day .dot {
        position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
        width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
      }
      .cal-legend {
        display: flex; gap: 14px; margin-top: 8px; font-size: 10px; color: var(--muted);
      }
      .cal-legend span { display: flex; align-items: center; gap: 4px; }
      .cal-legend .swatch {
        display: inline-block; width: 10px; height: 10px; border-radius: 3px;
      }

      /* ---------- Booking Form ---------- */
      .form-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      }
      .full-width { grid-column: 1 / -1; }
      .field label {
        display: block; font-size: 11px; color: var(--muted);
        text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
      }
      .field input, .field select, .field textarea {
        width: 100%; box-sizing: border-box;
        background: var(--input-bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 8px 10px; font-size: 13px; outline: none;
        font-family: inherit;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: var(--accent);
      }
      .field textarea { resize: vertical; }
      .date-display {
        font-size: 13px; padding: 8px 10px;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 8px; min-height: 18px; color: var(--text);
      }
      .date-display.empty { color: var(--muted); }
      .actions { margin-top: 14px; display: flex; gap: 8px; }
      .btn {
        background: var(--btn-bg); color: var(--text);
        border: 1px solid var(--btn-border); border-radius: 8px;
        padding: 8px 16px; font-size: 12px; cursor: pointer;
      }
      .btn-primary {
        background: var(--btn-primary-bg);
        border-color: var(--btn-primary-border); font-weight: 600;
      }
      .btn:disabled { opacity: .5; cursor: default; }
      .error-msg {
        margin-top: 10px; padding: 10px; border-radius: 8px;
        background: var(--error-bg); border: 1px solid var(--error-border);
        font-size: 12px; color: var(--neg);
      }
      .success-msg {
        margin-top: 10px; padding: 10px; border-radius: 8px;
        background: var(--success-glow); border: 1px solid var(--success-border);
        font-size: 12px; color: var(--pos);
      }

      /* ---------- Booked List ---------- */
      .booked-list { max-height: 160px; overflow-y: auto; }
      .booked-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 6px 0; border-bottom: 1px solid var(--border);
        font-size: 12px;
      }
      .booked-item:last-child { border-bottom: none; }
      .booked-item .date { font-weight: 600; min-width: 86px; }
      .booked-item .type { color: var(--muted); flex: 1; margin: 0 8px; }
      .booked-item .qty { color: var(--accent); font-weight: 600; white-space: nowrap; }
      .booked-item .status-badge {
        font-size: 10px; padding: 2px 8px; border-radius: 10px;
        background: var(--badge-bg); color: var(--badge-text);
        text-transform: capitalize;
      }

      .footer {
        margin-top: 12px; font-size: 11px; color: var(--muted); text-align: right;
      }
      .maximize-btn {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 4px 8px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: color .15s, border-color .15s;
      }
      .maximize-btn:hover { color: var(--accent); border-color: var(--accent); }

      .loading { text-align: center; padding: 32px 0; font-size: 13px; color: var(--muted); }
      .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
      .tab-btn {
        background: var(--btn-bg); color: var(--muted);
        border: 1px solid var(--border); border-radius: 8px 8px 0 0;
        padding: 6px 14px; font-size: 12px; cursor: pointer;
        transition: color .12s, border-color .12s;
      }
      .tab-btn.active { color: var(--text); border-bottom-color: var(--card); font-weight: 600; }
      .tab-btn:hover { color: var(--text); }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <div class="wd-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--wd-accent)">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>
            <div class="title">Book Leave</div>
            <div class="subtitle">Workday &middot; Time Off Request</div>
          </div>
        </div>
        <button class="maximize-btn" id="maximizeBtn" title="Maximize"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg></button>
      </div>

      <div id="mainContent">
        <!-- Balances strip -->
        <div id="balancesSection">
          <p class="section-title">Leave Balances</p>
          <div class="balances" id="balances"></div>
        </div>

        <!-- Tab bar: Calendar / Upcoming -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="calendar">Calendar</button>
          <button class="tab-btn" data-tab="upcoming">Upcoming</button>
        </div>

        <!-- Calendar panel -->
        <div class="tab-panel active" id="panel-calendar">
          <div class="card">
            <div class="cal-wrap">
              <div class="cal-nav">
                <button id="calPrev">&#x25C0;</button>
                <span class="cal-month" id="calMonth"></span>
                <button id="calNext">&#x25B6;</button>
              </div>
              <div class="cal-grid" id="calGrid"></div>
              <div class="cal-legend">
                <span><span class="swatch" style="background:var(--cal-booked)"></span> Booked</span>
                <span><span class="swatch" style="background:var(--cal-selected)"></span> Selected</span>
                <span><span class="swatch" style="background:var(--cal-today)"></span> Today</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Upcoming panel -->
        <div class="tab-panel" id="panel-upcoming">
          <div class="card">
            <p class="section-title">Booked Time Off</p>
            <div class="booked-list" id="bookedList">
              <div class="loading">No upcoming time off</div>
            </div>
          </div>
        </div>

        <!-- Booking form -->
        <div class="card" style="margin-top:12px;">
          <p class="section-title">New Request</p>
          <div class="form-grid">
            <div class="field">
              <label>Start Date</label>
              <div class="date-display empty" id="startDateDisplay">Click calendar to select</div>
              <input type="hidden" id="startDate" />
            </div>
            <div class="field">
              <label>End Date</label>
              <div class="date-display empty" id="endDateDisplay">Click again for end date</div>
              <input type="hidden" id="endDate" />
            </div>
            <div class="field">
              <label for="timeOffType">Time Off Type *</label>
              <select id="timeOffType">
                <option value="">-- Select --</option>
              </select>
            </div>
            <div class="field">
              <label for="quantity">Hours / Day</label>
              <input id="quantity" type="number" value="8" min="1" max="24" />
            </div>
            <div class="field full-width">
              <label for="reason">Reason</label>
              <textarea id="reason" rows="2" placeholder="Optional reason for your time off request"></textarea>
            </div>
          </div>
          <div id="msgArea"></div>
          <div class="actions">
            <button class="btn btn-primary" id="bookBtn" disabled>Book Leave</button>
            <button class="btn" id="resetBtn">Reset</button>
          </div>
        </div>
      </div>

      <div id="loadingView" style="display:none;"><div class="loading">Loading leave data&hellip;</div></div>
      <div class="footer">Powered by <strong>workday / book_leave</strong> via MCP</div>
    </div>

    <script>
      /* ---- Globals ---- */
      var toolOutput = (window.openai && window.openai.toolOutput) || {};

      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
      function reportHeight() {
        if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") {
          window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
        }
      }

      /* ---- State ---- */
      var calYear, calMonth; // 0-indexed month for display
      var selStart = null;   // "YYYY-MM-DD" or null
      var selEnd = null;
      var bookedDates = {};  // "YYYY-MM-DD" → { type, qty, unit, status }
      var eligibleTypes = []; // { name, id, unit }
      var leaveBalances = []; // { planName, balance, unit, timeOffTypes }

      /* ---- Elements ---- */
      var calGrid = document.getElementById("calGrid");
      var calMonthLabel = document.getElementById("calMonth");
      var startDateDisplay = document.getElementById("startDateDisplay");
      var endDateDisplay = document.getElementById("endDateDisplay");
      var startDateInput = document.getElementById("startDate");
      var endDateInput = document.getElementById("endDate");
      var typeSelect = document.getElementById("timeOffType");
      var quantityInput = document.getElementById("quantity");
      var reasonInput = document.getElementById("reason");
      var bookBtn = document.getElementById("bookBtn");
      var resetBtn = document.getElementById("resetBtn");
      var msgArea = document.getElementById("msgArea");
      var bookedListEl = document.getElementById("bookedList");
      var balancesEl = document.getElementById("balances");
      var mainContent = document.getElementById("mainContent");
      var loadingView = document.getElementById("loadingView");

      /* ---- Tab switching ---- */
      document.querySelectorAll(".tab-btn").forEach(function(tab) {
        tab.addEventListener("click", function() {
          document.querySelectorAll(".tab-btn").forEach(function(t) { t.classList.remove("active"); });
          document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
          tab.classList.add("active");
          var panel = document.getElementById("panel-" + tab.dataset.tab);
          if (panel) panel.classList.add("active");
          reportHeight();
        });
      });

      /* ---- Calendar rendering ---- */
      var MONTH_NAMES = ["January","February","March","April","May","June",
                         "July","August","September","October","November","December"];
      var DOW = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      function pad2(n) { return n < 10 ? "0" + n : "" + n; }
      function toISO(y, m, d) { return y + "-" + pad2(m + 1) + "-" + pad2(d); }
      function isWeekend(y, m, d) { var dow = new Date(y, m, d).getDay(); return dow === 0 || dow === 6; }

      function renderCalendar() {
        calMonthLabel.textContent = MONTH_NAMES[calMonth] + " " + calYear;
        var html = "";
        for (var i = 0; i < 7; i++) html += '<div class="cal-dow">' + DOW[i] + "</div>";

        var first = new Date(calYear, calMonth, 1);
        var startDow = first.getDay();
        var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        var prevMonth = new Date(calYear, calMonth, 0);
        var prevDays = prevMonth.getDate();

        var today = new Date();
        var todayISO = toISO(today.getFullYear(), today.getMonth(), today.getDate());

        // Previous month padding
        for (var p = startDow - 1; p >= 0; p--) {
          var pd = prevDays - p;
          html += '<div class="cal-day outside">' + pd + "</div>";
        }

        // This month
        for (var d = 1; d <= daysInMonth; d++) {
          var iso = toISO(calYear, calMonth, d);
          var cls = "cal-day";
          if (iso === todayISO) cls += " today";
          if (isWeekend(calYear, calMonth, d)) cls += " weekend";
          if (bookedDates[iso]) cls += " booked";
          if (iso === selStart) cls += " sel-start";
          if (iso === selEnd) cls += " sel-end";
          if (selStart && selEnd && iso > selStart && iso < selEnd) cls += " in-range";
          var dot = bookedDates[iso] ? '<span class="dot"></span>' : "";
          html += '<div class="' + cls + '" data-date="' + iso + '">' + d + dot + "</div>";
        }

        // Next month padding
        var totalCells = startDow + daysInMonth;
        var remaining = (7 - (totalCells % 7)) % 7;
        for (var n = 1; n <= remaining; n++) {
          html += '<div class="cal-day outside">' + n + "</div>";
        }

        calGrid.innerHTML = html;

        // Attach click handlers
        calGrid.querySelectorAll(".cal-day:not(.outside)").forEach(function(cell) {
          cell.addEventListener("click", function() { onDayClick(cell.dataset.date); });
        });
      }

      function onDayClick(iso) {
        if (!selStart || (selStart && selEnd)) {
          // Start new selection
          selStart = iso;
          selEnd = null;
          startDateInput.value = iso;
          endDateInput.value = "";
          startDateDisplay.textContent = formatDateNice(iso);
          startDateDisplay.classList.remove("empty");
          endDateDisplay.textContent = "Click again for end date";
          endDateDisplay.classList.add("empty");
        } else {
          // Set end date
          if (iso < selStart) {
            // Swap if user clicked earlier date
            selEnd = selStart;
            selStart = iso;
          } else {
            selEnd = iso;
          }
          startDateInput.value = selStart;
          endDateInput.value = selEnd;
          startDateDisplay.textContent = formatDateNice(selStart);
          startDateDisplay.classList.remove("empty");
          endDateDisplay.textContent = formatDateNice(selEnd);
          endDateDisplay.classList.remove("empty");
        }
        renderCalendar();
        validate();
      }

      function formatDateNice(iso) {
        if (!iso) return "";
        var parts = iso.split("-");
        var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
      }

      function countWeekdays(start, end) {
        var s = new Date(start + "T00:00:00");
        var e = new Date(end + "T00:00:00");
        var count = 0;
        var cur = new Date(s);
        while (cur <= e) {
          var dow = cur.getDay();
          if (dow !== 0 && dow !== 6) count++;
          cur.setDate(cur.getDate() + 1);
        }
        return count;
      }

      /* ---- Navigation ---- */
      document.getElementById("calPrev").addEventListener("click", function() {
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
      });
      document.getElementById("calNext").addEventListener("click", function() {
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
      });

      /* ---- Balances ---- */
      function renderBalances() {
        if (!leaveBalances.length) { balancesEl.innerHTML = '<span style="font-size:12px;color:var(--muted)">No balance data</span>'; return; }
        var html = "";
        leaveBalances.forEach(function(b) {
          var bal = parseFloat(b.balance) || 0;
          var cls = "bal-chip";
          if (bal <= 0) cls += " empty";
          else if (bal <= 16) cls += " warn";
          html += '<div class="' + cls + '">' +
            '<span class="hours">' + bal + 'h</span>' +
            '<span class="plan">' + esc(b.planName) + '</span>' +
          '</div>';
        });
        balancesEl.innerHTML = html;
      }

      /* ---- Upcoming booked list ---- */
      function renderBookedList() {
        var entries = [];
        for (var d in bookedDates) entries.push({ date: d, info: bookedDates[d] });
        entries.sort(function(a, b) { return a.date < b.date ? -1 : 1; });
        // Only show future/today
        var todayISO = toISO(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
        entries = entries.filter(function(e) { return e.date >= todayISO; });
        if (!entries.length) {
          bookedListEl.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">No upcoming time off booked</div>';
          return;
        }
        var html = "";
        entries.forEach(function(e) {
          html += '<div class="booked-item">' +
            '<span class="date">' + formatDateNice(e.date) + '</span>' +
            '<span class="type">' + esc(e.info.type) + '</span>' +
            '<span class="qty">' + esc(e.info.qty + " " + e.info.unit) + '</span>' +
            '<span class="status-badge">' + esc(e.info.status) + '</span>' +
          '</div>';
        });
        bookedListEl.innerHTML = html;
      }

      /* ---- Populate types dropdown ---- */
      function renderTypeOptions() {
        var html = '<option value="">-- Select Type --</option>';
        eligibleTypes.forEach(function(t) {
          html += '<option value="' + esc(t.id) + '">' + esc(t.name) + '</option>';
        });
        typeSelect.innerHTML = html;
      }

      /* ---- Validation ---- */
      function validate() {
        bookBtn.disabled = !(selStart && typeSelect.value);
        return !bookBtn.disabled;
      }
      typeSelect.addEventListener("change", validate);

      /* ---- Reset ---- */
      resetBtn.addEventListener("click", function() {
        selStart = null; selEnd = null;
        startDateInput.value = ""; endDateInput.value = "";
        startDateDisplay.textContent = "Click calendar to select";
        startDateDisplay.classList.add("empty");
        endDateDisplay.textContent = "Click again for end date";
        endDateDisplay.classList.add("empty");
        typeSelect.value = "";
        quantityInput.value = "8";
        reasonInput.value = "";
        msgArea.innerHTML = "";
        bookBtn.textContent = "Book Leave";
        bookBtn.disabled = true;
        renderCalendar();
        reportHeight();
      });

      /* ---- Book leave ---- */
      bookBtn.addEventListener("click", async function() {
        if (!window.openai || typeof window.openai.callTool !== "function") return;
        if (!validate()) return;

        var endDate = selEnd || selStart; // single-day if no end
        var days = countWeekdays(selStart, endDate);
        if (days === 0) {
          msgArea.innerHTML = '<div class="error-msg">Selected range contains no weekdays.</div>';
          reportHeight();
          return;
        }
        var totalQty = (parseFloat(quantityInput.value) || 8) * days;

        bookBtn.disabled = true;
        bookBtn.textContent = "Submitting\u2026";
        msgArea.innerHTML = "";

        try {
          var args = {
            startDate: selStart,
            endDate: endDate,
            timeOffTypeId: typeSelect.value,
            quantity: String(parseFloat(quantityInput.value) || 8),
            unit: "Hours",
            reason: reasonInput.value.trim() || "Time off request"
          };
          var output = await window.openai.callTool("book_leave", args);
          var data = output;
          if (output && output.structuredContent) data = output.structuredContent;
          // MCP may return isError:true with a text content array instead of structuredContent
          if (output && output.isError) {
            var errText = "Leave booking failed";
            if (Array.isArray(output.content) && output.content.length > 0) {
              errText = output.content[0].text || errText;
            } else if (typeof output.content === "string") {
              errText = output.content;
            }
            throw new Error(errText);
          }

          if (!data || !data.success) {
            throw new Error((data && data.message) || "Leave booking failed");
          }

          var details = data.bookingDetails || {};
          var statusText = details.transactionStatus || details.status || "Submitted";
          msgArea.innerHTML = '<div class="success-msg">' +
            '\u2713 Leave booked! <strong>' + days + ' day' + (days > 1 ? 's' : '') +
            '</strong> (' + totalQty + 'h) &mdash; Status: ' + esc(statusText) +
            '</div>';

          // Add newly booked days to the calendar display
          var cur = new Date(selStart + "T00:00:00");
          var endD = new Date(endDate + "T00:00:00");
          while (cur <= endD) {
            if (cur.getDay() !== 0 && cur.getDay() !== 6) {
              var isoKey = toISO(cur.getFullYear(), cur.getMonth(), cur.getDate());
              var selectedType = typeSelect.options[typeSelect.selectedIndex];
              bookedDates[isoKey] = {
                type: selectedType ? selectedType.textContent : "Time Off",
                qty: String(parseFloat(quantityInput.value) || 8),
                unit: "Hours",
                status: statusText
              };
            }
            cur.setDate(cur.getDate() + 1);
          }
          renderCalendar();
          renderBookedList();

        } catch (err) {
          msgArea.innerHTML = '<div class="error-msg">' + esc(err.message || "Failed to book leave") + '</div>';
        } finally {
          bookBtn.textContent = "Book Leave";
          validate();
          reportHeight();
        }
      });

      /* ---- Display Mode (maximize / restore) ---- */
      var _expandSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2h4v4M6 14H2v-4M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>';
      var _collapseSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 6h-4V2M2 10h4v4M10 6l4.5-4.5M6 10L1.5 14.5"/></svg>';
      var _isFullscreen = false;
      var _maxBtn = document.getElementById("maximizeBtn");

      async function toggleFullscreen() {
        if (!window.openai || typeof window.openai.requestDisplayMode !== "function") return;
        var mode = _isFullscreen ? "inline" : "fullscreen";
        try {
          await window.openai.requestDisplayMode({ mode: mode });
          _isFullscreen = !_isFullscreen;
          _maxBtn.innerHTML = _isFullscreen ? _collapseSvg : _expandSvg;
          _maxBtn.title = _isFullscreen ? "Restore" : "Maximize";
          reportHeight();
        } catch (e) {}
      }

      if (_maxBtn) {
        if (window.openai && typeof window.openai.requestDisplayMode === "function") {
          _maxBtn.addEventListener("click", toggleFullscreen);
        } else {
          _maxBtn.style.display = "none";
        }
      }

      /* ---- Initialize from toolOutput ---- */
      function initFromData(data) {
        // Show all eligible absence types — the API already scopes to what the worker can use
        eligibleTypes = data.eligibleAbsenceTypes || [];
        renderTypeOptions();

        // Balances
        leaveBalances = (data.leaveBalances || []).filter(function(b) {
          return b.timeOffTypes && b.timeOffTypes !== "(No Eligible Time Offs)";
        });
        renderBalances();

        // Booked time off
        var booked = data.bookedTimeOff || [];
        bookedDates = {};
        booked.forEach(function(entry) {
          if (entry.date) {
            bookedDates[entry.date] = {
              type: entry.timeOffType || "Time Off",
              qty: entry.quantity || "8",
              unit: entry.unit || "Hours",
              status: entry.status || "Booked"
            };
          }
        });

        // Pre-fill dates from requestParameters if provided
        var params = data.requestParameters || {};
        if (params.startDate) {
          selStart = params.startDate;
          startDateInput.value = selStart;
          startDateDisplay.textContent = formatDateNice(selStart);
          startDateDisplay.classList.remove("empty");
        }
        if (params.endDate) {
          selEnd = params.endDate;
          endDateInput.value = selEnd;
          endDateDisplay.textContent = formatDateNice(selEnd);
          endDateDisplay.classList.remove("empty");
        }
        // Pre-select leave type if agent resolved it
        if (params.timeOffTypeId) {
          typeSelect.value = params.timeOffTypeId;
          // If exact id not found, try case-insensitive name match as fallback
          if (!typeSelect.value) {
            var nameLower = (params.timeOffTypeName || "").toLowerCase();
            if (nameLower) {
              for (var i = 0; i < typeSelect.options.length; i++) {
                if (typeSelect.options[i].text.toLowerCase().indexOf(nameLower) >= 0) {
                  typeSelect.value = typeSelect.options[i].value;
                  break;
                }
              }
            }
          }
        }
        // Pre-fill quantity/unit
        if (params.quantity) quantityInput.value = params.quantity;

        // Navigate calendar to start date or current month
        var focusDate = selStart ? new Date(selStart + "T00:00:00") : new Date();
        calYear = focusDate.getFullYear();
        calMonth = focusDate.getMonth();

        renderCalendar();
        renderBookedList();
        validate();

        mainContent.style.display = "";
        loadingView.style.display = "none";
        reportHeight();
      }

      /* ---- Boot ---- */
      (function boot() {
        if (toolOutput && (toolOutput.eligibleAbsenceTypes || toolOutput.leaveBalances || toolOutput.bookedTimeOff)) {
          // Data was pre-loaded via toolOutput
          initFromData(toolOutput);
        } else if (window.openai && typeof window.openai.callTool === "function") {
          // Fetch data dynamically
          mainContent.style.display = "none";
          loadingView.style.display = "";
          window.openai.callTool("prepare_request_leave", {
            startDate: new Date().toISOString().slice(0, 10),
            endDate: new Date().toISOString().slice(0, 10)
          }).then(function(out) {
            var d = out;
            if (out && out.structuredContent) d = out.structuredContent;
            if (d) initFromData(d);
            else {
              loadingView.innerHTML = '<div style="color:var(--neg);text-align:center;padding:32px;font-size:13px">No leave data returned</div>';
            }
          }).catch(function(err) {
            loadingView.innerHTML = '<div style="color:var(--neg);text-align:center;padding:32px;font-size:13px">' + esc(err.message || "Failed to load leave data") + '</div>';
          });
        } else {
          // No data, show empty calendar at current month
          var now = new Date();
          calYear = now.getFullYear();
          calMonth = now.getMonth();
          renderCalendar();
          renderBookedList();
          renderBalances();
          reportHeight();
        }
      })();
    </script>
  </body>
</html>
